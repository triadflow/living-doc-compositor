# Reference copy of the Living Doc Notify workflow.
#
# The mobile app writes a copy of this file (generated from
# mobile/src/workflow-template.ts) into each repo you connect. You should not
# need to edit this file directly; the app handles installation and updates.
#
# Kept at the root of this repo as a reference + for testing the pipeline end
# to end here. Keep in sync with mobile/src/workflow-template.ts.
#
# Required repo secret: EXPO_PUSH_TOKEN (installed automatically by the app).
#
# Manual fire example:
#   gh workflow run living-doc-notify.yml \
#     -f title="Ship Feature updated" \
#     -f body="Status snapshot now green" \
#     -f url="https://triadflow.github.io/living-doc-compositor/living-doc-template-starter-ship-feature.html"

name: Living Doc Notify

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Notification title"
        required: true
        type: string
      body:
        description: "Notification body"
        required: true
        type: string
      url:
        description: "URL to open when tapped (rendered doc)"
        required: false
        type: string
      status:
        description: "Optional status label (green, warning, etc.)"
        required: false
        type: string
  repository_dispatch:
    types: [living-doc-updated]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Send Expo push
        env:
          EXPO_PUSH_TOKEN: ${{ secrets.EXPO_PUSH_TOKEN }}
          TITLE: ${{ inputs.title || github.event.client_payload.title }}
          BODY: ${{ inputs.body || github.event.client_payload.body }}
          URL: ${{ inputs.url || github.event.client_payload.url }}
          STATUS: ${{ inputs.status || github.event.client_payload.status }}
        run: |
          if [ -z "$EXPO_PUSH_TOKEN" ]; then
            echo "EXPO_PUSH_TOKEN secret is not configured; add it via the mobile app."
            exit 1
          fi

          payload=$(jq -n \
            --arg to "$EXPO_PUSH_TOKEN" \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg url "$URL" \
            --arg status "$STATUS" \
            '{
              to: $to,
              title: $title,
              body: $body,
              sound: "default",
              data: (
                {} |
                (if $url == "" then . else . + { url: $url, title: $title } end) |
                (if $status == "" then . else . + { status: $status } end)
              )
            }')

          curl -sS -X POST https://exp.host/--/api/v2/push/send \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "$payload"
