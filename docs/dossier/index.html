<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dossiers — Living Docs</title>
<meta name="description" content="Readings on how AI, labor, and complex work are actually shifting. Drawn from long-running investigations. Short, sourced, readable in one sitting."/>
<link rel="stylesheet" href="assets/colors_and_type.css"/>
<style>
  *{box-sizing:border-box;margin:0}
  body{
    font-family:var(--ld-font-sans);
    font-size:var(--ld-size-body);
    line-height:var(--ld-lh-body);
    color:var(--ld-ink);
    background:var(--ld-bg);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  a{color:inherit;text-decoration:none}
  em{font-style:normal;color:var(--ld-accent)}

  .top-bar{
    display:flex;align-items:center;gap:14px;
    padding:14px 32px;
    background:rgba(255,255,255,.82);
    border-bottom:1px solid var(--ld-line);
    position:sticky;top:0;z-index:20;
    backdrop-filter:blur(8px);
  }
  .logo{
    width:30px;height:30px;border-radius:7px;
    background:var(--ld-accent);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;letter-spacing:-.02em;
  }
  .top-title{font-size:15px;font-weight:700;letter-spacing:-.02em}
  .top-title span{color:var(--ld-muted);font-weight:500}
  .top-bar .spacer{flex:1}
  .top-bar .count{font-size:12.5px;color:var(--ld-muted);font-variant-numeric:tabular-nums}
  .top-bar a.home{
    font-size:13px;color:var(--ld-muted);padding:6px 10px;border-radius:7px;
    transition:all .15s;
  }
  .top-bar a.home:hover{color:var(--ld-accent);background:var(--ld-accent-tint)}

  .wrap{max-width:920px;margin:0 auto;padding:0 32px}
  .hero{padding:72px 0 40px;border-bottom:1px solid var(--ld-line)}
  .hero .eyebrow{
    display:inline-block;font-size:11.5px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--ld-accent);background:var(--ld-accent-tint);
    padding:4px 10px;border-radius:var(--ld-radius-pill);
    margin-bottom:22px;
  }
  .hero h1{
    font-size:clamp(34px,4.6vw,48px);line-height:1.04;
    font-weight:800;letter-spacing:-.035em;
    margin-bottom:18px;max-width:18ch;
  }
  .hero .lede{
    font-size:18px;color:var(--ld-muted);
    line-height:1.6;max-width:62ch;
  }
  .hero .lede em{color:var(--ld-accent)}

  .filter-row{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    padding:22px 0 26px;
    border-bottom:1px solid var(--ld-line);
  }
  .filter-row .label{
    font-size:11.5px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ld-muted);
    margin-right:4px;
  }
  .chip{
    font-size:12.5px;font-weight:600;
    padding:5px 11px;border-radius:var(--ld-radius-pill);
    background:var(--ld-card);border:1px solid var(--ld-line);
    color:var(--ld-ink);cursor:pointer;
    transition:all .15s;
    font-family:inherit;
  }
  .chip:hover{border-color:var(--ld-accent);color:var(--ld-accent)}
  .chip.active{background:var(--ld-accent-tint);border-color:var(--ld-accent-tint);color:var(--ld-accent-ink)}

  .list{padding:8px 0 64px}
  .entry{
    display:grid;
    grid-template-columns:120px 1fr auto;
    gap:32px;align-items:baseline;
    padding:28px 0;
    border-bottom:1px solid var(--ld-line);
    transition:all .15s;
  }
  .entry:hover{padding-left:6px}
  .entry:hover .entry-title{color:var(--ld-accent)}
  .entry .date-col{
    font-size:12.5px;color:var(--ld-muted);
    font-variant-numeric:tabular-nums;
    padding-top:4px;
  }
  .entry .date-col .year{display:block;font-size:11.5px;color:var(--ld-subtle);margin-top:2px}
  .entry .main{min-width:0}
  .entry .cat{
    display:inline-block;font-size:10.5px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--ld-accent);
    margin-bottom:8px;
  }
  .entry-title{
    font-size:22px;font-weight:700;letter-spacing:-.02em;
    line-height:1.25;margin-bottom:8px;
    transition:color .15s;
  }
  .entry .dek{
    font-size:14.5px;color:var(--ld-muted);line-height:1.55;
    max-width:58ch;margin-bottom:12px;
  }
  .entry .meta{
    display:flex;gap:10px;flex-wrap:wrap;
    font-size:12px;color:var(--ld-subtle);
  }
  .entry .meta .sep{color:var(--ld-subtle)}
  .entry .meta .tag{color:var(--ld-muted);font-weight:500}
  .entry .read{
    align-self:center;
    font-size:12.5px;color:var(--ld-muted);
    font-variant-numeric:tabular-nums;
    padding-top:4px;white-space:nowrap;
  }
  .entry .read .arrow{display:inline-block;margin-left:4px;transition:transform .15s}
  .entry:hover .read{color:var(--ld-accent)}
  .entry:hover .read .arrow{transform:translateX(3px)}
  .entry .drift-badge{
    display:inline-flex;align-items:center;gap:6px;
    font-size:11.5px;font-weight:600;
    color:var(--ld-accent);
    background:var(--ld-accent-tint);
    padding:3px 10px;border-radius:var(--ld-radius-pill);
    margin-top:4px;
    font-variant-numeric:tabular-nums;
  }
  .entry .drift-badge .drift-dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--ld-accent);
    animation:drift-pulse 2.4s ease-in-out infinite;
  }
  @keyframes drift-pulse{
    0%,100%{opacity:1}
    50%{opacity:.35}
  }

  .foot{
    padding:48px 0 72px;color:var(--ld-muted);
    font-size:13px;
  }
  .foot .line{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .foot em{color:var(--ld-accent)}
  .foot a{color:var(--ld-muted);border-bottom:1px solid var(--ld-line);padding-bottom:1px}
  .foot a:hover{color:var(--ld-accent);border-bottom-color:var(--ld-accent)}

  @media (max-width:720px){
    .entry{grid-template-columns:1fr;gap:6px}
    .entry .date-col{order:-1;padding-top:0}
    .entry .read{padding-top:8px}
    .top-bar{padding:12px 20px}
    .wrap{padding:0 20px}
  }
</style>
</head>
<body>

<header class="top-bar">
  <a class="home" href="https://triadflow.github.io/living-doc-compositor/">← Compositor</a>
  <div style="width:1px;height:18px;background:var(--ld-line)"></div>
  <div class="logo">L</div>
  <div class="top-title">Living Docs <span>· Dossiers</span></div>
  <div class="spacer"></div>
  <div class="count" id="count">—</div>
</header>

<main class="wrap">

  <section class="hero">
    <span class="eyebrow">Dossiers</span>
    <h1>How AI, labor, and complex work are shifting.</h1>
    <p class="lede">
      Readings drawn from long-running investigations. Short, sourced,
      <em>readable in one sitting.</em>
    </p>
  </section>

  <div class="filter-row" id="filter-row">
    <span class="label">Filter</span>
  </div>

  <section class="list" id="list"></section>

  <footer class="foot">
    <div class="line">
      <span>Rene Luijk · Triadflow ·</span>
      <a href="https://triadflow.github.io/living-doc-compositor/"><em>Living Doc Compositor</em></a>
    </div>
  </footer>

</main>

<script>
const DOSSIERS = [
  {
    slug: "on-device-ai-watcher-2026-H1",
    cat: "Monitoring · On-device",
    tag: "monitoring",
    title: "On-device is not a smaller cloud.",
    dek: "The phone has crossed a capability threshold for real offline work — transcription, translation, summarization, limited coding. Three poles (Apple Intelligence, Android AICore, open-weight via llama.cpp and MLX) are carving the tier into segments. The economics don't translate from cloud.",
    date: "Apr 21, 2026",
    year: "2026",
    read: "7 min",
    livingDoc: "https://triadflow.github.io/living-doc-compositor/on-device-ai-watcher.html",
    href: "on-device-ai-watcher/2026-H1.html",
    drift: 0
  },
  {
    slug: "inference-economics-watcher-2026-H1",
    cat: "Monitoring · Economics",
    tag: "monitoring",
    title: "Eight points of capability, 250× the cost.",
    dek: "The 2026-H1 cost × capability frontier has split into two markets: 30¢–$1 per M output at ~72% GPQA, or $75 per M output at ~87% GPQA. A 250× cost ratio for an 8-point capability gap. For most workloads the useful question has flipped. Gemma 4 is the late-period entrant that could redraw the chart.",
    date: "Apr 21, 2026",
    year: "2026",
    read: "7 min",
    livingDoc: "https://triadflow.github.io/living-doc-compositor/inference-economics-watcher.html",
    href: "inference-economics-watcher/2026-H1.html",
    drift: 12
  },
  {
    slug: "ai-eval-ecosystem-2026-H1",
    cat: "Monitoring · Evaluation",
    tag: "monitoring",
    title: "Who gets to grade the frontier.",
    dek: "An AI evaluator matters in 2026 only when three things align: independence, access, and mandate. UK AISI has all three. METR and Apollo have two. Commercial leaderboards have one. Most of the field still sits at the observer layer.",
    date: "Apr 20, 2026",
    year: "2026",
    read: "5 min",
    livingDoc: "https://triadflow.github.io/living-doc-compositor/ai-eval-ecosystem.html",
    href: "ai-eval-ecosystem/2026-H1.html",
    drift: 1
  },
  {
    slug: "ai-datacenter-buildout-2026-H1",
    cat: "Monitoring · Infrastructure",
    tag: "monitoring",
    title: "Announced is easy. Energized is hard.",
    dek: "Of ~16 GW of US AI datacenter projects targeting 2026 opening, only ~5 GW is actually under construction. The bottleneck is not demand, not GPUs, not capital — it is transformers, switchgear, and interconnect queues.",
    date: "Apr 20, 2026",
    year: "2026",
    read: "6 min",
    livingDoc: "https://triadflow.github.io/living-doc-compositor/ai-datacenter-buildout.html",
    href: "ai-datacenter-buildout/2026-H1.html",
    drift: 1
  },
  {
    slug: "ai-labs-watcher-2026-H1",
    cat: "Monitoring · Strategy",
    tag: "monitoring",
    title: "Half a trillion in capex, six labs, a consolidation already priced in.",
    dek: "OpenAI, Anthropic, Google DeepMind, Meta, xAI, Mistral. $500B+ in announced capex, a historical precedent that says two of them will not be independent in three years.",
    date: "Apr 20, 2026",
    year: "2026",
    read: "7 min",
    livingDoc: "https://triadflow.github.io/living-doc-compositor/ai-labs-watcher.html",
    href: "ai-labs-watcher/2026-H1.html",
    drift: 4
  },
  {
    slug: "ai-labor-monitor-2026-H1",
    cat: "Monitoring · Economics",
    tag: "monitoring",
    title: "Five economists, one labor market.",
    dek: "Acemoglu, Aghion, Autor, Brynjolfsson, and McAfee cannot all be right about AI and labor — but the shape of their disagreement is more useful than picking a winner.",
    date: "Apr 20, 2026",
    year: "2026",
    read: "6 min",
    livingDoc: "https://triadflow.github.io/living-doc-compositor/ai-labor-monitor.html",
    href: "ai-labor-monitor/2026-H1.html",
    drift: 0
  },
  {
    slug: "mcp-protocol-monitor-2026-H1",
    cat: "Monitoring · Protocols",
    tag: "monitoring",
    title: "A protocol many builders converge on.",
    dek: "Eighteen months in, MCP has become the default connective tissue between AI agents and everything else — governed by a foundation, not a vendor.",
    date: "Apr 20, 2026",
    year: "2026",
    read: "5 min",
    livingDoc: "https://triadflow.github.io/living-doc-compositor/mcp-protocol-monitor.html",
    href: "mcp-protocol-monitor/2026-H1.html",
    drift: 0
  }
];

const TAG_LABELS = {
  monitoring: 'Monitoring',
  architecture: 'Architecture',
  agents: 'Agents',
  workflow: 'Workflow',
  case: 'Case study',
  field: 'Field note'
};

const list = document.getElementById('list');
const count = document.getElementById('count');
const filterRow = document.getElementById('filter-row');
let activeTag = 'all';

function labelFor(tag){
  return TAG_LABELS[tag] || tag.charAt(0).toUpperCase() + tag.slice(1);
}

function buildChips(){
  const presentTags = [...new Set(DOSSIERS.map(d => d.tag))];
  // "All" is always first; other chips only appear when they have content behind them
  const chipTags = ['all', ...presentTags];
  // Hide the entire filter row when there's only one real category
  if (presentTags.length <= 1){
    filterRow.style.display = 'none';
    return;
  }
  const chipNodes = chipTags.map(tag => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (tag === activeTag ? ' active' : '');
    btn.dataset.tag = tag;
    btn.textContent = tag === 'all' ? 'All' : labelFor(tag);
    btn.addEventListener('click', () => {
      activeTag = tag;
      filterRow.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.tag === activeTag));
      render();
    });
    return btn;
  });
  chipNodes.forEach(n => filterRow.appendChild(n));
}

function render(){
  const items = activeTag === 'all' ? DOSSIERS : DOSSIERS.filter(d => d.tag === activeTag);
  count.textContent = `${items.length} dossier${items.length === 1 ? '' : 's'}`;
  list.innerHTML = items.map(d => {
    const driftBadge = (typeof d.drift === 'number' && d.drift > 0)
      ? `<span class="drift-badge" title="Card-level changes on the living doc since this piece was published">
           <span class="drift-dot"></span>
           ${d.drift} change${d.drift === 1 ? '' : 's'} since publish
         </span>`
      : '';
    return `
    <a class="entry" href="${d.href}">
      <div class="date-col">
        ${d.date.split(', ')[0]}
        <span class="year">${d.year}</span>
      </div>
      <div class="main">
        <span class="cat">${d.cat}</span>
        <h3 class="entry-title">${d.title}</h3>
        <p class="dek">${d.dek}</p>
        ${driftBadge}
      </div>
      <div class="read">${d.read}<span class="arrow">→</span></div>
    </a>
  `;
  }).join('');
}

buildChips();
render();
</script>

</body>
</html>
