<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Living Docs, Compositor, Harness - Operator Presentation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --paper: #ffffff;
      --ink: #121826;
      --text: #263449;
      --muted: #68758a;
      --line: #d7dee8;
      --soft: #eef3f7;
      --blue: #2563eb;
      --cyan: #0e7490;
      --green: #15803d;
      --amber: #b45309;
      --red: #b42318;
      --violet: #6d28d9;
      --shadow: 0 18px 50px rgba(18, 24, 38, 0.08);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(244, 246, 248, 0.88), #f4f6f8 340px),
        radial-gradient(circle at 14% 0%, rgba(37, 99, 235, 0.08), transparent 330px),
        radial-gradient(circle at 90% 10%, rgba(14, 116, 144, 0.08), transparent 300px);
      color: var(--text);
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      letter-spacing: 0;
    }
    button { font: inherit; }
    code {
      font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #edf2f7;
      border: 1px solid #d8e0ea;
      border-radius: 5px;
      padding: 1px 5px;
      overflow-wrap: anywhere;
    }
    .chrome {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }
    .chrome-inner {
      max-width: 1220px;
      margin: 0 auto;
      padding: 10px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand {
      color: var(--ink);
      font-weight: 750;
      font-size: 14px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chrome-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .progress {
      color: var(--muted);
      font: 12px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-width: 54px;
      text-align: right;
    }
    .toggle {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper);
      overflow: hidden;
    }
    .toggle button {
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 13px;
      min-width: 48px;
      font-size: 12px;
      font-weight: 750;
    }
    .toggle button[aria-pressed="true"] {
      background: var(--ink);
      color: #fff;
    }
    .deck {
      max-width: 1220px;
      margin: 0 auto;
      padding: 34px 22px 72px;
    }
    .hero, .slide {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(215, 222, 232, 0.92);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .hero {
      min-height: min(760px, calc(100vh - 100px));
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.75fr);
      gap: 34px;
      align-items: center;
      padding: 52px;
      margin-bottom: 22px;
    }
    .eyebrow {
      color: var(--muted);
      font: 750 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin: 0 0 16px;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 {
      color: var(--ink);
      font-size: clamp(38px, 6vw, 76px);
      line-height: 0.95;
      max-width: 890px;
      margin-bottom: 24px;
      letter-spacing: 0;
    }
    .lede {
      color: var(--text);
      font-size: 19px;
      line-height: 1.5;
      max-width: 840px;
      margin-bottom: 26px;
    }
    .hero-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .metric, .card, .note, .diagram, .source-list {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric {
      padding: 14px;
      min-height: 94px;
    }
    .metric strong {
      display: block;
      color: var(--ink);
      font-size: 26px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .metric span {
      color: var(--muted);
      font-size: 13px;
    }
    .slide {
      min-height: 76vh;
      padding: 44px;
      margin: 22px 0;
      scroll-margin-top: 68px;
    }
    .slide-head {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
      margin-bottom: 24px;
    }
    .num {
      color: var(--muted);
      font: 750 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.12em;
      padding-top: 8px;
    }
    .slide h2 {
      color: var(--ink);
      font-size: clamp(27px, 3.6vw, 46px);
      line-height: 1.05;
      max-width: 940px;
      margin-bottom: 12px;
      letter-spacing: 0;
    }
    .slide .summary {
      font-size: 18px;
      line-height: 1.5;
      max-width: 880px;
      margin-bottom: 24px;
    }
    .body-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.82fr);
      gap: 22px;
      align-items: start;
    }
    .copy p { max-width: 840px; margin-bottom: 15px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .body-grid .cards { grid-template-columns: 1fr; margin-top: 0; }
    .card {
      padding: 15px 16px;
      border-top: 4px solid var(--blue);
      min-height: 126px;
    }
    .card:nth-child(2n) { border-top-color: var(--cyan); }
    .card:nth-child(3n) { border-top-color: var(--green); }
    .card:nth-child(4n) { border-top-color: var(--amber); }
    .card:nth-child(5n) { border-top-color: var(--violet); }
    .card strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      margin-bottom: 7px;
    }
    .card span { color: var(--muted); font-size: 14px; }
    .note {
      margin-top: 18px;
      padding: 14px 16px;
      color: var(--ink);
      border-left: 5px solid var(--blue);
      background: #f7fbff;
    }
    .note.warn { border-left-color: var(--amber); background: #fffaf0; }
    .note.stop { border-left-color: var(--red); background: #fff5f5; }
    .diagram {
      padding: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff, #f8fafc);
    }
    .diagram-title {
      color: var(--ink);
      font-weight: 750;
      margin-bottom: 12px;
    }
    .diagram svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .screenshot-panel {
      background: #0f172a;
      border: 1px solid #0f172a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 18px 38px rgba(15, 23, 42, 0.18);
    }
    .shot-top {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      background: #111827;
    }
    .shot-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }
    .shot-dot:nth-child(2) { background: #f59e0b; }
    .shot-dot:nth-child(3) { background: #22c55e; }
    .shot-url {
      min-width: 0;
      flex: 1;
      margin-left: 8px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #cbd5e1;
      font: 11px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .shot-body {
      background: #f8fafc;
      min-height: 360px;
      padding: 16px;
      color: var(--text);
    }
    .shot-layout {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr);
      gap: 12px;
      min-height: 328px;
    }
    .shot-sidebar, .shot-inspector {
      background: #ffffff;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      padding: 12px;
    }
    .shot-main {
      background: #ffffff;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
    }
    .shot-kicker {
      color: var(--muted);
      font: 700 10px/1.3 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .shot-title {
      color: var(--ink);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .shot-line {
      height: 8px;
      border-radius: 999px;
      background: #dbe4ee;
      margin: 8px 0;
    }
    .shot-line.short { width: 62%; }
    .shot-line.mid { width: 78%; }
    .shot-cardgrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin-top: 14px;
    }
    .shot-card {
      min-height: 72px;
      border: 1px solid #d7dee8;
      border-top: 3px solid var(--blue);
      border-radius: 7px;
      background: #ffffff;
      padding: 10px;
    }
    .shot-card:nth-child(2n) { border-top-color: var(--cyan); }
    .shot-card:nth-child(3n) { border-top-color: var(--green); }
    .shot-pill {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eaf2ff;
      color: var(--blue);
      font-size: 11px;
      font-weight: 750;
      margin: 0 4px 6px 0;
    }
    .shot-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 12px;
    }
    .shot-button {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      padding: 6px 9px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
    }
    .shot-graph {
      min-height: 172px;
      border: 1px dashed #a8b3c3;
      border-radius: 8px;
      position: relative;
      background:
        linear-gradient(90deg, rgba(203, 213, 225, 0.35) 1px, transparent 1px),
        linear-gradient(rgba(203, 213, 225, 0.35) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .shot-node {
      position: absolute;
      min-width: 88px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #1d4ed8;
      color: #fff;
      font-size: 12px;
      font-weight: 750;
      text-align: center;
    }
    .shot-node.reviewer { left: 42%; top: 42px; background: var(--cyan); }
    .shot-node.repair { right: 8%; top: 92px; background: var(--amber); }
    .shot-node.worker { left: 7%; top: 92px; }
    .shot-log {
      margin-top: 10px;
      border-radius: 7px;
      background: #0f172a;
      color: #cbd5e1;
      padding: 10px;
      font: 11px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      min-height: 92px;
    }
    .shot-caption {
      color: #cbd5e1;
      background: #111827;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding: 10px 13px;
      font-size: 12px;
    }
    .caption {
      color: var(--muted);
      font-size: 13px;
      margin: 12px 0 0;
    }
    .matrix {
      display: grid;
      grid-template-columns: 180px 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
      margin-top: 18px;
    }
    .matrix div {
      padding: 11px 12px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .matrix div:nth-child(3n) { border-right: 0; }
    .matrix div:nth-last-child(-n+3) { border-bottom: 0; }
    .matrix .head {
      background: var(--soft);
      color: var(--muted);
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
    }
    .matrix .rowhead {
      color: var(--ink);
      font-weight: 750;
    }
    .sources {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .source-list {
      padding: 14px 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .source-list strong {
      display: block;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .source-list ul { margin: 0; padding-left: 18px; }
    .source-list li { margin: 5px 0; }
    footer {
      color: var(--muted);
      font-size: 13px;
      max-width: 1220px;
      margin: 0 auto;
      padding: 0 22px 52px;
    }
    footer strong { color: var(--ink); }
    @media (max-width: 980px) {
      .hero, .body-grid { grid-template-columns: 1fr; }
      .hero { min-height: auto; padding: 36px; }
      .cards, .sources { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 680px) {
      .chrome-inner { padding: 9px 14px; }
      .brand { font-size: 13px; }
      .progress { display: none; }
      .deck { padding: 18px 12px 48px; }
      .hero, .slide { padding: 24px 18px; }
      .hero-metrics, .cards, .sources { grid-template-columns: 1fr; }
      .slide-head { grid-template-columns: 1fr; gap: 6px; }
      .num { padding-top: 0; }
      .shot-body { min-height: 0; padding: 12px; }
      .shot-layout { grid-template-columns: 1fr; min-height: 0; }
      .shot-sidebar { display: none; }
      .shot-cardgrid { grid-template-columns: 1fr; }
      .matrix { grid-template-columns: 1fr; }
      .matrix div, .matrix div:nth-child(3n), .matrix div:nth-last-child(-n+3) {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
    }
    @media print {
      body { background: #fff; }
      .chrome { display: none; }
      .deck { padding: 0; }
      .hero, .slide {
        box-shadow: none;
        border: 0;
        border-radius: 0;
        min-height: auto;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <header class="chrome">
    <div class="chrome-inner">
      <div class="brand" data-i18n="brand">Living Docs / Compositor / Harness</div>
      <div class="chrome-actions">
        <div class="progress" id="progress">00 / 25</div>
        <div class="toggle" role="group" aria-label="Language">
          <button type="button" data-lang="en" aria-pressed="true">EN</button>
          <button type="button" data-lang="nl" aria-pressed="false">NL</button>
        </div>
      </div>
    </div>
  </header>
  <main class="deck">
    <section class="hero" id="hero">
      <div>
        <p class="eyebrow" data-i18n="eyebrow"></p>
        <h1 data-i18n="heroTitle"></h1>
        <p class="lede" data-i18n="heroLede"></p>
      </div>
      <div class="hero-metrics" id="metrics"></div>
    </section>
    <div id="slides"></div>
  </main>
  <footer>
    <p><strong data-i18n="footerTitle"></strong><br><span data-i18n="footerText"></span></p>
  </footer>

  <script>
    (function () {
      var totalSlides = 25;
      var lang = "en";

      var UI = {
        en: {
          brand: "Living Docs / Compositor / Harness",
          eyebrow: "Operator presentation / 25 pages / standalone HTML",
          heroTitle: "Living docs turn agent work into an inspectable lifecycle.",
          heroLede: "A living doc is not a report after the work. It is the structured surface that carries the objective, evidence, governance, and proof while work is still moving. The compositor makes that surface operable; the standalone harness turns it into a loop of contract-bound inference units that continue until closure is proven or the user explicitly stops the run.",
          footerTitle: "Self-contained static presentation",
          footerText: "Inline CSS, inline JavaScript, inline SVG diagrams, bilingual English/Dutch copy, and no external runtime dependencies.",
          metrics: [
            ["25", "presentation pages"],
            ["50", "registry convergence types in the current source"],
            ["2", "allowed terminal signals"],
            ["0", "ambient tool inheritance for local harness units"]
          ]
        },
        nl: {
          brand: "Living Docs / Compositor / Harness",
          eyebrow: "Operatorpresentatie / 25 pagina's / zelfstandige HTML",
          heroTitle: "Living docs maken agentwerk een inspecteerbare lifecycle.",
          heroLede: "Een living doc is geen rapport na afloop. Het is het gestructureerde oppervlak dat doel, bewijs, governance en afsluitingsdruk draagt terwijl het werk nog beweegt. De compositor maakt dat oppervlak bestuurbaar; de standalone harness maakt er een loop van contract-gebonden inference-units van die doorgaan tot afsluiting bewezen is of de user de run expliciet stopt.",
          footerTitle: "Zelfstandige statische presentatie",
          footerText: "Inline CSS, inline JavaScript, inline SVG-diagrammen, tweetalige Engels/Nederlandse copy en geen externe runtime-afhankelijkheden.",
          metrics: [
            ["25", "presentatiepagina's"],
            ["50", "registry convergence-types in de huidige bron"],
            ["2", "toegestane eindsignalen"],
            ["0", "ambient tool-erfenis voor local-harness-units"]
          ]
        }
      };

      var slides = [
        {
          n: 1,
          diagram: "surface",
          en: {
            title: "A living doc is a working surface, not a report.",
            summary: "The document exists before closure, not after it. It names the objective, keeps current state visible, and carries the evidence that later units and humans must inspect.",
            body: [
              "A report explains what happened. A living doc constrains what is allowed to happen next. It gives the work a durable surface after chat context decays.",
              "The practical difference is accountability. If the objective says the dashboard must show the selected unit's log stream, then the document must keep that pressure visible until the proof exists."
            ],
            cards: [
              ["Before work", "Objective, success condition, and acceptance criteria are written before the first run."],
              ["During work", "Workers, reviewers, repair units, and humans update the same structured state."],
              ["At closure", "The verdict points to preserved objective terms, proven criteria, and valid invariants."]
            ],
            note: "A living doc is where work is held, challenged, repaired, and closed."
          },
          nl: {
            title: "Een living doc is een werkoppervlak, geen rapport.",
            summary: "Het document bestaat vóór afsluiting, niet erna. Het benoemt het doel, houdt de actuele toestand zichtbaar en draagt het bewijs dat latere units en mensen moeten inspecteren.",
            body: [
              "Een rapport legt uit wat er gebeurde. Een living doc begrenst wat er daarna mag gebeuren. Het geeft werk een duurzaam oppervlak nadat chatcontext verdwijnt.",
              "Het praktische verschil is toerekenbaarheid. Als het doel zegt dat het dashboard de logstream van de geselecteerde unit moet tonen, dan houdt het document die druk zichtbaar tot het bewijs bestaat."
            ],
            cards: [
              ["Voor het werk", "Doel, succesconditie en acceptatiecriteria staan vast vóór de eerste run."],
              ["Tijdens het werk", "Workers, reviewers, repair-units en mensen wijzigen dezelfde gestructureerde toestand."],
              ["Bij afsluiting", "Het verdict wijst naar behouden doeltermen, bewezen criteria en geldige invarianten."]
            ],
            note: "Een living doc is waar werk wordt vastgehouden, betwist, gerepareerd en afgesloten."
          }
        },
        {
          n: 2,
          en: {
            title: "The original failure mode is lifecycle handoff.",
            summary: "AI sessions stop. Context decays. Humans keep stitching runs together by restating the goal, reloading artifacts, and deciding whether the last output was proof or only motion.",
            body: [
              "The hidden labor is not prompting. It is lifecycle control: reconstruct the objective, inspect prior artifacts, choose the next move, and prevent progress-shaped work from becoming closure.",
              "The harness exists because that work can be made explicit. A controller can route units. A reviewer can inspect logs. A repair chain can run. A stop rule can be enforced."
            ],
            cards: [
              ["Session loss", "The agent's local context disappears when a run ends."],
              ["Human glue", "The operator has to decide whether to continue, repair, escalate, or stop."],
              ["Premature closure", "A green test or confident summary can still miss the objective."]
            ]
          },
          nl: {
            title: "De oorspronkelijke foutmodus is lifecycle-overdracht.",
            summary: "AI-sessies stoppen. Context vervalt. Mensen blijven runs aan elkaar naaien door het doel te herhalen, artefacten te herladen en te bepalen of de vorige output bewijs was of alleen beweging.",
            body: [
              "De verborgen arbeid is niet prompten. Het is lifecycle-control: het doel reconstrueren, eerdere artefacten inspecteren, de volgende stap kiezen en voorkomen dat voortgangsvormig werk afsluiting wordt.",
              "De harness bestaat omdat dat werk expliciet kan worden gemaakt. Een controller kan units routeren. Een reviewer kan logs inspecteren. Een repair-keten kan draaien. Een stopregel kan worden afgedwongen."
            ],
            cards: [
              ["Sessieverlies", "De lokale context van de agent verdwijnt wanneer een run eindigt."],
              ["Menselijke lijm", "De operator moet bepalen of het werk doorgaat, reparatie nodig heeft, escaleert of stopt."],
              ["Te vroege afsluiting", "Een groene test of zekere samenvatting kan het doel nog steeds missen."]
            ]
          }
        },
        {
          n: 3,
          diagram: "structure",
          en: {
            title: "The document carries the objective, state, governance, relationships, and proof.",
            summary: "A living doc is structured enough for a machine to inspect and concrete enough for a human to challenge.",
            body: [
              "The current format is not a prose blob. It has named fields for objective, success condition, run state, acceptance criteria, governance, relationship maps, evidence, and proof ladders.",
              "That shape matters because each later unit can ask the same questions: What term is accountable? What criterion is unresolved? Which artifact is evidence? Which invariant would be broken by this transition?"
            ],
            cards: [
              ["Objective", "What must be true at closure."],
              ["Acceptance", "Criteria tied to objective terms and proof expectations."],
              ["Governance", "Invariants, facets, coverage, and transition pressure."],
              ["Evidence", "Commands, paths, logs, rendered docs, blocker records."],
              ["Relationships", "Edges between criteria, evidence, sections, systems, and runs."],
              ["Proof", "The ladder a reviewer must climb before closure."]

        return '<aside class="diagram" aria-label="' + esc(title) + '"><div class="diagram-title">' + esc(title) + '</div><svg viewBox="0 0 840 290" role="img" aria-label="' + esc(captions[lang][type] || title) + '"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#a8b3c3"/></marker></defs><rect x="1" y="1" width="838" height="288" rx="12" fill="#f8fafc" stroke="#d7dee8"/>' + edges + nodeSvg + '</svg><p class="caption">' + esc(captions[lang][type] || "") + '</p></aside>';
      }

      function screenshotPanel(type) {
        var t = {
          en: {
            compositor: {
              url: "file://living-doc.html#compositor",
              title: "Compositor workbench",
              kicker: "embedded editor",
              side: ["Library", "Sections", "Governance", "Evidence", "Render"],
              buttons: ["Add section", "Edit card", "Validate", "Render"],
              cards: ["Acceptance criteria", "Proof ladder", "Relationship map", "Current state"],
              caption: "Screenshot-style compositor view: local library, section navigation, editing controls, and typed cards share one workbench."
            },
            render: {
              url: "file://docs/living-doc-harness-realtime-dashboard.html",
              title: "Rendered living doc",
              kicker: "standalone html",
              side: ["Objective", "Acceptance", "Governance", "Proof", "Artifacts"],
              buttons: ["Open compositor", "Inspect source", "Print"],
              cards: ["Objective facet", "Proof evidence", "Invariant", "Coverage edge"],
              caption: "Screenshot-style render view: the same standalone artifact is readable, navigable, and ready to become operable again."
            },
            dashboard: {
              url: "local dashboard / lifecycles",
              title: "Realtime harness dashboard",
              kicker: "active lifecycle run",
              side: ["Run selector", "ldhl-20260510", "running", "local-only"],
              caption: "Screenshot-style dashboard view: active unit, contract handoff, selected log stream, blockers, and persisted lifecycle state."
            }
          },
          nl: {
            compositor: {
              url: "file://living-doc.html#compositor",
              title: "Compositor-werkbank",
              kicker: "embedded editor",
              side: ["Bibliotheek", "Secties", "Governance", "Bewijs", "Render"],
              buttons: ["Sectie toevoegen", "Kaart bewerken", "Valideren", "Renderen"],
              cards: ["Acceptatiecriteria", "Bewijsladder", "Relatiekaart", "Actuele status"],
              caption: "Screenshot-achtig compositorbeeld: lokale bibliotheek, sectienavigatie, bewerkingsknoppen en getypeerde kaarten delen een werkbank."
            },
            render: {
              url: "file://docs/living-doc-harness-realtime-dashboard.html",
              title: "Gerenderd living doc",
              kicker: "zelfstandige html",
              side: ["Doel", "Acceptatie", "Governance", "Bewijs", "Artefacten"],
              buttons: ["Open compositor", "Inspecteer bron", "Print"],
              cards: ["Doelfacet", "Bewijs", "Invariant", "Coverage-edge"],
              caption: "Screenshot-achtig renderbeeld: hetzelfde zelfstandige artefact is leesbaar, navigeerbaar en klaar om opnieuw bestuurbaar te worden."
            },
            dashboard: {
              url: "lokaal dashboard / lifecycles",
              title: "Realtime harness-dashboard",
              kicker: "actieve lifecycle-run",
              side: ["Run-selector", "ldhl-20260510", "running", "local-only"],
              caption: "Screenshot-achtig dashboardbeeld: actieve unit, contracthandoff, geselecteerde logstream, blockers en persisted lifecycle-status."
            }
          }
        }[lang][type];
        var side = t.side.map(function (item) {
          return '<div class="shot-line ' + (item.length < 8 ? 'short' : 'mid') + '"></div><div class="shot-kicker">' + esc(item) + '</div>';
        }).join("");
        var body = "";
        if (type === "dashboard") {
          body = '<div class="shot-layout"><div class="shot-sidebar">' + side + '</div><div class="shot-main"><div class="shot-kicker">' + esc(t.kicker) + '</div><div class="shot-title">' + esc(t.title) + '</div><div class="shot-graph"><div class="shot-node worker">worker</div><div class="shot-node reviewer">reviewer</div><div class="shot-node repair">repair</div></div><div class="shot-log">[10:24:02] opened worker codex-events.jsonl<br>[10:24:05] selected toolProfile: local-harness<br>[10:24:10] contract handoff: reviewer -&gt; balance-scan</div></div></div>';
        } else {
          body = '<div class="shot-layout"><div class="shot-sidebar">' + side + '</div><div class="shot-main"><div class="shot-kicker">' + esc(t.kicker) + '</div><div class="shot-title">' + esc(t.title) + '</div><div class="shot-toolbar">' + t.buttons.map(function (button) { return '<span class="shot-button">' + esc(button) + '</span>'; }).join("") + '</div><div class="shot-line"></div><div class="shot-line mid"></div><div class="shot-line short"></div><div class="shot-cardgrid">' + t.cards.map(function (card) { return '<div class="shot-card"><span class="shot-pill">' + esc(card) + '</span><div class="shot-line mid"></div><div class="shot-line short"></div></div>'; }).join("") + '</div></div></div>';
        }
        return '<figure class="screenshot-panel" aria-label="' + esc(t.title) + '"><div class="shot-top"><span class="shot-dot"></span><span class="shot-dot"></span><span class="shot-dot"></span><div class="shot-url">' + esc(t.url) + '</div></div><div class="shot-body">' + body + '</div><figcaption class="shot-caption">' + esc(t.caption) + '</figcaption></figure>';
      }

      function matrix(rows) {
        return '<div class="matrix">' + rows.map(function (row, rowIndex) {
          return row.map(function (cell) {
            return '<div class="' + (rowIndex === 0 ? 'head' : (row.indexOf(cell) === 0 ? 'rowhead' : '')) + '">' + rich(cell) + '</div>';
          }).join("");
        }).join("") + '</div>';
      }

      function render() {
        document.documentElement.lang = lang;
        var ui = UI[lang];
        Object.keys(ui).forEach(function (key) {
          if (typeof ui[key] === "string") {
            document.querySelectorAll('[data-i18n="' + key + '"]').forEach(function (el) { el.textContent = ui[key]; });
          }
        });
        document.getElementById("metrics").innerHTML = ui.metrics.map(function (m) {
          return '<div class="metric"><strong>' + esc(m[0]) + '</strong><span>' + esc(m[1]) + '</span></div>';
        }).join("");
        document.querySelectorAll("[data-lang]").forEach(function (button) {
          button.setAttribute("aria-pressed", button.getAttribute("data-lang") === lang ? "true" : "false");
        });
        document.getElementById("slides").innerHTML = slides.map(function (slide) {
          var copy = slide[lang];
          var body = copy.body.map(function (p) { return '<p>' + rich(p) + '</p>'; }).join("");
          var cards = copy.cards ? '<div class="cards">' + copy.cards.map(function (card) {
            return '<div class="card"><strong>' + rich(card[0]) + '</strong><span>' + rich(card[1]) + '</span></div>';
          }).join("") + '</div>' : "";
          var note = copy.note ? '<div class="note ' + (slide.n === 23 ? 'stop' : '') + '">' + rich(copy.note) + '</div>' : "";
          var matrixHtml = copy.matrix ? matrix(copy.matrix) : "";
          var sources = copy.sources ? '<div class="sources">' + copy.sources.map(function (group) {
            return '<div class="source-list"><strong>' + esc(group[0]) + '</strong><ul>' + group[1].map(function (item) { return '<li><code>' + esc(item) + '</code></li>'; }).join("") + '</ul></div>';
          }).join("") + '</div>' : "";
          var hasVisual = slide.diagram || slide.screenshot;
          var visual = slide.screenshot ? screenshotPanel(slide.screenshot) : (slide.diagram ? diagram(slide.diagram, copy) : cards);
          var primaryCards = hasVisual ? cards : "";
          return '<section class="slide" id="slide-' + slide.n + '"><div class="slide-head"><div class="num">' + String(slide.n).padStart(2, "0") + ' / ' + totalSlides + '</div><div><h2>' + rich(copy.title) + '</h2><p class="summary">' + rich(copy.summary) + '</p></div></div><div class="body-grid"><div class="copy">' + body + primaryCards + matrixHtml + note + sources + '</div><div>' + visual + '</div></div></section>';
        }).join("");
        updateProgress();
      }

      function updateProgress() {
        var sections = Array.prototype.slice.call(document.querySelectorAll(".slide"));
        var current = 0;
        var fold = window.innerHeight * 0.38;
        sections.forEach(function (section, index) {
          if (section.getBoundingClientRect().top <= fold) current = index + 1;
        });
        document.getElementById("progress").textContent = String(current).padStart(2, "0") + " / " + totalSlides;
      }

      document.querySelectorAll("[data-lang]").forEach(function (button) {
        button.addEventListener("click", function () {
          lang = button.getAttribute("data-lang");
          try { localStorage.setItem("ldc-presentation-lang", lang); } catch (_) {}
          render();
        });
      });
      try {
        var saved = localStorage.getItem("ldc-presentation-lang");
        if (saved === "en" || saved === "nl") lang = saved;
      } catch (_) {}
      window.addEventListener("scroll", updateProgress, { passive: true });
      window.addEventListener("resize", updateProgress);
      render();
    })();
  </script>
</body>
</html>
