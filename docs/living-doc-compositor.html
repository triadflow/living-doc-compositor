      "templateGoodFor": "Cocok untuk",
      "useTemplate": "Pakai template",
      "itemBlueprint": "Cetak biru item — setiap entri akan memiliki:",
      "populatedBy": "Isi dengan data sumber nyata",
      "noSections": "Belum ada seksi. Pilih tipe konvergensi di panel kiri.",
      "loadTitle": "Muat Living Doc JSON",
      "pasteJson": "Tempel JSON atau pilih file",
      "loadFromFile": "Atau muat dari file",
      "cancel": "Batal",
      "apply": "Muat",
      "invalidJson": "JSON tidak valid",
      "exportedTo": "terunduh. Pindahkan ke folder docs/ agar pustaka dan renderer dapat menemukannya:",
      "sections": "seksi",
      "items": "item",
      "more": "lagi",
      "noneYet": "Belum tersedia",
      "text": "teks",
      "list": "daftar",
      "guideIntroTitle": "Apa ini?",
      "guideIntro1": "Pekerjaan Anda tersebar di banyak tempat. Desain di Figma. Kode di repo. Tiket di GitHub. Workflow di CI. Keputusan di percakapan. Untuk memahami keadaan sebenarnya, Anda harus mengunjungi semuanya dan menyatukannya sendiri.",
      "guideIntro2": "Living doc menyatukan potongan-potongan itu dalam satu dokumen JSON terstruktur dan satu snapshot HTML portabel. Ini bukan halaman wiki terpisah: ID sumber, tautan, field status, lineage, dan panduan registri tetap terlihat agar manusia dan agent tahu dari mana harus menyegarkannya.",
      "guideIntro3": "Compositor adalah permukaan authoring untuk struktur itu. Gunakan template, tipe konvergensi, pustaka lokal, dan prompt builder untuk menentukan apa yang masuk ke dokumen; lalu render JSON menjadi halaman mandiri saat perlu dibagikan.",
      "guideGrowTitle": "Living doc tumbuh",
      "guideGrow1": "Anda tidak merancang seluruh struktur di awal. Anda mulai dengan satu atau dua tipe konvergensi yang sesuai dengan apa yang sedang Anda kerjakan. Kemudian, saat bekerja, pola baru muncul.",
      "guideGrow2": "Mungkin Anda mulai dengan melacak kapabilitas dan status implementasinya. Lalu Anda menyadari perlu tahu apakah implementasi sesuai desain — jadi Anda menambahkan seksi alignment. Kemudian, Anda menambahkan permukaan verifikasi. Setiap penambahan adalah satu klik di compositor atau satu baris di JSON.",
      "guideGrow3": "Struktur berevolusi bersama pekerjaan, bukan mendahuluinya. Data yang ada tetap utuh saat Anda menambahkan seksi baru. Living doc menjadi lebih lengkap seiring waktu, bukan lebih rumit — karena setiap seksi adalah tipe konvergensi mandiri dengan bentuk yang diketahui.",
      "guideStartTitle": "Memulai",
      "guideStart1": "Buka compositor langsung untuk pekerjaan struktur cepat. Sajikan folder docs saat browser perlu mengambil manifest pustaka lokal atau file JSON sibling.",
      "guideStartFile": "Buat atau muat dokumen",
      "guideStartFileBody": "Mulai dokumen baru, muat JSON yang ada, atau pilih starter maupun template lengkap dari rail Templates. Atur identitas, tujuan, bentuk seksi, dan tipe konvergensi terlebih dahulu; isi data sumber detail di JSON.",
      "guideStartServe": "Gunakan pustaka lokal",
      "guideStartServeBody": "Buat manifest pustaka yang sudah disanitasi dari katalog lokal Anda, lalu sajikan folder docs agar browser dapat mengambilnya:",
      "guideStartServeCmd": "node scripts/export-living-doc-library.mjs\ncd docs && python3 -m http.server 8111",
      "guideStartServeThen": "Buka http://localhost:8111/living-doc-compositor.html. Settings default ke ./living-doc-library.local.json dan juga dapat menyertakan discovery JSON sibling.",
      "guideStartPrompt": "Gunakan prompt builder",
      "guideStartPromptBody": "Panel prompt menyalin satu prompt siap-agent yang dibentuk oleh identitas dokumen, peta seksi, payload saat ini, semantik template, dan registry promptGuidance.",
      "guideStartRender": "Render dan bagikan",
      "guideStartRenderBody": "Setelah mengekspor atau memperbarui JSON kanonik, hasilkan snapshot HTML mandiri:",
      "guideStartRenderCmd": "node scripts/render-living-doc.mjs docs/my-doc.json",
      "guideStartRenderResult": "Menghasilkan docs/my-doc.html dengan identitas snapshot, lineage, navigasi sidebar, dan compositor lengkap yang di-embed.",
      "guideStartShare": "Bagikan dengan aman",
      "guideStartShareBody": "File HTML yang dibagikan dapat berisi hanya dokumen saat ini atau indeks pustaka terfilter. Gunakan --share-safe saat membuat manifest yang boleh keluar dari mesin Anda; indeks terfilter berisi metadata tersanitasi, bukan path lokal mentah.",
      "guideIntroTransition": "Di bawah ini cara kerjanya secara teknis.",
      "guideMakeTitle": "Buat Sendiri",
      "guideMakeIntro": "Tidak ada tipe konvergensi yang cocok dengan domain Anda? Anda bisa mendefinisikan yang baru. Tipe konvergensi adalah jawaban dari satu pertanyaan: hal-hal apa yang terus muncul bersamaan?",
      "guideMakeStep1title": "Kenali polanya",
      "guideMakeStep1body": "Anda terus memeriksa tiga atau empat hal yang sama secara bersamaan. Modul Terraform dan sumber daya AWS. Suite pengujian dan laporan cakupan. Kontrak API dan implementasi klien. Pengelompokan berulang itu adalah konvergensi Anda.",
      "guideMakeStep2title": "Sebutkan sumbernya",
      "guideMakeStep2body": "Setiap hal dalam pengelompokan itu adalah tipe entitas. Daftarkan: \"Modul Terraform + sumber daya AWS + workflow deployment.\" Ini adalah sumber yang menghasilkan konvergensi Anda.",
      "guideMakeStep3title": "Identifikasi properti yang dipinjam",
      "guideMakeStep3body": "Status apa yang Anda pedulikan saat melihat pengelompokan ini? Terdeploy vs drift? Tercakup vs tidak tercakup? Status itu tidak disimpan — diturunkan dari sumbernya.",
      "guideMakeStep4title": "Bandingkan dengan tipe yang ada",
      "guideMakeStep4body": "Sebelum membuat tipe baru, bandingkan dengan yang sudah ada. Apakah ini benar-benar kombinasi sumber baru, atau instance dari tipe yang ada dengan batas lingkup berbeda?",
      "guideMakeStep5title": "Tambahkan ke registri",
      "guideMakeStep5body": "Satu entri JSON di living-doc-registry.json. Definisikan name, icon, projection, sources atau edge sources, statusFields atau edgeStatus, dan promptGuidance. Tambahkan textFields atau detailsFields jika kartu membutuhkan teks lebih kaya. Tidak perlu perubahan kode renderer.",
      "guideMakeOr": "Gunakan ikhtisar registri sebelum menambah tipe. Advisor skill masih dapat membantu menemukan bentuknya, memeriksa overlap, dan menulis entri registri.",
      "guideConcept": "Konsep",
      "guideConceptBody": "Living doc adalah tampilan subgraf — proyeksi navigasi dari entitas dan relasinya. JSON kanonik menyimpan proyeksi saat ini; HTML yang dirender adalah snapshot portabel dengan tool lengkap di-embed. Registri memberi tahu pembaca dan agent arti setiap seksi.",
      "guideFundamentals": "Tiga Dasar",
      "entity": "Entitas",
      "entityDesc": "Memiliki identitas, memiliki properti sendiri. Halaman Figma, tiket, file kode, endpoint API.",
      "edge": "Relasi",
      "edgeDesc": "Hubungan bertipe antara entitas. Mengimplementasi, menspesifikasi, menguji, mendeploy.",
      "scope": "Lingkup",
      "scopeDesc": "Konvergensi bernama dari entitas. Bentuk seksi, field status, dan perilaku prompt berasal dari registri dan data sumber.",
      "guideCtTitle": "Tipe Konvergensi",
      "guideCtBody": "Setiap tipe adalah kombinasi spesifik dari entitas sumber plus kontrak registri: proyeksi, sumber, field status, field teks/detail opsional, dan promptGuidance. Compositor dan renderer membaca kontrak itu alih-alih meng-hard-code perilaku tipe.",
      "guideConstraints": "Batasan Utama",
      "constraint1title": "Registri memiliki makna tipe.",
      "constraint1body": "Tambah atau ubah perilaku konvergensi di scripts/living-doc-registry.json, bukan melalui shortcut renderer.",
      "constraint2title": "JSON tetap kanonik.",
      "constraint2body": "HTML yang dirender adalah snapshot portabel dan bisa drift; perbarui JSON sumber dan render ulang saat fakta berubah.",
      "constraint3title": "Panduan prompt adalah bagian dari schema.",
      "constraint3body": "Setiap tipe harus menjelaskan cara inspeksi, pembaruan, pembedaan, dan pencegahan drift melalui promptGuidance.",
      "constraint4title": "Berbagi harus eksplisit.",
      "constraint4body": "Path katalog lokal tetap privat kecuali Anda sengaja mengekspor manifest tersanitasi atau metadata indeks terfilter.",
      "guideWorkflow": "Alur Kerja",
      "step1title": "Bentuk",
      "step1body": "Buat atau muat dokumen, pilih template jika berguna, dan pilih tipe konvergensi dari rail Structure.",
      "step2title": "Isi",
      "step2body": "Ekspor atau edit JSON kanonik dan isi array data setiap seksi dengan ID sumber nyata, field status, catatan, dan referensi.",
      "step3title": "Arahkan",
      "step3body": "Gunakan prompt builder saat agent membutuhkan peta seksi, payload, semantik template, dan registry slice saat ini.",
      "step4title": "Render",
      "step4body": "Hasilkan snapshot HTML mandiri dari JSON kanonik; halaman ekspor membawa identitas, lineage, dan compositor lengkap.",
      "guideInference": "Mengapa Ini Penting untuk Inferensi",
      "guideInferenceBody": "Abstraksi tingkat tinggi memampatkan ruang pencarian. Saat LLM melihat tipe konvergensi, ia langsung tahu: entitas apa di dalamnya, bagaimana hubungannya, apa arti status, dan di mana mencari saat ada masalah. Setiap token digunakan untuk penalaran tentang domain, bukan untuk memahami format dokumen.",
      "guideSkills": "Bagaimana Tetap Hidup",
      "guideSkillsBody": "Registri, file locale, renderer, prompt builder, manifest pustaka lokal, dan skill opsional menjaga dokumen tetap berguna. HTML dapat berjalan sendiri; JSON tetap menjadi sumber untuk penyegaran.",
      "skillBootstrap": "Bootstrap. Menghubungkan sesi ke living doc untuk repo saat ini. Menunjukkan apa yang ada, apa yang basi, dan membiarkan LLM memperbarui seksi sebagai bagian alami dari pekerjaan. Dokumen mendeskripsikan dirinya sendiri — skill hanya membuka pintunya.",
      "skillAdvisor": "Mitra berpikir. Membantu menemukan tipe konvergensi yang cocok untuk domain melalui dialog. Menunjukkan tipe yang ada sebagai contoh, mengidentifikasi pola baru, memeriksa overlap, dan menulis entri registri.",
      "skillRenderer": "Satu perintah, dokumen apa pun. Menyinkronkan registri, locale, dan template embedded, lalu menghasilkan HTML dengan identitas snapshot, sidebar, ikon, pelacakan scroll, dan compositor lengkap.",
      "skillCrystallize": "Proses penyempurnaan. Menurunkan objectiveFacets, coverage edges, invariants, dan rationale per-seksi dari dokumen yang bentuknya sudah stabil, lalu menyegel metaFingerprint. Jalankan saat struktur siap dikristalkan; jalankan ulang dengan --refresh jika seksi berubah.",
      "guideLayerIndexLabel": "Lapisan",
      "guideLayer1Title": "Mulai Di Sini",
      "guideLayer1Tagline": "Clone repo, tempel prompt di Claude Code, atau baca dulu konsepnya di halaman landing.",
      "guideLayer1LandingTitle": "Baca konsepnya dulu",
      "guideLayer1LandingBody": "Jika Anda tiba di sini lewat HTML snapshot yang dibagikan, halaman landing memuat pitch 30 detik beserta screenshot. Pemberhentian pertama yang baik sebelum meng-clone apa pun.",
      "guideLayer1LandingCta": "Buka halaman landing",
      "guideLayer1CloneTitle": "Clone repo",
      "guideLayer1CloneBody": "Node 18+ dan peramban. Tanpa instalasi, tanpa dependensi runtime selain renderer. Compositor yang sedang Anda lihat sekarang ada di docs/living-doc-compositor.html di dalam repo.",
      "guideLayer1ClaudeTitle": "Tempel ini ke Claude Code",
      "guideLayer1ClaudeBody": "Setelah meng-clone, buka repo di Claude Code dan tempel prompt di bawah. Prompt itu meminta agen membaca README, memilih starter template yang cocok dengan pekerjaan Anda, lalu menyiapkan living doc pertama Anda.",
      "guideLayer1ClaudePrompt": "Saya baru saja meng-clone triadflow/living-doc-compositor dan ingin membuat living doc pertama saya. Baca README dan scripts/living-doc-registry.json, lalu: (1) rekomendasikan starter template dari docs/ yang cocok untuk pekerjaan yang akan saya jelaskan berikutnya, (2) scaffold salinan JSON baru dengan judul dan scope saya, (3) render dengan node scripts/render-living-doc.mjs. Jika skill /living-doc relevan, panggil skill itu.",
      "guideLayer1RepoCta": "Buka repo GitHub",
      "guideLayer1Copy": "Salin",
      "guideLayer1Copied": "Disalin",
      "guideLayer2Title": "Gagasan",
      "guideLayer2Tagline": "Apa itu living doc, dan mengapa ia ada.",
      "guideLayer3Title": "Struktur",
      "guideLayer3Tagline": "Bagaimana dokumen dibentuk — entitas, edge, tipe konvergensi, dan registri yang mengaturnya.",
      "guideLayer4Title": "Lapisan Governance",
      "guideLayer4Tagline": "Lapisan di atas struktur — menyatakan maksud dokumen agar dapat ditalari tanpa penurunan ulang.",
      "guideLayer4Body1": "Setiap agen yang membuka living doc menurunkan hal yang sama secara diam-diam: faset tujuan mana yang dibawa setiap seksi, invarian mana yang harus berlaku, apakah dokumen masih mencakup seluruh pekerjaan. Lapisan governance mempromosikan penalaran diam itu menjadi data terstruktur di akar dokumen.",
      "guideLayer4Body2": "Empat field opsional berada di samping `title` dan `sections`: `objectiveFacets`, `coverage`, `invariants`, `metaFingerprint`. Tipe konvergensi baru — `coherence-map` — merender proyeksinya. `rationale` per-seksi merekam alasan tipe konvergensi dipilih di sini, dalam konteks dokumen ini.",
      "guideLayer4FacetsTitle": "Faset tujuan",
      "guideLayer4FacetsBody": "Uraikan kalimat tujuan bebas menjadi unit bertipe. Setiap faset memiliki id, nama, dan deskripsi. \"Kesetiaan UI\", \"koneksi repo\", \"push runtime\" menjadi dapat dialamati alih-alih prosa.",
      "guideLayer4CoverageTitle": "Edge coverage",
      "guideLayer4CoverageBody": "Setiap edge memetakan satu faset ke satu seksi pembawa dan opsional satu kartu di dalamnya. Coverage dapat dihitung — \"apakah faset X masih dibawa?\" menjadi selisih himpunan, bukan LLM-baca-ulang.",
      "guideLayer4InvariantsTitle": "Invarian",
      "guideLayer4InvariantsBody": "Kontrak lokal dokumen yang sudah diikutinya: \"keputusan bermigrasi keluar dari verifikasi\", \"setiap kapabilitas punya jalur kode\". Dibatasi pada id seksi atau seluruh dokumen via appliesTo. Ditegakkan saat perencanaan, bukan saat review.",
      "guideLayer4FingerprintTitle": "Sidik jari dan kesegaran",
      "guideLayer4FingerprintBody": "Sebuah sha256 dari struktur seksi pada saat kristalisasi. Merender banner ketika seksi bergeser tetapi meta tidak — coverage basi lebih buruk daripada tanpa coverage, sehingga drift menjadi nyaring.",
      "guideLayer4CrystallizeTitle": "Penyempurnaan pass-kedua, bukan gerbang authoring",
      "guideLayer4CrystallizeBody": "Jangan mengkristalkan iterasi awal — faset belum mengendap. Jalankan `/crystallize <doc>` saat bentuk sudah stabil; skill mengusulkan faset, coverage, invarian, dan rationale dari apa yang sudah ada di dokumen. Jalankan ulang dengan `--refresh` saat struktur berubah. Buka tab Flow untuk melihat faset dan coverage muncul saat skill menuliskannya.",
      "guideLayer4FlowIntro": "Tab Flow di compositor adalah permukaan utama untuk governance. Buka dokumen yang sudah dikristalkan, beralih ke Flow, dan lapisan tersebut menjadi kanvas: faset di kiri, seksi di tengah, invarian di kanan, dengan kabel bertipe di antara mereka.",
      "guideLayer4FlowFacets": "Di kanvas Flow: kolom kiri. Faset orphan dirender sebagai kartu merah muda dengan badge Orphan, sehingga celah dalam coverage terlihat sekilas. Seret port kanan faset ke port kiri seksi untuk menambahkan edge coverage.",
      "guideLayer4FlowCoverage": "Di kanvas Flow: kabel bezier abu-abu dari port kanan setiap faset ke port kiri seksi. Drift (seksi target telah dihapus) muncul sebagai kabel putus-putus merah yang mengarah ke kolom seksi. Klik kabel untuk menghapusnya.",
      "guideLayer4FlowInvariants": "Di kanvas Flow: kolom kanan, panah berwarna kuning kecoklatan dengan kepala panah menunjuk ke seksi yang mereka atur. Klik chip Doc-wide pada invarian untuk beralih `appliesTo: [\"*\"]`; panah-panah itu berkumpul menjadi satu panah yang menunjuk ke jangkar virtual di atas kolom seksi. Seret ke seksi tertentu untuk mengubah cakupan.",
      "guideLayer4FlowFingerprint": "Di kanvas Flow: banner berwarna kuning kecoklatan menempel di atas saat sidik jari basi. Kabel coverage dan invarian meredup dan desaturasi sehingga kondisi basi tak terbantahkan. Tombol Segel di banner menghitung ulang dan menyimpan sidik jari baru; tombol Crystallize menyalin `/crystallize <doc> --refresh` ke clipboard.",
      "guideLayer4ReadingTitle": "Membaca kanvas Flow",
      "guideLayer4ReadingBody": "Tiga kolom, tiga peran. Dua warna kabel, dua kondisi node. Satu footer miring per seksi.",
      "guideLayer4ReadingColumns": "Kolom · Faset tujuan (kiri) → seksi (tengah) → invarian (kanan). Setiap kolom adalah peran governance yang diungkapkan sebagai kolom.",
      "guideLayer4ReadingWires": "Kabel · Bezier abu-abu = coverage (faset dibawa oleh seksi). Bezier kuning kecoklatan dengan kepala panah = invarian (aturan mengatur seksi). Varian putus-putus menandakan drift atau pratinjau dalam progres.",
      "guideLayer4ReadingStates": "Kondisi · Kartu faset merah muda + badge Orphan = tidak ada edge coverage. Kabel putus-putus merah = drift (menunjuk ke seksi yang hilang). Kabel yang meredup + desaturasi = metaFingerprint basi.",
      "guideLayer4ReadingStats": "Bilah stats · Dipatri di atas: jumlah faset / seksi / coverage / invarian, rationale yang dinyatakan vs total, dan pil mencolok untuk jumlah orphan atau drift bila tidak nol.",
      "guideLayer4ReadingRationale": "Rationale · Kartu miring bergaris di bagian bawah setiap node seksi. Stub putus-putus \"belum ada rationale yang dinyatakan\" muncul saat field kosong sehingga celah authoring tetap terlihat.",
      "guideLayer4EditingTitle": "Menyunting lewat kanvas Flow",
      "guideLayer4EditingBody": "Setiap interaksi menulis ke `docExtras` yang sama yang digunakan oleh `/crystallize` dan editor tabulasi, sehingga kanvas tetap sinkron dengan tampilan lain.",
      "guideLayer4EditingDrag": "Seret port → buat kabel. Port-keluar faset ke port-masuk seksi menambahkan coverage (memilih cardId yang belum terpakai dari seksi). Port-keluar invarian ke port-kanan seksi menambahkan seksi itu ke `appliesTo`, menghapus `\"*\"` yang ada.",
      "guideLayer4EditingClick": "Klik kabel → hapus. Klik chip Doc-wide pada invarian → alihkan cakupan doc-wide. Klik kartu rationale seksi → sunting kalimat inline via prompt.",
      "guideLayer4EditingRemove": "× pada hover → hapus node. Faset mencascade coverage-nya; seksi sengaja meninggalkan edge coverage sebagai drift (sinyal visualnya tetap terlihat); invarian adalah penghapusan bersih.",
      "guideLayer4EditingPosition": "Seret body node → reposisi di kanvas (`flowPosition` tersimpan di node). Klik ganda → kembali ke kolom. Tombol reset tata letak di bilah stats → hapus semua posisi khusus.",
      "guideLayer4DeepTitle": "Sidik jari, kesegaran, dan momen kristalisasi",
      "guideLayer4DeepIntro": "Sidik jari murah untuk dihitung dan memikul banyak beban. Memahami apa yang di-hash, kapan menyegelnya, dan apa arti kesegaran mengubah governance dari label statis menjadi kontrak hidup.",
      "guideLayer4DeepHashTitle": "Apa yang di-hash oleh sidik jari",
      "guideLayer4DeepHashBody": "Sebuah sha256 dari setiap id seksi, convergenceType, dan id kartu yang berurutan. Stabil terhadap suntingan prosa di dalam kartu; tidak stabil ketika seksi ditambahkan atau dihapus, diganti nama, atau direstrukturisasi. Pilihannya disengaja — governance mengikuti struktur, bukan konten.",
      "guideLayer4DeepMomentTitle": "Momen kristalisasi",
      "guideLayer4DeepMomentBody": "Anggap ini seperti git commit pada makna dokumen. Sebelum penyegelan, dokumen dalam mode penemuan bentuk dan governance akan mengkristalkan dekomposisi yang buruk. Setelah penyegelan, governance terpaku pada kondisi struktural yang tepat. Kristalkan saat bentuk sudah cukup stabil sehingga seminggu suntingan kecil tidak akan mengubah bentuknya.",
      "guideLayer4DeepStatesTitle": "Tiga kondisi, tiga sikap",
      "guideLayer4DeepStatesBody": "Hilang — tidak ada sidik jari, tidak ada yang diperiksa; agen kembali ke penurunan prosa. Segar — tersimpan cocok dengan saat ini; agen secara deterministik menargetkan kartu yang tepat via edge coverage. Basi — tersimpan berbeda dari saat ini; kabel meredup dan agen harus kembali ke prosa karena coverage mungkin menunjuk ke kartu yang maknanya telah bergeser.",
      "guideLayer4DeepRitualsTitle": "Segel vs segarkan",
      "guideLayer4DeepRitualsBody": "Segel (dari banner Flow) — hitung ulang sha256 dan simpan. Mempertahankan faset, coverage, invarian, dan rationale yang ada. Gunakan ketika suntingan struktural netral-semantik (nama seksi yang baru saja ditambahkan, id kartu yang diatur ulang). Segarkan via `/crystallize <doc> --refresh` — jalankan ulang skill. Mengusulkan faset dan coverage yang diperbarui untuk struktur baru; mempertahankan field yang disunting penulis. Gunakan ketika perubahan benar-benar bentuk baru.",
      "guideLayer4DeepBridgeTitle": "Mengapa ini menjembatani authoring dan koherensi jangka panjang",
      "guideLayer4DeepBridgeBody": "Tanpa sidik jari, pertanyaan \"apakah dokumen ini masih koheren?\" membutuhkan pembacaan ulang LLM dan penilaian manusia pada setiap iterasi. Dengan sidik jari, ini adalah perbandingan hash. Pelipatan itu — dari penilaian ke verifikasi — yang mengubah living doc dari struktur beropini menjadi substrat yang dapat diuji. Seiring waktu memungkinkan evaluasi empiris terhadap bentuk dokumen mana yang benar-benar bekerja baik untuk pembaca manusia maupun agen.",
      "guideLayer5Title": "Memperluas Kosakata",
      "guideLayer5Tagline": "Membuat tipe konvergensi baru ketika yang ada tidak cocok.",
      "guideLayer6Title": "Bekerja dengan Living Docs",
      "guideLayer6Tagline": "Penggunaan sehari-hari: memuat, menyunting, merender, berbagi, skill."
    }
  };
  /* </generated:locales> */

  let locale = (() => {
    const lang = (navigator.language || 'en').toLowerCase();
    if (lang.startsWith('nl')) return 'nl';
    if (lang.startsWith('id') || lang.startsWith('ms')) return 'id';
    return 'en';
  })();
  function t(key) { return LOCALES[locale]?.[key] ?? LOCALES.en[key] ?? key; }

  /* ── Auto-save ── */
  const STORAGE_KEY = 'living-doc-compositor-state';
  const STORAGE_ACTIVE_KEY = STORAGE_KEY + ':active';
  const SETTINGS_STORAGE_KEY = 'living-doc-compositor-settings';
  function getDocStorageKey() {
    const id = state.docExtras?.docId || state.docExtras?.canonicalOrigin || '_default';
    return STORAGE_KEY + ':' + id;
  }
  function isLocalLibraryDiscoveryContext() {
    try {
      const { protocol, hostname } = window.location;
      return protocol === 'file:' || hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '::1';
    } catch {
      return false;
    }
  }
  const LOCAL_LIBRARY_DISCOVERY_DEFAULT = isLocalLibraryDiscoveryContext();
  const DEFAULT_SETTINGS = {
    libraryManifestUrl: './living-doc-library.local.json',
    preferManifest: LOCAL_LIBRARY_DISCOVERY_DEFAULT,
    includeSiblingDiscovery: LOCAL_LIBRARY_DISCOVERY_DEFAULT,
    defaultShareMode: 'none',
  };
  let appSettings = loadSettings();

  function autoSave() {
    // Embedded mode: block writes until the first postMessage-driven
    // applyDocumentData has landed. Otherwise a default-empty state can
    // shadow the doc on disk and produce a stale fingerprint banner. See #58.
    if (state.pendingDocLoad) return;
    try {
      const activeId = state.docExtras?.docId || state.docExtras?.canonicalOrigin || '_default';
      localStorage.setItem(getDocStorageKey(), JSON.stringify({
        title: state.title,
        subtitle: state.subtitle,
        brand: state.brand,
        objective: state.objective,
        successCondition: state.successCondition,
        docExtras: state.docExtras,
        sections: state.sections,
        locale,
      }));
      localStorage.setItem(STORAGE_ACTIVE_KEY, activeId);
    } catch {}
  }

  function autoLoad() {
    try {
      // Legacy single-key state migrates into a per-doc slot on first boot.
      const legacy = localStorage.getItem(STORAGE_KEY);
      if (legacy && !localStorage.getItem(STORAGE_ACTIVE_KEY)) {
        try {
          const parsed = JSON.parse(legacy);
          const id = parsed?.docExtras?.docId || parsed?.docExtras?.canonicalOrigin || '_default';
          localStorage.setItem(STORAGE_KEY + ':' + id, legacy);
          localStorage.setItem(STORAGE_ACTIVE_KEY, id);
          localStorage.removeItem(STORAGE_KEY);
        } catch {}
      }
      const activeId = localStorage.getItem(STORAGE_ACTIVE_KEY);
      if (!activeId) return false;
      const saved = localStorage.getItem(STORAGE_KEY + ':' + activeId);
      if (!saved) return false;
      const s = JSON.parse(saved);
      if (s.title || (s.sections && s.sections.length > 0)) {
        state.title = s.title || '';
        state.subtitle = s.subtitle || '';
        state.brand = s.brand || 'LD';
        state.objective = s.objective || '';
        state.successCondition = s.successCondition || '';
        state.docExtras = s.docExtras || {};
        state.sections = s.sections || [];
        if (s.locale && LOCALES[s.locale]) locale = s.locale;
        return true;
      }
    } catch {}
    return false;
  }

  /* ── Governance layer accessors (objectiveFacets / coverage / invariants / fingerprint) ── */
  function govFacets() {
    const list = state.docExtras?.objectiveFacets;
    return Array.isArray(list) ? list : [];
  }
  function govSetFacets(list) {
    state.docExtras = { ...(state.docExtras || {}), objectiveFacets: Array.isArray(list) ? list : [] };
  }
  function govCoverage() {

  }
  function govInvariants() {
    const list = state.docExtras?.invariants;
    return Array.isArray(list) ? list : [];
  }
  function govSetInvariants(list) {
    state.docExtras = { ...(state.docExtras || {}), invariants: Array.isArray(list) ? list : [] };
  }
  function govFingerprint() { return String(state.docExtras?.metaFingerprint || ''); }
  function govSetFingerprint(fp) {
    state.docExtras = { ...(state.docExtras || {}), metaFingerprint: String(fp || '') };
  }
  function govSlugifyId(value) {
    return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 64);
  }
  function govSectionSignature() {
    // Key names must match scripts/meta-fingerprint.mjs exactly — the Node
    // stamper and this browser check produce different sha256 hashes otherwise,
    // and every crystallized doc reads as stale in the Flow view. See #58.
    return JSON.stringify((state.sections || []).map((s) => ({
      id: String(s?.id || ''),
      type: String(s?.convergenceType || ''),
      cards: (Array.isArray(s?.data) ? s.data : []).map((item) => String(item?.id || '')).filter(Boolean),
    })));
  }
  async function govComputeFingerprint() {
    const canonical = govSectionSignature();
    if (!globalThis.crypto?.subtle) return '';
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(canonical));
    const hex = Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, '0')).join('');
    return `sha256:${hex}`;
  }
  function govDeriveCoherenceItems() {
    const facets = govFacets();
    const coverage = govCoverage();
    const invariants = govInvariants();
    const knownSectionIds = new Set((state.sections || []).map((s) => s.id));
    return facets.map((facet) => {
      const edges = coverage.filter((c) => c.facetId === facet.id);
      const carryingSectionIds = [...new Set(edges.map((e) => e.sectionId))];
      const anyDrift = edges.some((e) => !knownSectionIds.has(e.sectionId));
      const governing = invariants
        .filter((inv) => {
          const applies = Array.isArray(inv.appliesTo) ? inv.appliesTo : [];
          return applies.includes('*') || applies.some((s) => carryingSectionIds.includes(s));
        })
        .map((inv) => inv.id);
      let status;
      if (anyDrift) status = 'drift';
      else if (edges.length === 0) status = 'orphaned';
      else status = 'covered';
      return {
        id: facet.id,
        name: facet.name,
        description: facet.description || '',
        status,
        sectionIds: carryingSectionIds,
        invariantIds: governing,
      };
    });
  }

  function readDocMetaValue(source, field) {
    for (const key of [field.key, ...(field.aliases || [])]) {
      const value = source?.[key];
      if (typeof value === 'string' && value.trim()) return value.trim();
    }
    return '';
  }

  function writeDocMetaValue(target, field, value) {
    const keys = [field.key, ...(field.aliases || [])];
    const existingKey = keys.find((key) => Object.prototype.hasOwnProperty.call(target, key));
    const writeKey = existingKey || field.key;
    const trimmed = String(value ?? '').trim();
    for (const key of keys) {
      if (key !== writeKey) delete target[key];
    }
    if (trimmed) target[writeKey] = trimmed;
    else delete target[writeKey];
  }

  function slugifyDocIdSeed(value) {
    return String(value ?? '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function suggestDocId(doc, fallbackOrigin = '') {
    const current = readDocMetaValue(doc, DOC_ID_FIELD);
    if (current) return current;
    const seed = slugifyDocIdSeed(fallbackOrigin.replace(/\.(html|json)$/i, '')) || slugifyDocIdSeed(doc?.title) || 'living-doc';
    return `doc:${seed}`;
  }

  function normalizeFocusedSection() {
    const exists = state.sections.some((section) => section.id === state.focusedSectionId);
    if (!exists) {
      state.focusedSectionId = null;
      state.pendingFocusedSectionScroll = false;
    }
    return state.focusedSectionId;
  }

  function focusSection(sectionId) {
    if (!state.sections.some((section) => section.id === sectionId)) return;
    state.focusedSectionId = sectionId;
    state.pendingFocusedSectionScroll = true;
    renderLeft();

  }

  function scrollTargetIntoContainer(container, target, offset = 0) {
    if (!container || !target) return;
    const containerRect = container.getBoundingClientRect();
    const targetRect = target.getBoundingClientRect();
    const nextTop = targetRect.top - containerRect.top + container.scrollTop - offset;
    container.scrollTo({ top: Math.max(nextTop, 0), behavior: 'smooth' });
  }

  function syncFocusedSectionInPreview() {
    const focusedSectionId = normalizeFocusedSection();
    if (!focusedSectionId || !state.pendingFocusedSectionScroll) return;
    const candidates = state.previewTab === 'json'
      ? Array.from(document.querySelectorAll('.json-line[data-section-id]'))
      : state.previewTab === 'board'
        ? Array.from(document.querySelectorAll('.board-preview-card[data-section-id]'))
        : Array.from(document.querySelectorAll('.visual-section-card[data-section-id]'));
    const target = candidates.find((element) => element.dataset.sectionId === focusedSectionId);
    if (!target) return;
    state.pendingFocusedSectionScroll = false;
    requestAnimationFrame(() => {
      const jsonHost = target.closest('.json-preview');
      if (jsonHost) {
        scrollTargetIntoContainer(jsonHost, target, 16);
        return;
      }
      const boardHost = target.closest('.board-preview');
      if (boardHost) {
        scrollTargetIntoContainer(boardHost, target, 16);
        return;
      }
      const rightPanel = document.getElementById('right-panel');
      if (rightPanel) {
        scrollTargetIntoContainer(rightPanel, target, 104);
        return;
      }
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  function describeSourceCoverage(syncHints) {
    if (!syncHints || typeof syncHints !== 'object') return '';
    const pairs = Object.entries(syncHints)
      .map(([key, value]) => [String(key).trim(), String(value ?? '').trim()])
      .filter(([key, value]) => key && value);
    if (pairs.length === 0) return '';
    return pairs.map(([key, value]) => `${key}: ${value}`).join(' · ');

  function formatExactTimestamp(value) {
    const date = new Date(value);

    return date.toISOString().replace('.000Z', 'Z');

          "update": [

          "avoid": [

      `${sibling.entryCount || 0} ${t('libraryEntries')}`,
      sibling.error,
    ].filter(Boolean).join(' \u00b7 ');
    const checkedAt = status.checkedAt ? new Date(status.checkedAt).toLocaleString() : t('libraryStatusNotChecked');
    const rowClass = compact ? 'library-status-line' : 'settings-status-row';
    const labelClass = compact ? '' : 'settings-status-label';
    const valueClass = compact ? 'library-status-detail' : 'settings-status-value';
    return `
      <div class="${rowClass}">
        <strong class="${labelClass}">${esc(t('manifestStatus'))}</strong>
        ${libraryStatusPill(manifest.status)}
        <span class="${valueClass}">${esc(manifestDetail)}</span>
      </div>
      <div class="${rowClass}">
        <strong class="${labelClass}">${esc(t('siblingStatus'))}</strong>
        ${libraryStatusPill(sibling.status)}
        <span class="${valueClass}">${esc(siblingDetail)}</span>
      </div>
      <div class="${rowClass}">
        <strong class="${labelClass}">${esc(t('libraryLastChecked'))}</strong>
        <span class="${valueClass}">${esc(checkedAt)}</span>
      </div>`;
  }

  function isLibraryItemEditable(item) {
    return Boolean(item?.json || item?.jsonHref);
  }

  function libraryFilterValues(key) {
    return [...new Set(library.map((item) => String(item?.[key] || '').trim()).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b));
  }

  function getFilteredLibraryEntries() {
    const query = state.librarySearchQuery.trim().toLowerCase();
    const domain = state.libraryDomainFilter;
    const repo = state.libraryRepoFilter;
    return library
      .map((item, index) => ({ item, index }))
      .filter(({ item }) => {
        if (domain && item.domain !== domain) return false;
        if (repo && item.repo !== repo) return false;
        if (state.libraryEditableOnly && !isLibraryItemEditable(item)) return false;
        if (!query) return true;
        return [
          item.title,
          item.subtitle,
          item.domain,
          item.repo,
          item.filename,
          item.summary,
          item.syncSkill,
        ].some((value) => String(value || '').toLowerCase().includes(query));
      });
  }

  function isShareSafeHref(value) {
    const href = String(value || '').trim();
    if (!href) return false;
    if ((href.startsWith('./') || href.startsWith('../')) && !href.includes('\\')) return true;
    if (!href.startsWith('/') && !href.startsWith('~') && !href.includes('\\') && !/^[a-z][a-z0-9+.-]*:/i.test(href)) return true;
    try {
      const url = new URL(href, window.location.href);
      if (url.protocol === 'file:') return false;
      if (!['http:', 'https:'].includes(url.protocol)) return false;
      return !['localhost', '127.0.0.1', '::1'].includes(url.hostname);
    } catch {
      return false;
    }
  }

  function sanitizeLibraryIndexEntry(item) {
    const href = isShareSafeHref(item.href) ? item.href : undefined;
    const jsonHref = isShareSafeHref(item.jsonHref) ? item.jsonHref : undefined;
    const entry = {
      id: item.id || item.domain || item.title,
      title: item.title || 'Living doc',
      subtitle: item.subtitle || undefined,
      domain: item.domain || undefined,
      repo: item.repo || undefined,
      updated: item.updated || undefined,
      sectionCount: Number.isFinite(Number(item.sectionCount)) ? Number(item.sectionCount) : undefined,
      brand: item.brand || undefined,
      syncSkill: item.syncSkill || undefined,
      summary: item.summary || undefined,
      loadable: Boolean(jsonHref),
      source: item.source || (item.manifestEntry ? 'manifest' : undefined),
      href,
      jsonHref,
    };
    return Object.fromEntries(Object.entries(entry).filter(([, value]) => value !== undefined && value !== ''));
  }

  function buildSharedLibraryIndex() {
    if (appSettings.defaultShareMode !== 'index') return null;
    const filteredEntries = getFilteredLibraryEntries();
    return {
      schema: 'living-doc-shared-library-index/v1',
      generatedAt: new Date().toISOString(),
      mode: 'filtered-index',
      source: 'compositor-library-filter',
      filters: {
        query: state.librarySearchQuery.trim() || undefined,
        domain: state.libraryDomainFilter || undefined,
        repo: state.libraryRepoFilter || undefined,
        editableOnly: Boolean(state.libraryEditableOnly),
      },
      entryCount: filteredEntries.length,
      totalLibraryCount: library.length,
      entries: filteredEntries.map(({ item }) => sanitizeLibraryIndexEntry(item)),
    };
  }

  function renderLibraryFilters(filteredEntries) {
    if (!library.length) return '';
    const domains = libraryFilterValues('domain');
    const repos = libraryFilterValues('repo');
    const domainOptions = [`<option value="">${esc(t('allDomains'))}</option>`]
      .concat(domains.map((value) => `<option value="${esc(value)}"${state.libraryDomainFilter === value ? ' selected' : ''}>${esc(value)}</option>`))
      .join('');
    const repoOptions = [`<option value="">${esc(t('allRepos'))}</option>`]
      .concat(repos.map((value) => `<option value="${esc(value)}"${state.libraryRepoFilter === value ? ' selected' : ''}>${esc(value)}</option>`))
      .join('');
    return `
      <div class="library-filter-card">
        <label>
          ${esc(t('searchLibrary'))}
          <input id="library-search" value="${esc(state.librarySearchQuery)}" placeholder="${esc(t('searchLibraryPlaceholder'))}" />
        </label>
        <div class="library-filter-grid">
          <label>
            ${esc(t('domainFilter'))}
            <select id="library-domain-filter">${domainOptions}</select>
          </label>
          <label>
            ${esc(t('repoFilter'))}
            <select id="library-repo-filter">${repoOptions}</select>

        </div>
        <label class="library-filter-check">
          <input type="checkbox" id="library-editable-only"${state.libraryEditableOnly ? ' checked' : ''} />
          <span>${esc(t('editableOnly'))}</span>
        </label>
        <div class="library-filter-summary">${esc(t('showingLibraryEntries'))}: ${filteredEntries.length}/${library.length}</div>
      </div>`;
  }

              ${item.json || item.jsonHref ? `<span class="lib-sections">${esc(t('libraryEditableEntries'))}</span>` : ''}
              ${!item.json && !item.jsonHref && (item.href || item.localHtmlUrl) ? `<span class="lib-sections">${esc(t('libraryIndexOnlyEntries'))}</span>` : ''}
            </div>`).join('')}

    const filteredEmpty = library.length && filteredEntries.length === 0

      : '';
    return `${statusSummary}${filterControls}${currentDoc}${filteredEntries.length ? libList : filteredEmpty || libList}`;
  }

  /* ── Render left panel ── */
  function renderLeft() {
    rememberLeftDrawerScroll();
    const ct = REGISTRY.convergenceTypes;
    const groups = getConvergenceGroups();
    const railItems = getLeftRailItems(ct);
    const leftPanel = document.getElementById('left-panel');
    const drawerMeta = getLeftDrawerMeta();
    syncShellLayout();

    const renderRailButton = (item) => {
      const active = state.leftDrawerOpen && state.leftDrawerMode === item.key;
      return `
        <button class="rail-button${active ? ' active' : ''}" data-rail-mode="${esc(item.key)}" title="${esc(item.title)}" aria-label="${esc(item.title)}">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">${item.icon}</svg>
          <span class="rail-button-label">${esc(item.label)}</span>
          ${item.badge ? `<span class="rail-badge">${esc(String(item.badge))}</span>` : ''}
        </button>`;
    };
    const topRail = railItems.filter((item) => !item.bottom).map(renderRailButton).join('');
    const bottomRail = railItems.filter((item) => item.bottom).map(renderRailButton).join('');

    let drawerContent = '';
    if (state.leftDrawerMode === 'structure') drawerContent = renderStructureDrawer(groups);
    else if (state.leftDrawerMode === 'sections') drawerContent = renderSectionsDrawer(ct);
    else if (state.leftDrawerMode === 'templates') drawerContent = renderTemplatesView();
    else if (state.leftDrawerMode === 'library') drawerContent = renderLibraryDrawer();
    else drawerContent = renderStructureDrawer(groups);

    leftPanel.innerHTML = `
      <div class="left-shell${state.leftDrawerOpen ? '' : ' drawer-closed'}">
        <nav class="left-rail">
          ${topRail}
          <div class="left-rail-spacer"></div>
          ${bottomRail}
        </nav>
        <div class="left-drawer">
          <div class="left-drawer-header">
            <div class="left-drawer-copy">
              <div class="left-drawer-title">${esc(drawerMeta.title)}</div>
              ${drawerMeta.note ? `<div class="left-drawer-note">${esc(drawerMeta.note)}</div>` : ''}
            </div>
            <button class="left-drawer-close" id="left-drawer-close" title="${esc(t('collapseStructure'))}" aria-label="${esc(t('collapseStructure'))}">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.4 7l-1.4-1.4L8.6 11l5.4 5.4 1.4-1.4-4-4z"/></svg>
            </button>
          </div>
          <div class="left-drawer-body" data-drawer-mode="${esc(state.leftDrawerMode)}">${drawerContent}</div>
        </div>
      </div>
    `;
    restoreLeftDrawerScroll();

    document.querySelectorAll('.rail-button[data-rail-mode]').forEach((button) => {
      button.addEventListener('click', () => {
        openLeftDrawer(button.dataset.railMode);
      });
    });
    document.getElementById('left-drawer-close')?.addEventListener('click', closeLeftDrawer);

    if (state.leftDrawerMode === 'structure') {
      document.querySelectorAll('.ct-item').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.ctId;
          const existing = state.sections.findIndex(s => s.convergenceType === id);
          if (existing >= 0) {
            const removed = state.sections[existing];
            state.sections.splice(existing, 1);
            if (removed?.id === state.focusedSectionId) {
              state.focusedSectionId = null;
              state.pendingFocusedSectionScroll = false;
            }
          } else {
            const newSection = {
              id: `sec-${slugify(ct[id].name)}`,
              title: ct[id].name,
              convergenceType: id,
              data: [],
            };
            state.sections.push(newSection);
            state.focusedSectionId = newSection.id;
            state.pendingFocusedSectionScroll = true;
          }
          renderLeft();
          renderRight();
        });
      });

      document.querySelectorAll('.ct-icon[data-tooltip]').forEach(icon => {
        const tip = icon.querySelector('.ct-tooltip');
        icon.addEventListener('mouseenter', () => {
          tip.textContent = icon.dataset.tooltip;
          tip.classList.add('visible');
          const rect = icon.getBoundingClientRect();
          let left = rect.right + 12;
          let top = rect.top + rect.height / 2 - 60;
          if (left + 292 > window.innerWidth) left = rect.left - 292;
          if (top < 8) top = 8;
          if (top + 150 > window.innerHeight) top = window.innerHeight - 150;
          tip.style.left = left + 'px';
          tip.style.top = top + 'px';
        });
        icon.addEventListener('mouseleave', () => {
          tip.classList.remove('visible');
        });
      });
    }

    if (state.leftDrawerMode === 'sections') {
      document.querySelectorAll('.sel-item[data-section-id]').forEach(el => {
        el.addEventListener('click', (event) => {
          if (event.target.closest('input, select, button, summary, label, textarea')) return;
          focusSection(el.dataset.sectionId);
        });
      });

      document.querySelectorAll('.sel-title-input').forEach(el => {
        el.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          const previousId = state.sections[idx].id;
          state.sections[idx].title = e.target.value;
          state.sections[idx].id = `sec-${slugify(e.target.value)}`;
          if (state.focusedSectionId === previousId) state.focusedSectionId = state.sections[idx].id;
          const container = e.target.closest('.sel-item');
          if (container) container.dataset.sectionId = state.sections[idx].id;
          renderRight();
        });
      });

      document.querySelectorAll('.sel-rationale-input').forEach(el => {
        el.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          if (!state.sections[idx]) return;
          const value = e.target.value;
          if (value.trim()) state.sections[idx].rationale = value;
          else delete state.sections[idx].rationale;
          autoSave();
          refreshFingerprintPill();
        });
      });

      document.querySelectorAll('.sel-remove').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(el.dataset.idx);
          const removed = state.sections[idx];
          state.sections.splice(idx, 1);
          if (removed?.id === state.focusedSectionId) {
            state.focusedSectionId = null;
            state.pendingFocusedSectionScroll = false;
          }
          renderLeft();
          renderRight();
        });
      });

      let dragIdx = null;
      document.querySelectorAll('.sel-item[draggable]').forEach(el => {
        el.addEventListener('dragstart', (e) => {
          dragIdx = parseInt(el.dataset.idx);
          el.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => {
          el.classList.remove('dragging');
          document.querySelectorAll('.sel-item.drag-over').forEach(d => d.classList.remove('drag-over'));
          dragIdx = null;
        });
        el.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          el.classList.add('drag-over');
        });
        el.addEventListener('dragleave', () => {
          el.classList.remove('drag-over');
        });
        el.addEventListener('drop', (e) => {
          e.preventDefault();
          el.classList.remove('drag-over');
          const dropIdx = parseInt(el.dataset.idx);
          if (dragIdx !== null && dragIdx !== dropIdx) {
            const [moved] = state.sections.splice(dragIdx, 1);
            state.sections.splice(dropIdx, 0, moved);
            renderLeft();
            renderRight();
          }
        });
      });
    }

    if (state.leftDrawerMode === 'templates') {
      document.querySelectorAll('.template-card-action[data-template-file]').forEach((button) => {
        button.addEventListener('click', () => {
          const template = TEMPLATES.find((entry) => entry.filename === button.dataset.templateFile);
          if (template) applyTemplate(template);
        });
      });
    }

    if (state.leftDrawerMode === 'library') {
      document.getElementById('library-search')?.addEventListener('input', (event) => {
        state.librarySearchQuery = event.target.value;
        renderLeft();
      });
      document.getElementById('library-domain-filter')?.addEventListener('change', (event) => {
        state.libraryDomainFilter = event.target.value;
        renderLeft();
      });
      document.getElementById('library-repo-filter')?.addEventListener('change', (event) => {
        state.libraryRepoFilter = event.target.value;
        renderLeft();
      });
      document.getElementById('library-editable-only')?.addEventListener('change', (event) => {
        state.libraryEditableOnly = event.target.checked;
        renderLeft();
      });
      document.getElementById('origin-doc')?.addEventListener('click', () => {
        if (state.originDoc) {
          const item = library.find(l => l.filename === state.originDoc.filename);
          if (item) loadFromLibrary(item);
        }
      });
      document.querySelectorAll('.lib-item[data-lib-idx]').forEach(el => {
        el.addEventListener('click', async () => {
          await openLibraryItem(library[parseInt(el.dataset.libIdx)]);
        });
      });
    }
  }

  /* ── Render right panel ── */
  function renderRight() {
    autoSave();
    const panel = document.getElementById('right-panel');

    if (!['visual', 'board', 'flow', 'json'].includes(state.previewTab)) state.previewTab = 'visual';
    const json = buildJson();
    const title = t('preview');

    const docTitle = (json && json.title ? String(json.title).trim() : '');
    panel.innerHTML = `
      <div class="preview-header">
        <div class="preview-header-heading">
          <h2>${esc(title)}</h2>
          ${docTitle ? `<span class="preview-doc-title">· ${esc(docTitle)}</span>` : ''}
        </div>
        <div class="preview-tabs">
          <button class="preview-tab${state.previewTab === 'visual' ? ' active' : ''}" data-tab="visual">${esc(t('visual'))}</button>
          <button class="preview-tab${state.previewTab === 'board' ? ' active' : ''}" data-tab="board">${esc(t('board'))}</button>
          <button class="preview-tab${state.previewTab === 'flow' ? ' active' : ''}" data-tab="flow">${esc(t('flow'))}</button>
          <button class="preview-tab${state.previewTab === 'json' ? ' active' : ''}" data-tab="json">${esc(t('json'))}</button>
        </div>
      </div>
      <div class="preview-content${state.previewTab === 'flow' ? ' preview-content-flow' : ''}">
        ${state.previewTab === 'json'
          ? renderJsonPreview(json)
          : state.previewTab === 'board'
            ? renderBoardPreview(json)
            : state.previewTab === 'flow'
              ? renderFlowPreview(json)
              : renderVisualPreview(json)}
      </div>`;

    panel.querySelectorAll('.preview-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        state.previewTab = tab.dataset.tab;
        if (state.focusedSectionId) state.pendingFocusedSectionScroll = true;
        renderRight();
      });
    });

    if (state.previewTab === 'board') {
      panel.querySelector('#board-dimension')?.addEventListener('change', (event) => {
        state.boardDimensionId = event.target.value;
        if (state.focusedSectionId) state.pendingFocusedSectionScroll = true;
        renderRight();
      });
      panel.querySelectorAll('.board-preview-card[data-section-id]').forEach((card) => {
        card.addEventListener('click', () => {
          focusSection(card.dataset.sectionId);
        });
      });
    }

    if (state.previewTab === 'json') {
      panel.querySelector('[data-json-copy]')?.addEventListener('click', async (event) => {
        const btn = event.currentTarget;
        const text = JSON.stringify(buildJson(), null, 2);
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            window.prompt(t('jsonCopyFallback'), text);
          }
          btn.dataset.copied = 'true';
          btn.textContent = t('jsonCopied');
          setTimeout(() => { btn.dataset.copied = 'false'; btn.textContent = t('jsonCopy'); }, 1600);
        } catch (err) {
          window.prompt(t('jsonCopyFallback'), text);
        }
      });
    }

    if (state.previewTab === 'visual') {
      const bindDocField = (id, setter, afterInput) => {
        const input = panel.querySelector(`#${id}`);
        if (!input) return;
        input.addEventListener('input', (event) => {
          setter(event.target.value);
          if (typeof afterInput === 'function') afterInput();
          syncPromptOutputInPlace();
          autoSave();
        });
      };

      panel.querySelectorAll('.visual-section-card[data-section-id]').forEach((card) => {
        card.addEventListener('click', () => {
          focusSection(card.dataset.sectionId);
        });
      });
      panel.querySelector('#copy-prompt')?.addEventListener('click', () => {
        copyPromptText();
      });

      bindDocField('doc-title', (value) => { state.title = value; }, () => {
        const docIdInput = panel.querySelector('#doc-meta-docId');
        if (docIdInput && !docIdInput.value.trim()) {
          docIdInput.placeholder = suggestDocId({ ...state.docExtras, title: state.title }, currentOriginLabel());
        }
      });
      bindDocField('doc-subtitle', (value) => { state.subtitle = value; });
      bindDocField('doc-brand', (value) => { state.brand = value; });
      bindDocField('doc-objective', (value) => { state.objective = value; });
      bindDocField('doc-success', (value) => { state.successCondition = value; });

      DOC_META_FIELDS.forEach((field) => {
        bindDocField(`doc-meta-${field.key}`, (value) => {
          state.docExtras = { ...(state.docExtras || {}) };
          writeDocMetaValue(state.docExtras, field, value);
        });
      });

      /* ── Governance panel wiring ── */
      const govRerender = () => { renderRight(); autoSave(); };
      const govLiveRefresh = () => {
        refreshFingerprintPill();
        const preview = panel.querySelector('.gov-preview-grid');
        // preview derivation re-runs on full re-render; inputs below don't force it
      };

      panel.querySelectorAll('[data-gov-facet-field]').forEach((input) => {
        input.addEventListener('input', (event) => {
          const row = event.target.closest('[data-gov-facet-idx]');
          if (!row) return;
          const idx = Number(row.dataset.govFacetIdx);
          const field = event.target.dataset.govFacetField;
          const facets = [...govFacets()];
          if (!facets[idx]) return;
          if (field === 'name') {
            facets[idx] = { ...facets[idx], name: event.target.value };
            const suggested = govSlugifyId(event.target.value);
            if (!facets[idx].id || facets[idx].id === govSlugifyId(facets[idx].name || '')) {
              // Only auto-update the id while it's still a derivative of the name
            }
            if (!facets[idx].id) facets[idx].id = suggested || `facet-${idx + 1}`;
          } else if (field === 'description') {
            facets[idx] = { ...facets[idx], description: event.target.value };
          }
          govSetFacets(facets);
          autoSave();
        });
      });

      panel.querySelectorAll('[data-gov-facet-remove]').forEach((btn) => {
        btn.addEventListener('click', (event) => {
          const idx = Number(event.target.dataset.govFacetRemove);
          const facets = [...govFacets()];
          const removed = facets.splice(idx, 1)[0];
          govSetFacets(facets);
          if (removed?.id) {
            govSetCoverage(govCoverage().filter((c) => c.facetId !== removed.id));
          }
          govRerender();
        });
      });

      panel.querySelector('[data-gov-facet-add]')?.addEventListener('click', () => {
        const facets = [...govFacets()];
        const base = 'facet';
        let id = `${base}-${facets.length + 1}`;
        const existing = new Set(facets.map((f) => f.id));
        while (existing.has(id)) id = `${base}-${facets.length + 1}-${Math.floor(Math.random() * 1000)}`;
        facets.push({ id, name: '', description: '' });
        govSetFacets(facets);
        govRerender();
      });

      panel.querySelectorAll('[data-gov-cov-toggle]').forEach((chip) => {
        chip.addEventListener('click', (event) => {
          const target = event.currentTarget;
          const facetId = target.dataset.facetId;
          const sectionId = target.dataset.sectionId;
          const cardId = target.dataset.cardId || '';
          const coverage = [...govCoverage()];
          const existingIdx = coverage.findIndex((c) => c.facetId === facetId && c.sectionId === sectionId && (c.cardId || '') === cardId);
          if (existingIdx >= 0) {
            coverage.splice(existingIdx, 1);
          } else {
            coverage.push(cardId ? { facetId, sectionId, cardId } : { facetId, sectionId });
          }
          govSetCoverage(coverage);
          govRerender();
        });
      });

      panel.querySelectorAll('[data-gov-inv-field]').forEach((input) => {
        input.addEventListener('input', (event) => {
          const card = event.target.closest('[data-gov-inv-idx]');
          if (!card) return;
          const idx = Number(card.dataset.govInvIdx);
          const field = event.target.dataset.govInvField;
          const invariants = [...govInvariants()];
          if (!invariants[idx]) return;
          if (field === 'name') {
            const name = event.target.value;
            const currentSlug = invariants[idx].id;
            const suggestedSlug = govSlugifyId(name);
            invariants[idx] = { ...invariants[idx], name };
            if (!currentSlug || currentSlug.startsWith('invariant-')) {
              invariants[idx].id = suggestedSlug || currentSlug || `invariant-${idx + 1}`;
            }
          } else if (field === 'statement') {
            invariants[idx] = { ...invariants[idx], statement: event.target.value };
          }
          govSetInvariants(invariants);
          autoSave();
        });
      });

      panel.querySelectorAll('[data-gov-inv-remove]').forEach((btn) => {
        btn.addEventListener('click', (event) => {
          const idx = Number(event.currentTarget.dataset.govInvRemove);
          const invariants = [...govInvariants()];
          invariants.splice(idx, 1);
          govSetInvariants(invariants);
          govRerender();
        });
      });

      panel.querySelectorAll('[data-gov-inv-applies]').forEach((chip) => {
        chip.addEventListener('click', (event) => {
          const idx = Number(event.currentTarget.dataset.govInvApplies);
          const appliesId = event.currentTarget.dataset.appliesId;
          const invariants = [...govInvariants()];
          if (!invariants[idx]) return;
          const applies = Array.isArray(invariants[idx].appliesTo) ? [...invariants[idx].appliesTo] : [];
          const pos = applies.indexOf(appliesId);
          if (pos >= 0) applies.splice(pos, 1); else applies.push(appliesId);
          invariants[idx] = { ...invariants[idx], appliesTo: applies };
          govSetInvariants(invariants);
          govRerender();
        });
      });

      panel.querySelector('[data-gov-inv-add]')?.addEventListener('click', () => {
        const invariants = [...govInvariants()];
        const idx = invariants.length + 1;
        invariants.push({ id: `invariant-${idx}`, name: '', statement: '', appliesTo: [] });
        govSetInvariants(invariants);
        govRerender();
      });

      panel.querySelector('[data-gov-stamp]')?.addEventListener('click', async (event) => {
        const btn = event.currentTarget;
        btn.disabled = true;
        const original = btn.textContent;
        btn.textContent = 'Stamping…';
        try {
          const fp = await govComputeFingerprint();
          if (fp) {
            govSetFingerprint(fp);
            autoSave();
            await refreshFingerprintPill();
            btn.textContent = 'Stamped';
            setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1200);
          } else {
            btn.textContent = 'crypto unavailable';
            setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800);
          }
        } catch (err) {
          console.error('Fingerprint stamp failed', err);
          btn.textContent = 'Failed';
          setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1800);
        }
      });

      panel.querySelector('[data-gov-crystallize]')?.addEventListener('click', async (event) => {
        const btn = event.currentTarget;
        const originLabel = currentOriginLabel() || '<path/to/doc.json>';
        const prompt = `/crystallize ${originLabel}`;
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(prompt);
            const original = btn.textContent;
            btn.textContent = 'Copied';
            setTimeout(() => { btn.textContent = original; }, 1500);
          } else {
            window.prompt('Copy this prompt:', prompt);
          }
        } catch (err) {
          window.prompt('Copy this prompt:', prompt);
        }
      });

      refreshFingerprintPill();
    }

    if (state.previewTab === 'flow') {
      // Mode toggle — present in both modes
      panel.querySelectorAll('[data-flow-mode]').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.flowMode = btn.dataset.flowMode === 'body' ? 'body' : 'governance';
          autoSave();
          renderRight();
        });
      });
      const mode = state.flowMode || 'governance';
      if (mode === 'governance') {
        requestAnimationFrame(() => drawFlowWires(json));
        wireFlowInteractions(panel);
      } else if (mode === 'body') {
        requestAnimationFrame(() => {
          drawL2BodyWires(json);
          drawL2GovOverlay(json);
        });
        wireL2BodyInteractions(panel);
      }
    }

    syncFocusedSectionInPreview();
  }

  let flowResizeHandler = null;
  function ensureFlowResizeHook() {
    if (flowResizeHandler) return;
    flowResizeHandler = () => {
      if (state.previewTab !== 'flow') return;
      const json = buildJson();
      const mode = state.flowMode || 'governance';
      if (mode === 'body') {
        requestAnimationFrame(() => {
          drawL2BodyWires(json);
          drawL2GovOverlay(json);
        });
      } else {
        requestAnimationFrame(() => drawFlowWires(json));
      }
    };
    window.addEventListener('resize', flowResizeHandler);
  }
  ensureFlowResizeHook();

  function flowRerender() {
    autoSave();
    renderRight();
  }

  function wireFlowInteractions(panel) {
    const canvas = panel.querySelector('#flow-canvas');
    const wrap = panel.querySelector('#flow-canvas-wrap');
    if (!canvas || !wrap) return;

    // Remove a node (facet / section / invariant)
    canvas.querySelectorAll('[data-flow-remove]').forEach((btn) => {
      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        const kind = btn.dataset.flowRemove;
        const id = btn.dataset.flowId;
        if (kind === 'facet') {
          govSetFacets(govFacets().filter((f) => f.id !== id));
          govSetCoverage(govCoverage().filter((c) => c.facetId !== id));
        } else if (kind === 'invariant') {
          govSetInvariants(govInvariants().filter((i) => i.id !== id));
        } else if (kind === 'section') {
          state.sections = state.sections.filter((s) => s.id !== id);
          // coverage edges to the removed section become drift — keep them.
        }
        flowRerender();
      });
    });

    // Remove a wire (coverage or invariant applies-to entry) via delegation,
    // because wires are drawn async via requestAnimationFrame after this runs.
    canvas.addEventListener('click', (event) => {
      const hit = event.target.closest('[data-flow-edge]');
      if (!hit) return;
      const edgeKind = hit.dataset.flowEdge;
      if (edgeKind === 'coverage') {
        const idx = Number(hit.dataset.flowEdgeIndex);
        const coverage = [...govCoverage()];
        coverage.splice(idx, 1);
        govSetCoverage(coverage);
      } else if (edgeKind === 'invariant') {
        const invIdx = Number(hit.dataset.flowInvIndex);
        const tgtIdx = Number(hit.dataset.flowTargetIndex);
        const invariants = [...govInvariants()];
        if (invariants[invIdx] && Array.isArray(invariants[invIdx].appliesTo)) {
          invariants[invIdx] = {
            ...invariants[invIdx],
            appliesTo: invariants[invIdx].appliesTo.filter((_, i) => i !== tgtIdx),
          };
          govSetInvariants(invariants);
        }
      }
      flowRerender();
    });

    // Toggle doc-wide invariant
    canvas.querySelectorAll('[data-flow-docwide]').forEach((btn) => {
      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        const invId = btn.dataset.flowDocwide;
        const invariants = [...govInvariants()];
        const idx = invariants.findIndex((i) => i.id === invId);
        if (idx < 0) return;
        const applies = Array.isArray(invariants[idx].appliesTo) ? [...invariants[idx].appliesTo] : [];
        const hasStar = applies.includes('*');
        invariants[idx] = {
          ...invariants[idx],
          appliesTo: hasStar ? applies.filter((a) => a !== '*') : ['*'],
        };
        govSetInvariants(invariants);
        flowRerender();
      });
    });

    // Inline-edit rationale
    canvas.querySelectorAll('.flow-rationale').forEach((el) => {
      el.addEventListener('click', (event) => {
        event.stopPropagation();
        const sectionNode = el.closest('[data-flow-kind="section"]');
        if (!sectionNode) return;
        const sid = sectionNode.dataset.flowId;
        const section = state.sections.find((s) => s.id === sid);
        if (!section) return;
        const next = window.prompt('Rationale \u2014 why this convergence type, here:', section.rationale || '');
        if (next === null) return;
        const trimmed = next.trim();
        if (trimmed) section.rationale = trimmed; else delete section.rationale;
        flowRerender();
      });
    });

    // Freshness banner — async fingerprint check after render.
    const banner = panel.querySelector('#flow-banner');
    const stamp = panel.querySelector('[data-flow-stamp]');
    const crystBtn = panel.querySelector('[data-flow-crystallize]');
    const bannerTitle = panel.querySelector('#flow-banner-title');
    const bannerMsg = panel.querySelector('#flow-banner-message');
    const applyBannerState = async () => {
      if (!banner || !wrap) return;
      const stored = govFingerprint();
      if (!stored) {
        banner.dataset.state = 'missing';
        wrap.classList.remove('flow-stale');
        bannerTitle.textContent = t('flowMetaMissingTitle');
        bannerMsg.textContent = t('flowMetaMissingBody');
        return;
      }
      const current = await govComputeFingerprint();
      if (!current || current === stored) {
        banner.dataset.state = 'fresh';
        banner.style.display = 'none';
        wrap.classList.remove('flow-stale');
        return;
      }
      banner.dataset.state = 'stale';
      banner.style.display = '';
      wrap.classList.add('flow-stale');
      bannerTitle.textContent = t('flowMetaStaleTitle');
      bannerMsg.textContent = t('flowMetaStaleBody');
    };
    if (banner) {
      banner.style.display = '';
      applyBannerState();
    }

    stamp?.addEventListener('click', async (event) => {
      const btn = event.currentTarget;
      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = t('flowStamping');
      try {
        const fp = await govComputeFingerprint();
        if (fp) {
          govSetFingerprint(fp);
          btn.textContent = t('flowStamped');
          setTimeout(() => { btn.disabled = false; btn.textContent = original; flowRerender(); }, 900);
        } else {
          btn.textContent = original;
          btn.disabled = false;
        }
      } catch (err) {
        btn.textContent = original;
        btn.disabled = false;
      }
    });

    crystBtn?.addEventListener('click', async (event) => {
      const btn = event.currentTarget;
      const label = currentOriginLabel() || '<path/to/doc.json>';
      const isStale = banner?.dataset.state === 'stale';
      const prompt = `/crystallize ${label}${isStale ? ' --refresh' : ''}`;
      const original = btn.textContent;
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(prompt);
          btn.textContent = t('flowCrystallizeCopied');
        } else {
          window.prompt('Copy this prompt:', prompt);
        }
      } catch (err) {
        window.prompt('Copy this prompt:', prompt);
      }
      setTimeout(() => { btn.textContent = original; }, 1600);
    });

    // Reset-layout button
    panel.querySelector('[data-flow-reset-layout]')?.addEventListener('click', () => {
      const facets = govFacets().map(({ flowPosition, ...rest }) => rest);
      const invariants = govInvariants().map(({ flowPosition, ...rest }) => rest);
      govSetFacets(facets);
      govSetInvariants(invariants);
      state.sections = state.sections.map(({ flowPosition, ...rest }) => rest);
      flowRerender();
    });

    // Double-click a node to clear its flowPosition
    canvas.querySelectorAll('.flow-node').forEach((node) => {
      node.addEventListener('dblclick', (event) => {
        if (event.target.closest('.flow-port, .flow-remove, [data-flow-docwide], .flow-rationale, [data-flow-reset-layout]')) return;
        const kind = node.dataset.flowKind;
        const id = node.dataset.flowId;
        if (kind === 'facet') {
          govSetFacets(govFacets().map((f) => f.id === id ? (({ flowPosition, ...r }) => r)(f) : f));
        } else if (kind === 'invariant') {
          govSetInvariants(govInvariants().map((i) => i.id === id ? (({ flowPosition, ...r }) => r)(i) : i));
        } else if (kind === 'section') {
          state.sections = state.sections.map((s) => s.id === id ? (({ flowPosition, ...r }) => r)(s) : s);
        }
        flowRerender();
      });
    });

    // Drag a node body to reposition. Threshold distinguishes drag from click.
    canvas.querySelectorAll('.flow-node').forEach((node) => {
      node.addEventListener('pointerdown', (event) => {
        if (event.target.closest('.flow-port, .flow-remove, [data-flow-docwide], .flow-rationale, [data-flow-reset-layout]')) return;
        if (event.target.closest('[data-flow-edge]')) return;
        event.preventDefault();
        const canvasRect = canvas.getBoundingClientRect();
        const nodeRect = node.getBoundingClientRect();
        const offX = event.clientX - nodeRect.left;
        const offY = event.clientY - nodeRect.top;
        const startClientX = event.clientX;
        const startClientY = event.clientY;
        let dragging = false;
        const onMove = (ev) => {
          const dx = ev.clientX - startClientX;
          const dy = ev.clientY - startClientY;
          if (!dragging && Math.hypot(dx, dy) < 4) return;
          dragging = true;
          const currentCanvasRect = canvas.getBoundingClientRect();
          const x = Math.max(0, ev.clientX - currentCanvasRect.left - offX);
          const y = Math.max(0, ev.clientY - currentCanvasRect.top - offY);
          node.classList.add('flow-node-dragging');
          node.dataset.flowPositioned = 'true';
          node.style.left = x + 'px';
          node.style.top = y + 'px';
          requestAnimationFrame(() => drawFlowWires(buildJson()));
        };
        const onUp = (ev) => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          node.classList.remove('flow-node-dragging');
          if (!dragging) return;
          const finalRect = node.getBoundingClientRect();
          const finalCanvasRect = canvas.getBoundingClientRect();
          const x = Math.round(finalRect.left - finalCanvasRect.left);
          const y = Math.round(finalRect.top - finalCanvasRect.top);
          const kind = node.dataset.flowKind;
          const id = node.dataset.flowId;
          if (kind === 'facet') {
            govSetFacets(govFacets().map((f) => f.id === id ? { ...f, flowPosition: { x, y } } : f));
          } else if (kind === 'invariant') {
            govSetInvariants(govInvariants().map((i) => i.id === id ? { ...i, flowPosition: { x, y } } : i));
          } else if (kind === 'section') {
            state.sections = state.sections.map((s) => s.id === id ? { ...s, flowPosition: { x, y } } : s);
          }
          flowRerender();
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    });

    // Drag to create a wire
    canvas.querySelectorAll('[data-port="facet-out"]').forEach((port) => {
      port.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        flowDragState = { kind: 'coverage', fromId: port.dataset.facetId, mouseX: event.clientX, mouseY: event.clientY };
        port.classList.add('flow-port-dragging');
        drawFlowWires(buildJson());
      });
    });
    canvas.querySelectorAll('[data-port="inv-out"]').forEach((port) => {
      port.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        flowDragState = { kind: 'invariant', fromId: port.dataset.invariantId, mouseX: event.clientX, mouseY: event.clientY };
        port.classList.add('flow-port-dragging-inv');
        drawFlowWires(buildJson());
      });
    });
  }

  // Global pointer handlers for the drag — simpler to keep on document.
  let flowGlobalPointerHandlers = null;
  function ensureFlowGlobalPointerHandlers() {
    if (flowGlobalPointerHandlers) return;
    flowGlobalPointerHandlers = {
      move: (event) => {
        if (!flowDragState) return;
        flowDragState.mouseX = event.clientX;
        flowDragState.mouseY = event.clientY;
        drawFlowWires(buildJson());
      },
      up: (event) => {
        if (!flowDragState) return;
        document.querySelectorAll('.flow-port.flow-port-dragging, .flow-port.flow-port-dragging-inv')
          .forEach((el) => el.classList.remove('flow-port-dragging', 'flow-port-dragging-inv'));
        const drag = flowDragState;
        flowDragState = null;
        const dropTarget = document.elementFromPoint(event.clientX, event.clientY);
        if (drag.kind === 'coverage') {
          const inPort = dropTarget?.closest('[data-port="section-in"]');
          if (inPort) {
            const sectionId = inPort.dataset.sectionId;
            const facetId = drag.fromId;
            const section = state.sections.find((s) => s.id === sectionId);
            const usedCards = new Set(govCoverage().filter((c) => c.sectionId === sectionId).map((c) => c.cardId));
            const cardId = (section?.data || []).map((d) => d?.id).filter(Boolean).find((c) => !usedCards.has(c))
              || (section?.data || []).map((d) => d?.id).filter(Boolean)[0]
              || '';
            const exists = govCoverage().some((c) => c.facetId === facetId && c.sectionId === sectionId && (c.cardId || '') === cardId);
            if (!exists) {
              govSetCoverage([...govCoverage(), cardId ? { facetId, sectionId, cardId } : { facetId, sectionId }]);
            }
          }
        } else if (drag.kind === 'invariant') {
          const invInPort = dropTarget?.closest('[data-port="section-inv-in"]');
          if (invInPort) {
            const sectionId = invInPort.dataset.sectionId;
            const invariants = [...govInvariants()];
            const idx = invariants.findIndex((i) => i.id === drag.fromId);
            if (idx >= 0) {
              const applies = Array.isArray(invariants[idx].appliesTo) ? [...invariants[idx].appliesTo] : [];
              const starIdx = applies.indexOf('*');
              if (starIdx >= 0) applies.splice(starIdx, 1);
              if (!applies.includes(sectionId)) applies.push(sectionId);
              invariants[idx] = { ...invariants[idx], appliesTo: applies };
              govSetInvariants(invariants);
            }
          }
        }
        flowRerender();
      },
    };
    document.addEventListener('pointermove', flowGlobalPointerHandlers.move);
    document.addEventListener('pointerup',   flowGlobalPointerHandlers.up);
  }
  ensureFlowGlobalPointerHandlers();

  function deriveFlowCoherence(json) {
    const facets = Array.isArray(json.objectiveFacets) ? json.objectiveFacets : [];
    const coverage = Array.isArray(json.coverage) ? json.coverage : [];
    const invariants = Array.isArray(json.invariants) ? json.invariants : [];
    const sections = Array.isArray(json.sections) ? json.sections : [];
    const knownSectionIds = new Set(sections.map((s) => s.id));
    const facetStatus = new Map();
    for (const facet of facets) {
      const edges = coverage.filter((c) => c.facetId === facet.id);
      const carryingSectionIds = [...new Set(edges.map((e) => e.sectionId))];
      const anyDrift = edges.some((e) => !knownSectionIds.has(e.sectionId));
      let status;
      if (anyDrift) status = 'drift';
      else if (edges.length === 0) status = 'orphaned';
      else status = 'covered';
      facetStatus.set(facet.id, { status, carryingSectionIds });
    }
    return { facets, coverage, invariants, sections, knownSectionIds, facetStatus };
  }

  const FLOW_TICKET_PALETTE = ['#4f46e5','#0891b2','#059669','#d97706','#db2777','#7c3aed','#be123c','#0284c7','#16a34a','#ea580c'];
  function flowColorForTicket(tid) {
    const s = String(tid || '');
    let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return FLOW_TICKET_PALETTE[h % FLOW_TICKET_PALETTE.length];
  }
  function flowCardStatus(card, convergenceType) {
    const ct = REGISTRY?.convergenceTypes?.[convergenceType];
    const fields = (ct?.statusFields || []);
    for (const f of fields) {
      const value = card?.[f.key];
      if (value) return { value, statusSet: f.statusSet };
    }
    return null;
  }
  function flowTicketNumber(entry) {
    if (!entry) return '';
    if (typeof entry === 'string' || typeof entry === 'number') return String(entry);
    return String(entry.issueNumber ?? entry.id ?? entry.number ?? '');
  }

    let cardTotal = 0;
    const ticketSet = new Set();
    const cardsByTicket = new Map();
    sections.forEach((s) => {
      const cards = Array.isArray(s.data) ? s.data : [];
      cardTotal += cards.length;
      cards.forEach((c) => {
        (Array.isArray(c?.ticketIds) ? c.ticketIds : []).forEach((raw) => {
          const tid = flowTicketNumber(raw);
          if (!tid) return;
          ticketSet.add(tid);
          if (!cardsByTicket.has(tid)) cardsByTicket.set(tid, []);
          cardsByTicket.get(tid).push({ s: s.id, c: c.id });
        });
      });
    });
    let crossEdgeCount = 0;
    for (const arr of cardsByTicket.values()) {
      if (arr.length >= 2) crossEdgeCount += arr.length * (arr.length - 1) / 2;
    }

    const statsHtml = `
      <span class="l2-body-stat"><strong>${sections.length}</strong> ${esc(t('sections'))}</span>

      <span class="l2-body-stat"><strong>${ticketSet.size}</strong> ${esc(t('flowBodyUniqueTickets'))}</span>

    const collapsedSet = new Set(Array.isArray(state.l2CollapsedFrames) ? state.l2CollapsedFrames : []);
    const selectedKey = state.l2SelectedCard || null;

      : null;
    const selTickets = new Set((selCard?.ticketIds || []).map(flowTicketNumber).filter(Boolean));
    const cardShareSelection = (card) => {
      if (!selectedKey) return true;
      if (!card?.id) return false;
      if (card.id === selCid) return true;
      const cardTickets = (Array.isArray(card.ticketIds) ? card.ticketIds : []).map(flowTicketNumber);
      return cardTickets.some((t) => selTickets.has(t));
