    const framesHtml = sections.map((section) => {
      const ct = REGISTRY?.convergenceTypes?.[section.convergenceType];
      const iconColor = ct?.iconColor || '#64748b';

      const collapsed = collapsedSet.has(section.id);
      const cards = Array.isArray(section.data) ? section.data : [];
      const cardsHtml = cards.map((card) => {
        const status = flowCardStatus(card, section.convergenceType);

        const label = status ? (REGISTRY?.statusSets?.[status.statusSet]?.labels?.[status.value] || status.value) : '';

      return `

    const inspectorHtml = selCard ? renderL2Inspector(sections, selSid, selCard) : '';
    const paletteHtml = renderL2Palette();

    const facets = Array.isArray(json.objectiveFacets) ? json.objectiveFacets : [];
    const invariants = Array.isArray(json.invariants) ? json.invariants : [];
    const coverage = Array.isArray(json.coverage) ? json.coverage : [];
    const facetCovered = new Set(coverage.map((e) => e && e.facetId).filter(Boolean));
    const selChip = state.l2SelectedChip || null;
    const selFacet = selChip?.kind === 'facet' ? selChip.id : null;
    const selInv = selChip?.kind === 'invariant' ? selChip.id : null;

    const facetStripHtml = facets.length === 0 ? '' : `
      <div class="l2-gov-strip l2-gov-strip-facets">
        <span class="l2-gov-strip-label">${esc(t('flowBodyFacets'))}</span>
        ${facets.map((f) => {
          const orphan = !facetCovered.has(f.id);
          const sel = selFacet === f.id;
          return `<span class="l2-gov-chip ${orphan ? 'l2-gov-chip-orphan' : ''} ${sel ? 'l2-gov-chip-selected' : ''}" data-facet-id="${esc(f.id || '')}" title="${esc(f.description || '')}">
            <strong>${esc(f.name || f.id || '')}</strong>${orphan ? `<small>${esc(t('flowBodyFacetOrphan'))}</small>` : ''}
          </span>`;

    const invariantStripHtml = invariants.length === 0 ? '' : `

        ${invariants.map((inv) => {
          const appliesTo = Array.isArray(inv.appliesTo) ? inv.appliesTo : [];
          const docWide = appliesTo.includes('*');
          const sel = selInv === inv.id;
          return `<span class="l2-gov-chip ${docWide ? 'l2-gov-chip-docwide' : ''} ${sel ? 'l2-gov-chip-selected' : ''}" data-invariant-id="${esc(inv.id || '')}" title="${esc(inv.statement || '')}">

  function renderL2Inspector(sections, sectionId, card) {

            ? others.map((o) => `<span>${esc(o.s.title || o.s.id)} <code>${esc(o.c.id || '')}</code></span>`).join('')

  function drawL2BodyWires(json) {
    const canvas = document.getElementById('l2-body-canvas');
    const svg = document.getElementById('l2-body-wires');
    if (!canvas || !svg) return;

    const canvasRect = canvas.getBoundingClientRect();
    svg.setAttribute('width',  String(canvasRect.width));
    svg.setAttribute('height', String(canvasRect.height));

    // No selection → no wires. Cross-card ticket sharing is a set, not a
    // sequence, so we refuse to imply an order at rest. See #73.
    const selectedKey = state.l2SelectedCard || null;
    if (!selectedKey) {
      svg.innerHTML = '';
      return;
    }

    const sections = Array.isArray(json.sections) ? json.sections : [];
    const [selSid, selCid] = selectedKey.split('::');
    const selSection = sections.find((s) => s.id === selSid);
    const selCard = selSection?.data?.find((c) => c?.id === selCid);
    if (!selCard) { svg.innerHTML = ''; return; }

    const cssEscape = (s) => String(s).replace(/[^a-zA-Z0-9_-]/g, (ch) => `\\${ch}`);
    const bezier = (x1, y1, x2, y2) => {
      const mid = (x1 + x2) / 2;
      return `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`;
    };

    const selTickets = (Array.isArray(selCard.ticketIds) ? selCard.ticketIds : [])
      .map(flowTicketNumber).filter(Boolean);
    if (selTickets.length === 0) { svg.innerHTML = ''; return; }

    const selEl = canvas.querySelector(
      `[data-section-id="${cssEscape(selSid)}"] [data-card-id="${cssEscape(selCid)}"]`
    );
    if (!selEl) { svg.innerHTML = ''; return; }
    const selRect = selEl.getBoundingClientRect();
    const sx = selRect.left + selRect.width / 2 - canvasRect.left;
    const sy = selRect.top  + selRect.height / 2 - canvasRect.top;

    const paths = [];
    selTickets.forEach((tid) => {
      const color = flowColorForTicket(tid);
      sections.forEach((s) => {
        const frame = canvas.querySelector(`[data-section-id="${cssEscape(s.id)}"]`);
        if (!frame || frame.classList.contains('l2-frame-collapsed')) return;
        (Array.isArray(s.data) ? s.data : []).forEach((c) => {
          if (!c?.id) return;
          if (s.id === selSid && c.id === selCid) return;
          const tids = (Array.isArray(c.ticketIds) ? c.ticketIds : []).map(flowTicketNumber);
          if (!tids.includes(tid)) return;
          const el = frame.querySelector(`[data-card-id="${cssEscape(c.id)}"]`);
          if (!el) return;
          const r = el.getBoundingClientRect();
          const x2 = r.left + r.width / 2 - canvasRect.left;
          const y2 = r.top  + r.height / 2 - canvasRect.top;
          paths.push(`<path class="l2-body-wire l2-body-wire-highlight" stroke="${color}" d="${bezier(sx, sy, x2, y2)}"/>`);
        });
      });
    });
    svg.innerHTML = paths.join('');
  }

  function drawL2GovOverlay(json) {
    const wrap = document.getElementById('l2-body-canvas-wrap');
    const svg  = document.getElementById('l2-gov-overlay');
    if (!wrap || !svg) return;
    const coverage   = Array.isArray(json.coverage) ? json.coverage : [];
    const invariants = Array.isArray(json.invariants) ? json.invariants : [];

    const scrollW = Math.max(wrap.scrollWidth,  wrap.clientWidth);
    const scrollH = Math.max(wrap.scrollHeight, wrap.clientHeight);
    svg.setAttribute('width',  String(scrollW));
    svg.setAttribute('height', String(scrollH));
    svg.style.width  = scrollW + 'px';
    svg.style.height = scrollH + 'px';

    const wrapRect = wrap.getBoundingClientRect();
    const sx = wrap.scrollLeft, sy = wrap.scrollTop;
    const toLocal = (r) => ({
      x: r.left - wrapRect.left + sx,
      y: r.top  - wrapRect.top  + sy,
      w: r.width, h: r.height,
    });
    const cssEscape = (s) => String(s).replace(/[^a-zA-Z0-9_-]/g, (ch) => `\\${ch}`);
    const bezier = (x1, y1, x2, y2) => {
      const my = (y1 + y2) / 2;
      return `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`;
    };

    // Selection-filtered governance wires. At rest the strips are a legend,
    // not a graph. Wires appear only when the user asks a question. See #76.
    const selChip = state.l2SelectedChip || null;
    const selCardKey = state.l2SelectedCard || null;
    const [selCardSid, selCardCid] = selCardKey ? selCardKey.split('::') : [null, null];
    if (!selChip && !selCardKey) {
      svg.innerHTML = '';
      return;
    }

    const paths = [];
    const drawCoverageEdge = (edge) => {
      if (!edge || !edge.facetId || !edge.sectionId) return;
      const chip = wrap.querySelector(`[data-facet-id="${cssEscape(edge.facetId)}"]`);
      if (!chip) return;
      const frame = wrap.querySelector(`[data-section-id="${cssEscape(edge.sectionId)}"]`);
      if (!frame) return;
      const collapsed = frame.classList.contains('l2-frame-collapsed');
      let target = null;
      let drifted = false;
      if (edge.cardId) {
        target = frame.querySelector(`[data-card-id="${cssEscape(edge.cardId)}"]`);
        if (!target) drifted = true;
      }
      if (!target || collapsed) target = frame.querySelector('.l2-frame-head');
      if (!target) return;
      const a = toLocal(chip.getBoundingClientRect());
      const b = toLocal(target.getBoundingClientRect());
      const x1 = a.x + a.w / 2;
      const y1 = a.y + a.h;
      const x2 = b.x + b.w / 2;
      const y2 = b.y;
      paths.push(`<path class="l2-body-wire-coverage ${drifted ? 'l2-body-wire-drift' : ''}" stroke="${drifted ? '#b91c1c' : '#94a3b8'}" d="${bezier(x1, y1, x2, y2)}"/>`);
    };
    const drawInvariantEdges = (inv) => {
      if (!inv || !inv.id) return;
      const appliesTo = Array.isArray(inv.appliesTo) ? inv.appliesTo : [];
      if (appliesTo.length === 0 || appliesTo.includes('*')) return;
      const chip = wrap.querySelector(`[data-invariant-id="${cssEscape(inv.id)}"]`);
      if (!chip) return;
      appliesTo.forEach((sid) => {
        const head = wrap.querySelector(`[data-section-id="${cssEscape(sid)}"] .l2-frame-head`);
        if (!head) return;
        const a = toLocal(chip.getBoundingClientRect());
        const b = toLocal(head.getBoundingClientRect());
        const x1 = a.x + a.w / 2;
        const y1 = a.y;
        const x2 = b.x + b.w / 2;
        const y2 = b.y + b.h;
        paths.push(`<path class="l2-body-wire-invariant" stroke="#d97706" d="${bezier(x1, y1, x2, y2)}"/>`);
      });
    };

    if (selChip?.kind === 'facet') {
      coverage.forEach((edge) => {
        if (edge?.facetId === selChip.id) drawCoverageEdge(edge);
      });
    } else if (selChip?.kind === 'invariant') {
      const inv = invariants.find((i) => i?.id === selChip.id);
      if (inv) drawInvariantEdges(inv);
    } else if (selCardKey) {
      coverage.forEach((edge) => {
        if (edge?.sectionId === selCardSid && edge?.cardId === selCardCid) drawCoverageEdge(edge);
      });
      invariants.forEach((inv) => {
        const appliesTo = Array.isArray(inv?.appliesTo) ? inv.appliesTo : [];
        if (appliesTo.includes(selCardSid)) drawInvariantEdges(inv);
      });
    }

    svg.innerHTML = paths.join('');
  }

  function openL2SwapPopover(anchorBtn, sectionId) {
    closeL2SwapPopover();
    const section = state.sections.find((s) => s.id === sectionId);
    if (!section) return;
    const groups = getConvergenceGroups();
    const html = groups.map((group) => `
      <div class="l2-swap-popover-group">
        <span class="l2-swap-popover-group-title">${esc(group.label)}</span>
        ${group.items.map(([id, def]) => {
          const color = def.iconColor || '#64748b';
          const current = id === section.convergenceType;
          return `
            <button type="button" class="l2-swap-popover-item ${current ? 'current' : ''}" data-l2-swap-choice="${esc(id)}" title="${esc(def.structuralContract || def.description || id)}">
              <span class="l2-swap-popover-swatch" style="background:${color}"></span>
              <span>${esc(def.name || id)}</span>
            </button>`;
        }).join('')}
      </div>`).join('');
    const pop = document.createElement('div');
    pop.className = 'l2-swap-popover';
    pop.id = 'l2-swap-popover';
    pop.innerHTML = html;
    document.body.appendChild(pop);
    const r = anchorBtn.getBoundingClientRect();
    pop.style.top  = `${Math.min(r.bottom + 6, window.innerHeight - 330)}px`;
    pop.style.left = `${Math.min(r.right - 260, window.innerWidth - 270)}px`;

    pop.querySelectorAll('[data-l2-swap-choice]').forEach((item) => {
      item.addEventListener('click', (event) => {
        event.stopPropagation();
        const typeId = item.dataset.l2SwapChoice;
        if (typeId && typeId !== section.convergenceType) {
          section.convergenceType = typeId;
          autoSave();
          renderRight();
        } else {
          closeL2SwapPopover();
        }
      });
    });

    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', handleL2SwapOutsideClick, { once: true });
    }, 0);
  }
  function closeL2SwapPopover() {
    document.getElementById('l2-swap-popover')?.remove();
  }
  function handleL2SwapOutsideClick(event) {
    if (event.target.closest('#l2-swap-popover, [data-l2-swap]')) {
      document.addEventListener('click', handleL2SwapOutsideClick, { once: true });
      return;
    }
    closeL2SwapPopover();
  }

  function wireL2BodyInteractions(panel) {
    const canvas = panel.querySelector('#l2-body-canvas');
    if (!canvas) return;

    // Card click → select/deselect; clears any chip selection.
    canvas.querySelectorAll('.l2-card').forEach((el) => {
      el.addEventListener('click', (event) => {
        event.stopPropagation();
        const key = `${el.dataset.sectionId}::${el.dataset.cardId}`;
        state.l2SelectedCard = (state.l2SelectedCard === key) ? null : key;
        state.l2SelectedChip = null;
        autoSave();
        renderRight();
      });
    });

    // Governance chip click → select/deselect; clears any card selection.
    panel.querySelectorAll('.l2-gov-chip[data-facet-id], .l2-gov-chip[data-invariant-id]').forEach((el) => {
      el.addEventListener('click', (event) => {
        event.stopPropagation();
        const kind = el.dataset.facetId ? 'facet' : 'invariant';
        const id = el.dataset.facetId || el.dataset.invariantId;
        if (!id) return;
        const cur = state.l2SelectedChip;
        state.l2SelectedChip = (cur && cur.kind === kind && cur.id === id) ? null : { kind, id };
        state.l2SelectedCard = null;
        autoSave();
        renderRight();
      });
    });

    // Frame collapse → toggle
    canvas.querySelectorAll('[data-l2-collapse]').forEach((btn) => {
      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        const sid = btn.dataset.l2Collapse;
        const arr = Array.isArray(state.l2CollapsedFrames) ? [...state.l2CollapsedFrames] : [];
        const i = arr.indexOf(sid);
        if (i >= 0) arr.splice(i, 1); else arr.push(sid);
        state.l2CollapsedFrames = arr;
        autoSave();
        renderRight();
      });
    });

    // Inspector close
    panel.querySelector('[data-l2-inspector-close]')?.addEventListener('click', (event) => {
      event.stopPropagation();
      state.l2SelectedCard = null;
      autoSave();
      renderRight();
    });

    // Background click → deselect both card and chip
    canvas.closest('.l2-body-canvas-wrap')?.addEventListener('click', (event) => {
      if (event.target.closest('.l2-card, .l2-inspector, [data-l2-collapse], [data-l2-swap], .l2-gov-chip')) return;
      if (state.l2SelectedCard || state.l2SelectedChip) {
        state.l2SelectedCard = null;
        state.l2SelectedChip = null;
        autoSave();
        renderRight();
      }
    });

    // Swap convergence type
    canvas.querySelectorAll('[data-l2-swap]').forEach((btn) => {
      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        openL2SwapPopover(btn, btn.dataset.l2Swap);
      });
    });

    // Palette drag-to-insert
    panel.querySelectorAll('[data-l2-palette-type]').forEach((chip) => {
      chip.addEventListener('dragstart', (event) => {
        event.dataTransfer?.setData('text/l2-type', chip.dataset.l2PaletteType);
        if (event.dataTransfer) event.dataTransfer.effectAllowed = 'copy';
      });
    });
    canvas.addEventListener('dragover', (event) => {
      const hasType = event.dataTransfer && Array.from(event.dataTransfer.types || []).includes('text/l2-type');
      if (!hasType) return;
      event.preventDefault();
      if (event.dataTransfer) event.dataTransfer.dropEffect = 'copy';
      canvas.classList.add('l2-drag-over');
    });
    canvas.addEventListener('dragleave', (event) => {
      if (event.target === canvas) canvas.classList.remove('l2-drag-over');
    });
    canvas.addEventListener('drop', (event) => {
      const typeId = event.dataTransfer?.getData('text/l2-type');
      canvas.classList.remove('l2-drag-over');
      if (!typeId) return;
      event.preventDefault();
      const ct = REGISTRY?.convergenceTypes?.[typeId];
      if (!ct) return;
      const baseSlug = (ct.name || typeId).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 48) || typeId;
      const existing = new Set(state.sections.map((s) => s.id));
      let id = `sec-${baseSlug}`;
      let n = 2;
      while (existing.has(id)) { id = `sec-${baseSlug}-${n++}`; }
      state.sections.push({
        id,
        title: `New ${ct.name || typeId}`,
        convergenceType: typeId,
        data: [],
      });
      state.focusedSectionId = id;
      autoSave();
      renderRight();
    });
  }

  function renderFlowGovernancePreview(json) {
    const state = deriveFlowCoherence(json);
    const { facets, coverage, invariants, sections } = state;
    const hasGovernance = facets.length > 0 || coverage.length > 0 || invariants.length > 0;

    if (!hasGovernance) {
      return `
        <div class="flow-empty">
          <strong>${esc(t('flowEmptyTitle'))}</strong>
          ${esc(t('flowMissingGovernance'))}
        </div>`;
    }

    const orphanCount = [...state.facetStatus.values()].filter((v) => v.status === 'orphaned').length;
    const driftCount = [...state.facetStatus.values()].filter((v) => v.status === 'drift').length;
    const rationalesDeclared = sections.filter((s) => (s.rationale || '').trim().length > 0).length;
    const invArrows = invariants.reduce((n, inv) => n + (Array.isArray(inv.appliesTo) ? inv.appliesTo.length : 0), 0);

    const anyPositioned =
      facets.some((f) => f.flowPosition) ||
      sections.some((s) => s.flowPosition) ||
      invariants.some((i) => i.flowPosition);

    const statsHtml = `
      <span class="flow-stat"><strong>${facets.length}</strong> facets</span>

      <span class="flow-stat"><strong>${coverage.length}</strong> coverage edges</span>
      <span class="flow-stat"><strong>${invariants.length}</strong> invariants \u00b7 ${invArrows} arrows</span>
      <span class="flow-stat"><strong>${rationalesDeclared}/${sections.length}</strong> rationales</span>
      ${orphanCount > 0 ? `<span class="flow-stat flow-stat-bad"><strong>${orphanCount}</strong> orphaned</span>` : ''}
      ${driftCount > 0 ? `<span class="flow-stat flow-stat-warn"><strong>${driftCount}</strong> drifted</span>` : ''}
      ${anyPositioned ? `<button type="button" class="flow-reset-layout-btn" data-flow-reset-layout title="Clear all flowPosition values">${esc(t('flowResetLayout'))}</button>` : ''}`;

    const positionStyle = (node) => {
      const p = node?.flowPosition;
      if (!p || typeof p !== 'object') return '';
      const x = Number.isFinite(p.x) ? p.x : 0;
      const y = Number.isFinite(p.y) ? p.y : 0;

    };

    const facetsHtml = facets.map((facet) => {
      const { status } = state.facetStatus.get(facet.id) || { status: 'orphaned' };

        <article class="flow-node ${orphan ? 'flow-node-orphan' : ''}" data-flow-kind="facet" data-flow-id="${esc(facet.id)}"${positionStyle(facet)}>

          </div>

          <span class="flow-port flow-port-out" data-port="facet-out" data-facet-id="${esc(facet.id)}" title="Drag to a section's left port to add coverage"></span>

    }).join('');

    const sectionsHtml = sections.map((section) => {
      const rationale = (section.rationale || '').trim();
      const rationaleHtml = rationale
        ? `<div class="flow-rationale">${esc(rationale)}</div>`
        : `<div class="flow-rationale flow-rationale-empty">\u2014 no rationale declared yet \u2014</div>`;
      const cards = Array.isArray(section.data) ? section.data : [];
      const chips = cards.filter((c) => c && c.id).slice(0, 8).map((c) => `<span class="flow-card-chip">${esc(c.id)}</span>`).join('');
      const overflow = cards.filter((c) => c && c.id).length - 8;
      return `
        <article class="flow-node" data-flow-kind="section" data-flow-id="${esc(section.id)}"${positionStyle(section)}>

    const invariantsHtml = invariants.map((inv) => {

        <article class="flow-node flow-invariant" data-flow-kind="invariant" data-flow-id="${esc(inv.id)}"${positionStyle(inv)}>

          <div class="flow-node-id">${esc(inv.id)}</div>
          ${inv.statement ? `<div class="flow-invariant-statement">${esc(inv.statement)}</div>` : ''}

        <div class="flow-canvas-wrap" id="flow-canvas-wrap">
          <div class="flow-canvas" id="flow-canvas">
            <svg class="flow-wires" id="flow-wires" aria-hidden="true">
              <defs>
                <marker id="flow-arrow-inv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">

              <h4>${esc(t('flowColFacets'))}<span class="flow-col-count">${facets.length}</span></h4>

            <div class="flow-col flow-col-invariants">
              <h4>${esc(t('flowColInvariants'))}<span class="flow-col-count">${invariants.length}</span></h4>
              <div class="flow-nodes">${invariantsHtml}</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  let flowDragState = null;

  function drawFlowWires(doc) {
    const wrap = document.getElementById('flow-canvas-wrap');
    const wires = document.getElementById('flow-wires');
    const canvas = document.getElementById('flow-canvas');
    if (!wrap || !wires || !canvas) return;

    const coverage = Array.isArray(doc.coverage) ? doc.coverage : [];
    const invariants = Array.isArray(doc.invariants) ? doc.invariants : [];
    const sections = Array.isArray(doc.sections) ? doc.sections : [];
    const knownSectionIds = new Set(sections.map((s) => s.id));

    const canvasRect = canvas.getBoundingClientRect();
    wires.setAttribute('width',  String(canvasRect.width));
    wires.setAttribute('height', String(canvasRect.height));

    const svgX = (rect) => rect.left + rect.width / 2 - canvasRect.left;
    const svgY = (rect) => rect.top + rect.height / 2 - canvasRect.top;
    const cssEscape = (s) => String(s).replace(/[^a-zA-Z0-9_-]/g, (ch) => `\\${ch}`);
    const bezier = (x1, y1, x2, y2) => {
      const mid = (x1 + x2) / 2;
      return `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`;
    };

    const paths = [];

    // Coverage wires
    coverage.forEach((edge, idx) => {
      const from = canvas.querySelector(`[data-port="facet-out"][data-facet-id="${cssEscape(edge.facetId)}"]`);
      if (!from) return;
      const drift = !knownSectionIds.has(edge.sectionId);
      let toX, toY;
      if (!drift) {
        const sectionEl = canvas.querySelector(`[data-flow-kind="section"][data-flow-id="${cssEscape(edge.sectionId)}"]`);
        const toPort = sectionEl?.querySelector('[data-port="section-in"]');
        if (!toPort) return;
        const r = toPort.getBoundingClientRect();
        toX = svgX(r); toY = svgY(r);
      } else {
        const fr = from.getBoundingClientRect();
        toX = canvasRect.width * 0.62;
        toY = svgY(fr);
      }
      const fr = from.getBoundingClientRect();
      const d = bezier(svgX(fr), svgY(fr), toX, toY);
      paths.push(`<path class="flow-wire-hit" d="${d}" data-flow-edge="coverage" data-flow-edge-index="${idx}"></path>`);
      paths.push(`<path class="flow-wire-coverage ${drift ? 'flow-wire-drift' : ''}" d="${d}"/>`);
    });

    // Invariant arrows — one path per (invariantIdx, appliesToIdx) pair
    invariants.forEach((inv, invIdx) => {
      const from = canvas.querySelector(`[data-port="inv-out"][data-invariant-id="${cssEscape(inv.id)}"]`);
      if (!from) return;
      const applies = Array.isArray(inv.appliesTo) ? inv.appliesTo : [];
      const fr = from.getBoundingClientRect();
      const fromX = svgX(fr), fromY = svgY(fr);
      applies.forEach((target, targetIdx) => {
        let toX, toY;
        if (target === '*') {
          const sectionsCol = canvas.querySelector('.flow-col-sections')?.getBoundingClientRect();
          toX = sectionsCol ? sectionsCol.right - canvasRect.left + 6 : canvasRect.width * 0.62;
          toY = sectionsCol ? sectionsCol.top - canvasRect.top - 10 : fromY;
        } else {
          const sectionEl = canvas.querySelector(`[data-flow-kind="section"][data-flow-id="${cssEscape(target)}"]`);
          const toPort = sectionEl?.querySelector('[data-port="section-inv-in"]');
          if (!toPort) return;
          const r = toPort.getBoundingClientRect();
          toX = svgX(r); toY = svgY(r);
        }
        const d = bezier(fromX, fromY, toX, toY);
        paths.push(`<path class="flow-wire-hit" d="${d}" data-flow-edge="invariant" data-flow-inv-index="${invIdx}" data-flow-target-index="${targetIdx}"></path>`);
        paths.push(`<path class="flow-wire-invariant" d="${d}" marker-end="url(#flow-arrow-inv)"/>`);
      });
    });

    // Drag preview
    if (flowDragState) {
      const portSel = flowDragState.kind === 'invariant'
        ? `[data-port="inv-out"][data-invariant-id="${cssEscape(flowDragState.fromId)}"]`
        : `[data-port="facet-out"][data-facet-id="${cssEscape(flowDragState.fromId)}"]`;
      const from = canvas.querySelector(portSel);
      if (from) {
        const fr = from.getBoundingClientRect();
        const fromX = svgX(fr), fromY = svgY(fr);
        const toX = flowDragState.mouseX - canvasRect.left;
        const toY = flowDragState.mouseY - canvasRect.top;
        const d = bezier(fromX, fromY, toX, toY);
        const cls = flowDragState.kind === 'invariant'
          ? 'flow-wire-invariant flow-wire-preview'
          : 'flow-wire-coverage flow-wire-preview';
        const marker = flowDragState.kind === 'invariant' ? ' marker-end="url(#flow-arrow-inv)"' : '';
        paths.push(`<path class="${cls}" d="${d}"${marker}/>`);
      }
    }

    const defs = wires.querySelector('defs');
    wires.innerHTML = (defs ? defs.outerHTML : '') + paths.join('');
  }

  function renderJsonPreview(json) {
    const formatPrimitive = (value) => {
      if (typeof value === 'string') return JSON.stringify(value);
      if (typeof value === 'number' || typeof value === 'boolean') return String(value);
      if (value === null) return 'null';
      return JSON.stringify(value);
    };

    const buildLines = (key, value, depth, sectionId) => {
      const indent = '  '.repeat(depth);
      const keyPrefix = key === null ? '' : `${JSON.stringify(key)}: `;

      if (value === null || typeof value !== 'object') {
        return [{ text: `${indent}${keyPrefix}${formatPrimitive(value)}`, sectionId }];
      }

      if (Array.isArray(value)) {
        if (!value.length) return [{ text: `${indent}${keyPrefix}[]`, sectionId }];
        const lines = [{ text: `${indent}${keyPrefix}[`, sectionId }];
        value.forEach((entry, index) => {
          const entrySectionId = key === 'sections' && entry && typeof entry === 'object'
            ? entry.id || `section-${index}`
            : sectionId;
          const childLines = buildLines(null, entry, depth + 1, entrySectionId);
          if (index < value.length - 1) childLines[childLines.length - 1].text += ',';
          lines.push(...childLines);
        });
        lines.push({ text: `${indent}]`, sectionId });
        return lines;
      }

      const entries = Object.entries(value);
      if (!entries.length) return [{ text: `${indent}${keyPrefix}{}`, sectionId }];
      const lines = [{ text: `${indent}${keyPrefix}{`, sectionId }];
      entries.forEach(([entryKey, entryValue], index) => {
        const childLines = buildLines(entryKey, entryValue, depth + 1, sectionId);
        if (index < entries.length - 1) childLines[childLines.length - 1].text += ',';
        lines.push(...childLines);
      });
      lines.push({ text: `${indent}}`, sectionId });
      return lines;
    };

    const focusedSectionId = normalizeFocusedSection();
    const lines = buildLines(null, json, 0, null);

    return `
      <div class="json-preview">
        <button type="button" class="json-copy-btn" data-json-copy title="${esc(t('jsonCopyTitle'))}">${esc(t('jsonCopy'))}</button>
        <div class="json-preview-lines">
          ${lines.map((line, index) => {
            const isFocused = focusedSectionId && line.sectionId === focusedSectionId;
            const previousFocused = isFocused && index > 0 && lines[index - 1].sectionId === focusedSectionId;
            const nextFocused = isFocused && index < lines.length - 1 && lines[index + 1].sectionId === focusedSectionId;
            const classes = [
              'json-line',
              isFocused ? 'focused' : '',
              isFocused && !previousFocused ? 'focused-start' : '',
              isFocused && !nextFocused ? 'focused-end' : '',
            ].filter(Boolean).join(' ');
            return `<div class="${classes}"${line.sectionId ? ` data-section-id="${esc(line.sectionId)}"` : ''}>${esc(line.text)}</div>`;
          }).join('')}
        </div>
      </div>`;
  }

  function boardToTitle(value) {
    return String(value ?? '')
      .split('-')
      .map(part => part.charAt(0).toUpperCase() + part.slice(1))
      .join(' ');
  }

  function boardStatusSetTitle(statusSet) {
    return boardToTitle(String(statusSet ?? '').replace(/-status$/, ''));
  }

  function boardStatusTone(statusSet, value) {
    return REGISTRY?.statusSets?.[statusSet]?.tones?.[value] || 'neutral';
  }

  function boardStatusLabel(statusSet, value) {
    return REGISTRY?.statusSets?.[statusSet]?.labels?.[value] || boardToTitle(value);
  }

  function boardFieldLabel(field) {
    return field?.label || boardToTitle(field?.key || 'status');
  }

  function renderBoardBadge(label, toneName) {
    return `<span class="badge badge-${esc(toneName)}">${esc(label)}</span>`;
  }

  function buildSectionBoardEntries(section) {
    const ct = REGISTRY?.convergenceTypes?.[section?.convergenceType];
    if (!ct) return [];

    if (ct.projection === 'edge-table' && ct.edgeStatus?.key && ct.edgeStatus?.statusSet) {
      return [{
        section,
        ct,
        fieldKey: ct.edgeStatus.key,
        fieldLabel: boardFieldLabel(ct.edgeStatus),
        statusSet: ct.edgeStatus.statusSet,
        source: 'edgeStatus',
      }];
    }

    return (ct.statusFields || [])
      .filter(field => field?.key && field?.statusSet)
      .map(field => ({
        section,
        ct,
        fieldKey: field.key,
        fieldLabel: boardFieldLabel(field),
        statusSet: field.statusSet,
        source: 'statusField',
      }));
  }

  function buildBoardDimensions(sections) {
    const entries = (sections || []).flatMap(buildSectionBoardEntries);
    const byStatusSet = new Map();
    entries.forEach((entry) => {
      if (!byStatusSet.has(entry.statusSet)) byStatusSet.set(entry.statusSet, []);
      byStatusSet.get(entry.statusSet).push(entry);
    });

    const documentDimensions = Array.from(byStatusSet.entries())
      .filter(([, groupEntries]) => groupEntries.length > 1)
      .map(([statusSet, groupEntries]) => ({
        id: `doc-${slugify(statusSet) || 'status'}`,
        scope: 'document',
        statusSet,
        label: `${boardStatusSetTitle(statusSet)} board`,
        entries: groupEntries,
      }));

    const sectionDimensions = entries.map(entry => ({
      id: `section-${slugify(entry.section.id) || 'section'}-${slugify(entry.fieldKey) || 'status'}`,
      scope: 'section',
      statusSet: entry.statusSet,
      label: `${entry.section.title} · ${entry.fieldLabel}`,
      entries: [entry],
    }));

    return [...documentDimensions, ...sectionDimensions];
  }

  function chooseBoardDimension(dimensions) {
    const explicit = dimensions.find(dimension => dimension.id === state.boardDimensionId);
    if (explicit) return explicit;

    const focusedSectionId = normalizeFocusedSection();
    if (focusedSectionId) {
      const focused = dimensions.find(dimension =>
        dimension.scope === 'section' && dimension.entries.some(entry => entry.section.id === focusedSectionId)
      );
      if (focused) return focused;
    }

    return dimensions[0] || null;
  }

  function boardSourceDisplay(item, sourceDef) {
    if (!sourceDef) return '';
    const displayOverride = sourceDef.displayKey ? item[sourceDef.displayKey] : '';
    if (displayOverride) return String(displayOverride);
    const value = item[sourceDef.key];
    if (Array.isArray(value)) return value.map(entry => boardSourceValue(entry)).filter(Boolean).join(', ');
    return boardSourceValue(value);
  }

  function boardSourceValue(value) {
    if (value == null) return '';
    if (typeof value === 'string' || typeof value === 'number') return String(value);
    if (typeof value === 'object') return String(value.name ?? value.title ?? value.id ?? value.ref ?? '');
    return '';
  }

  function boardItemTitle(item, entry) {
    if (entry.source === 'edgeStatus') {
      const left = boardSourceDisplay(item, entry.ct.sourceA);
      const right = boardSourceDisplay(item, entry.ct.sourceB);
      const edgeTitle = [left, right].filter(Boolean).join(' -> ');
      if (edgeTitle) return edgeTitle;
    }
    return String(item.name || item.figmaName || item.title || item.id || 'Untitled item');
  }

  function boardCardNote(item, entry) {
    const textField = (entry.ct.textFields || []).find(field => item[field.key]);
    if (!textField) return '';
    return `<p class="board-preview-note"><strong>${esc(textField.label)}</strong> ${esc(item[textField.key])}</p>`;
  }

  function buildBoardModel(dimension) {
    const statusSet = REGISTRY?.statusSets?.[dimension.statusSet];
    const values = Array.isArray(statusSet?.values) ? statusSet.values : [];
    const lanes = values.map(value => ({
      value,
      label: boardStatusLabel(dimension.statusSet, value),
      tone: boardStatusTone(dimension.statusSet, value),
      cards: [],
    }));
    const laneByValue = new Map(lanes.map(lane => [lane.value, lane]));
    const fallbackLane = { value: '__other__', label: 'Other / missing', tone: 'neutral', cards: [] };

    dimension.entries.forEach((entry) => {
      (entry.section.data || []).forEach((item) => {
        const rawValue = item?.[entry.fieldKey];
        const value = rawValue == null ? '' : String(rawValue).trim();
        const lane = laneByValue.get(value) || fallbackLane;
        lane.cards.push({
          sectionId: entry.section.id,
          sectionTitle: entry.section.title,
          typeName: entry.ct.name || entry.section.convergenceType,
          title: boardItemTitle(item, entry),
          rawValue: value,
          knownValue: lane !== fallbackLane,
          noteHtml: boardCardNote(item, entry),
        });
      });
    });

    return {
      dimension,
      lanes: fallbackLane.cards.length ? [...lanes, fallbackLane] : lanes,
    };
  }

  function renderBoardPreviewCard(card, statusSet) {
    const focused = state.focusedSectionId === card.sectionId;
    const statusText = card.knownValue && card.rawValue
      ? boardStatusLabel(statusSet, card.rawValue)
      : (card.rawValue ? boardToTitle(card.rawValue) : 'Missing');
    const statusTone = card.knownValue ? boardStatusTone(statusSet, card.rawValue) : 'neutral';
    return `
      <article class="board-preview-card${focused ? ' focused' : ''}" data-section-id="${esc(card.sectionId)}">
        <div class="board-preview-kicker">${esc(card.sectionTitle)} · ${esc(card.typeName)}</div>
        <h3>${esc(card.title)}</h3>
        <div class="badge-row">${renderBoardBadge(statusText, statusTone)}</div>
        ${card.noteHtml}
      </article>`;
  }

  function renderBoardPreviewLane(lane, statusSet) {
    return `
      <section class="board-preview-lane">
        <header class="board-preview-lane-header">
          <span>${esc(lane.label)}</span>
          <span class="board-preview-count">${esc(String(lane.cards.length))}</span>
        </header>
        <div class="board-preview-cards">
          ${lane.cards.length
            ? lane.cards.map(card => renderBoardPreviewCard(card, statusSet)).join('')
            : `<div class="board-preview-empty">${esc(t('noneYet'))}</div>`}
        </div>
      </section>`;
  }

  function renderBoardPreview(json) {
    const sections = json.sections || [];
    const dimensions = buildBoardDimensions(sections);
    if (!dimensions.length) {
      return `<div class="empty-state"><p>${esc(t('noSections'))}</p></div>`;
    }

    const selected = chooseBoardDimension(dimensions);
    state.boardDimensionId = selected.id;
    const model = buildBoardModel(selected);
    const dimensionControl = dimensions.length > 1
      ? `
        <label class="board-preview-select-wrap">
          <span>${esc(t('board'))}</span>
          <select id="board-dimension" class="board-preview-select">
            ${dimensions.map(dimension => `<option value="${esc(dimension.id)}"${dimension.id === selected.id ? ' selected' : ''}>${esc(dimension.label)}</option>`).join('')}
          </select>
        </label>`
      : `<div class="board-preview-static-label">${esc(selected.label)}</div>`;

    return `
      <div class="board-preview">
        <div class="board-preview-toolbar">
          <div>
            <div class="board-preview-title">${esc(t('board'))}</div>
            <div class="board-preview-intro">Columns come from the registry status set; cards come from this document's convergence-type status fields.</div>
          </div>
          ${dimensionControl}
        </div>
        <div class="board-preview-context">
          <span>${esc(selected.scope === 'document' ? 'Document view' : 'Section view')}</span>
          <strong>${esc(boardStatusSetTitle(selected.statusSet))}</strong>
        </div>
        <div class="board-preview-track">
          <div class="board-preview-grid">
            ${model.lanes.map(lane => renderBoardPreviewLane(lane, selected.statusSet)).join('')}
          </div>
        </div>
      </div>`;
  }

  function buildSectionItemBlueprint(section) {
    const ct = REGISTRY?.convergenceTypes?.[section?.convergenceType];
    if (!ct) return null;

    if (ct.projection === 'edge-table') {
      const blueprint = {};
      if (ct.sourceA?.key) blueprint[ct.sourceA.key] = '';
      if (ct.sourceB?.key) blueprint[ct.sourceB.key] = '';
      if (ct.edgeStatus?.key) blueprint[ct.edgeStatus.key] = '';
      if (ct.edgeNotes?.key) blueprint[ct.edgeNotes.key] = [];
      return Object.keys(blueprint).length ? blueprint : null;
    }

    const sourceFields = Array.isArray(ct.sources) ? ct.sources.filter((source) => source?.key) : [];
    const statusFields = Array.isArray(ct.statusFields) ? ct.statusFields.filter((field) => field?.key) : [];
    const textFields = Array.isArray(ct.textFields) ? ct.textFields.filter((field) => field?.key) : [];
    const detailsFields = Array.isArray(ct.detailsFields) ? ct.detailsFields.filter((field) => field?.key) : [];

    if (!sourceFields.length && !statusFields.length && !textFields.length && !detailsFields.length) {
      return null;
    }

    const blueprint = { name: '' };
    sourceFields.forEach((source) => {
      if (!(source.key in blueprint)) blueprint[source.key] = [];
    });
    statusFields.forEach((field) => {
      if (!(field.key in blueprint)) blueprint[field.key] = '';
    });
    textFields.forEach((field) => {
      if (!(field.key in blueprint)) blueprint[field.key] = '';
    });
    detailsFields.forEach((field) => {
      if (!(field.key in blueprint)) blueprint[field.key] = [];
    });
    return blueprint;
  }

  function compactObject(object) {
    return Object.fromEntries(Object.entries(object).filter(([, value]) => {
      if (value === null || value === undefined) return false;
      if (typeof value === 'string') return value.trim().length > 0;
      if (Array.isArray(value)) return value.length > 0;
      if (typeof value === 'object') return Object.keys(value).length > 0;
      return true;
    }));
  }

  function buildPromptContext() {
    const json = buildJson();
    const registryTypeIds = [...new Set(json.sections.map((section) => section.convergenceType).filter(Boolean))];
    const registrySlice = Object.fromEntries(registryTypeIds.map((typeId) => {
      const def = REGISTRY?.convergenceTypes?.[typeId];
      if (!def) return [typeId, null];
      return [typeId, compactObject({
        name: def.name,
        category: def.category,
        description: def.description,
        structuralContract: def.structuralContract,
        notFor: def.notFor,
        promptGuidance: def.promptGuidance,
        projection: def.projection,
        columns: def.columns,
        columnHeaders: def.columnHeaders,
        sources: def.sources,
        statusFields: def.statusFields,
        textFields: def.textFields,
        detailsFields: def.detailsFields,
        sourceA: def.sourceA,
        sourceB: def.sourceB,
        edgeStatus: def.edgeStatus,
        edgeNotes: def.edgeNotes,
        nestable: def.nestable,
      })];
    }).filter(([, def]) => def));

    const documentIdentity = compactObject({
      docId: json.docId,
      title: json.title,
      subtitle: json.subtitle,
      objective: json.objective,
      scope: json.scope,
      owner: json.owner,
      sourceCoverage: json.sourceCoverage,
      version: json.version,
      canonicalOrigin: json.canonicalOrigin,
      derivedFrom: json.derivedFrom,
    });

    const sectionMap = json.sections.map((section) => compactObject({
      id: section.id,
      title: section.title,
      convergenceType: section.convergenceType,
      itemCount: Array.isArray(section.data) ? section.data.length : 0,
      itemBlueprint: section.itemBlueprint,
    }));

    const projectSection = (section) => {
      const projected = {
        id: section.id,
        title: section.title,
        convergenceType: section.convergenceType,
        itemBlueprint: section.itemBlueprint || buildSectionItemBlueprint(section),
        data: section.data || [],
      };
      if (section.callout) projected.callout = section.callout;
      if (section.stats) projected.stats = section.stats;
      if (section.pills) projected.pills = section.pills;
      return projected;
    };

    const payload = {
      ...documentIdentity,
      sections: json.sections.map(projectSection),
    };

    const templateSemantics = buildTemplateSemantics(json);
    const referenceRepo = buildReferenceRepoContext(templateSemantics);
    const convergenceSemantics = buildConvergenceSemantics(sectionMap, registrySlice);

    return {
      documentIdentity,
      sectionMap,
      registrySlice,
      convergenceSemantics,
      payload,
      templateSemantics,
      referenceRepo,
    };
  }

  function buildPromptText() {
    const context = buildPromptContext();
    const jsonBlock = (value) => `\`\`\`json\n${JSON.stringify(value, null, 2)}\n\`\`\``;
    const header = [
      'Create a reusable code-agent skill package from the living document below.',
      'Use the structure and payload exactly as given so the result can inspect, update, and refresh this document shape without rediscovering it first.',
    ];
    const packageRequirements = [
      '- Recommend a concise artifact or skill folder name.',
      '- Output a compact file tree for the package.',
      '- Include one primary instruction file that explains when to use the skill and how to operate it.',
      '- Add supporting files only when they materially help future sessions reuse the workflow.',
    ];
    const semanticLayers = [
      '- Treat `Convergence type definitions used by this document` as the hard schema contract.',
      '- Treat `Convergence steering` as the selected-type operating identity for this specific document shape.',
      '- Treat `Current document payload` as the concrete current-state examples and source cues.',
      '- Treat `Public reference repo for deeper concept context and latest updates` as supporting background material for deeper conceptual grounding and freshness checks.',
      context.templateSemantics
        ? '- Treat `Template semantics` as the higher-level workflow identity, intended use, and growth path for the skill.'
        : '- Because no template semantics block is present, infer the workflow identity from the convergence types and current section map only.',
    ];
    const requirements = [
      '- Preserve section ids, titles, convergence types, and registry-defined field shapes.',
      '- Do not invent source keys, status fields, derivations, or section structures that are not present in the document or registry slice.',
      '- Treat `itemBlueprint` as the structural contract for empty or partially filled sections.',
      '- Make the skill visibly specific to the selected convergence types, especially when the document is new or sparse.',
      '- Use the payload as concrete examples and source cues, not as permission to reshape the schema.',
      '- Cover the document-wide workflow across the provided section map.',
      '- Show how the skill should inspect, update, or refresh the provided section structures from their source surfaces.',
      '- Assume the listed GitHub repo is publicly readable. Use it for deeper model understanding and to check for newer repo-level updates when needed.',
      '- If the repo references disagree with this prompt, keep the prompt payload, section map, and registry slice authoritative for this document instance.',
      context.templateSemantics
        ? '- Use the template semantics block to shape the skill trigger conditions, workflow order, and higher-level identity without changing the schema contract.'
        : '- Without a template harness, keep the skill identity grounded in the convergence-type meanings and the current section map.',
      '- Keep the core instructions compact and split bulky examples, lookup tables, or domain notes into optional supporting files only when they add real value.',
      '- Do not output README files, changelogs, installation guides, or other auxiliary docs.',
      '- If you choose a `SKILL.md` format, keep the frontmatter minimal and the instructions imperative.',
    ];
    const templateSteering = context.templateSemantics ? [
      ...(context.templateSemantics.operatingThesis ? [
        `- Organize the skill around this operating thesis: ${context.templateSemantics.operatingThesis}`,
      ] : []),
      ...(context.templateSemantics.keepDistinct?.length ? [
        `- Keep these concerns distinct in the skill's mental model and workflow: ${context.templateSemantics.keepDistinct.join('; ')}.`,
      ] : []),
      ...(context.templateSemantics.notFor?.length ? [
        `- Do not let the skill drift into these neighboring modes: ${context.templateSemantics.notFor.join('; ')}.`,
      ] : []),
    ] : [];
    const renderConvergenceTypeSteering = (type) => {
      const guidance = type.promptGuidance;
      if (!guidance) {
        return [`- ${type.typeName}: missing required registry promptGuidance. Update scripts/living-doc-registry.json before using this type for prompt generation.`];
      }
      return [
        `- ${type.typeName}: ${guidance.operatingThesis}`,
        ...(guidance.keepDistinct?.length ? [`  Keep distinct: ${guidance.keepDistinct.join('; ')}.`] : []),
        ...(guidance.inspect?.length ? [`  Inspect: ${guidance.inspect.join('; ')}.`] : []),
        ...(guidance.update?.length ? [`  Update: ${guidance.update.join('; ')}.`] : []),
        ...(guidance.avoid?.length ? [`  Avoid: ${guidance.avoid.join('; ')}.`] : []),
        ...(type.structuralContract ? [`  Preserve structure: ${type.structuralContract}`] : []),
        ...(type.sourceSurfaces?.length ? [`  Source surfaces: ${type.sourceSurfaces.join('; ')}.`] : []),
        ...(type.statusFields?.length ? [`  Status fields: ${type.statusFields.join('; ')}.`] : []),
      ];
    };
    const convergenceSteering = context.convergenceSemantics ? [
      `- ${context.convergenceSemantics.compositionThesis}`,
      ...context.convergenceSemantics.selectedTypes.flatMap(renderConvergenceTypeSteering),
    ] : [];
    const responseShape = [
      '- Start with a short rationale for the package.',
      '- Then output the proposed file tree.',
      '- Then output the full contents of each file in fenced code blocks.',
      '- If a supporting file is unnecessary, omit it instead of adding placeholders.',
    ];

    return [
      ...header,
      '',
      'Package requirements:',
      ...packageRequirements,
      '',
      'Document identity:',
      jsonBlock(context.documentIdentity),
      '',
      'Section map:',
      jsonBlock(context.sectionMap),
      '',
      'Convergence type definitions used by this document:',
      jsonBlock(context.registrySlice),
      ...(convergenceSteering.length ? [
        '',
        'Convergence steering:',
        ...convergenceSteering,
      ] : []),
      '',
      'Public reference repo for deeper concept context and latest updates:',
      jsonBlock(context.referenceRepo),
      ...(context.templateSemantics ? [
        '',
        'Template semantics:',
        jsonBlock(context.templateSemantics),
      ] : []),
      ...(templateSteering.length ? [
        '',
        'Template steering:',
        ...templateSteering,
      ] : []),
      '',
      'Current document payload:',
      jsonBlock(context.payload),
      '',
      'Interpret these layers differently:',
      ...semanticLayers,
      '',
      'Requirements:',
      ...requirements,
      '',
      'Response shape:',
      ...responseShape,
    ].join('\n');
  }

  function copyPromptText() {
    const textarea = document.getElementById('prompt-output');
    if (!textarea) return;
    const value = textarea.value;
    const markCopied = () => {
      state.promptCopyState = 'copied';
      renderRight();
      clearTimeout(copyPromptText._timer);
      copyPromptText._timer = setTimeout(() => {
        state.promptCopyState = null;
        renderRight();
      }, 1600);
    };

    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(value).then(markCopied).catch(() => {
        textarea.focus();
        textarea.select();
        document.execCommand('copy');
        markCopied();
      });
      return;
    }

    textarea.focus();
    textarea.select();
    document.execCommand('copy');
    markCopied();
  }

  function syncPromptOutputInPlace() {
    const textarea = document.getElementById('prompt-output');
    if (!textarea) return;
    textarea.value = buildPromptText();
  }

  function renderPromptPanel() {
    const promptText = buildPromptText();
    const copyLabel = state.promptCopyState === 'copied' ? t('copied') : t('copyPrompt');

    return `
      <aside class="visual-prompt-panel">
        <section class="prompt-card">
          <div class="prompt-card-header">
            <div class="prompt-card-title-wrap">
              <div class="prompt-card-title">${esc(t('promptBuilder'))}</div>
              <div class="prompt-card-intro">${esc(t('promptIntro'))}</div>
            </div>
            <button class="prompt-copy-btn" id="copy-prompt">${esc(copyLabel)}</button>
          </div>
          <textarea class="prompt-output" id="prompt-output" readonly spellcheck="false">${esc(promptText)}</textarea>
        </section>
      </aside>`;
  }

  /* ── Help view ── */
  function renderHelp() {
    const ct = REGISTRY?.convergenceTypes ?? {};

  /* ── Visual preview (lightweight inline preview) ── */
  function renderGovernancePanel() {
    const facets = govFacets();
    const coverage = govCoverage();
    const invariants = govInvariants();
    const sections = state.sections || [];
    const fingerprintStored = govFingerprint();

    const facetRows = facets.length === 0
      ? `<div class="gov-empty">No facets yet. Decompose the objective into typed facets, or click "Crystallize this doc" to extract a first pass via the skill.</div>`
      : facets.map((facet, idx) => `
          <div class="gov-row" data-gov-facet-idx="${idx}">
            <input type="text" data-gov-facet-field="name" value="${esc(facet.name || '')}" placeholder="Facet name" />
            <textarea data-gov-facet-field="description" placeholder="One-sentence description…" rows="1">${esc(facet.description || '')}</textarea>
            <button type="button" class="gov-remove-btn" data-gov-facet-remove="${idx}" aria-label="Remove facet">&times;</button>
          </div>`).join('');

    const coverageRows = facets.length === 0
      ? ''
      : facets.map((facet) => {
          const edgesForFacet = coverage.filter((c) => c.facetId === facet.id);
          const groupsHtml = sections.length === 0
            ? '<div class="gov-empty">No sections to bind to yet.</div>'
            : sections.map((section) => {
                const cards = Array.isArray(section.data) ? section.data : [];
                const chips = [
                  { cardId: '', label: 'section' },
                  ...cards.filter((c) => c && c.id).map((c) => ({ cardId: c.id, label: c.id })),
                ].map((entry) => {
                  const isSelected = edgesForFacet.some((e) => e.sectionId === section.id && (e.cardId || '') === entry.cardId);
                  return `
                    <span class="gov-coverage-chip${isSelected ? ' selected' : ''}"
                      data-gov-cov-toggle
                      data-facet-id="${esc(facet.id)}"
                      data-section-id="${esc(section.id)}"
                      data-card-id="${esc(entry.cardId)}">${esc(entry.label)}</span>`;
                }).join('');
                return `
                  <div class="gov-coverage-group">
                    <span class="gov-coverage-group-title">${esc(section.title || section.id)}</span>
                    <div class="gov-coverage-chips">${chips}</div>
                  </div>`;
              }).join('');
          return `
            <div class="gov-coverage-row">
              <div class="gov-coverage-facet">
                ${esc(facet.name || facet.id)}
                <small>${esc(facet.id)}</small>
              </div>
              <div class="gov-coverage-targets">${groupsHtml}</div>
            </div>`;
        }).join('');

    const invariantCards = invariants.length === 0
      ? `<div class="gov-empty">No invariants yet. Capture rules the doc already follows — constraints that should hold after every edit.</div>`
      : invariants.map((inv, idx) => {
          const applies = Array.isArray(inv.appliesTo) ? inv.appliesTo : [];
          const starSelected = applies.includes('*');
          const sectionChips = [
            `<span class="gov-applies-chip${starSelected ? ' selected' : ''}" data-gov-inv-applies="${idx}" data-applies-id="*">*</span>`,
            ...sections.map((section) => {
              const selected = applies.includes(section.id);
              return `<span class="gov-applies-chip${selected ? ' selected' : ''}" data-gov-inv-applies="${idx}" data-applies-id="${esc(section.id)}">${esc(section.title || section.id)}</span>`;
            }),
          ].join('');
          return `
            <div class="gov-inv-card" data-gov-inv-idx="${idx}">
              <button type="button" class="gov-remove-btn gov-inv-remove" data-gov-inv-remove="${idx}" aria-label="Remove invariant">&times;</button>
              <div class="gov-inv-field">
                <label>Name</label>
                <input type="text" data-gov-inv-field="name" value="${esc(inv.name || '')}" placeholder="Decisions migrate out of verification" />
              </div>
              <div class="gov-inv-field">
                <label>Statement</label>
                <textarea data-gov-inv-field="statement" rows="2" placeholder="If a Verification Plan item becomes a settled operating choice, move it to Decision Record.">${esc(inv.statement || '')}</textarea>
              </div>
              <div class="gov-inv-field">
                <label>Applies to</label>
                <div class="gov-applies-row">${sectionChips}</div>
              </div>
            </div>`;
        }).join('');

    const coherenceItems = govDeriveCoherenceItems();
    const previewHtml = coherenceItems.length === 0
      ? '<div class="gov-empty">Preview appears when facets and coverage are declared.</div>'
      : `<div class="gov-preview-grid">${coherenceItems.map((item) => {
          const badgeClass = item.status === 'covered' ? 'gov-preview-badge-covered' : (item.status === 'drift' ? 'gov-preview-badge-drift' : 'gov-preview-badge-orphaned');
          const carriers = (item.sectionIds || []).map((sid) => {
            const s = sections.find((x) => x.id === sid);
            return `<span class="gov-carrier-tag">${esc(s ? s.title : sid)}</span>`;
          }).join('');
          return `
            <div class="gov-preview-card">
              <h5>${esc(item.name || item.id)}<span class="gov-preview-badge ${badgeClass}">${esc(item.status)}</span></h5>
              <p>${esc(item.description || '—')}</p>
              ${carriers ? `<div class="gov-carriers">${carriers}</div>` : ''}
            </div>`;
        }).join('')}</div>`;

    const pillLabel = fingerprintStored ? 'Meta: stamped' : 'Meta: not stamped';
    const pillClass = fingerprintStored ? 'gov-pill gov-pill-missing' : 'gov-pill gov-pill-missing';

    return `
      <section class="gov-panel" aria-label="Governance layer">
        <div class="gov-panel-header">
          <h3>Governance Layer</h3>
          <div class="gov-pill-row">
            <span class="${pillClass}" data-gov-pill>${esc(pillLabel)}</span>
            <button type="button" class="gov-stamp-btn" data-gov-stamp>Stamp fingerprint</button>
            <button type="button" class="gov-crystallize-btn" data-gov-crystallize>Crystallize…</button>
          </div>
        </div>
        <p class="gov-hint">Facets decompose the objective. Coverage maps each facet to the sections and cards that carry it. Invariants capture the contracts this doc already follows. The fingerprint stamps the section structure at crystallization time so drift becomes loud.</p>

        <div class="gov-section">
          <h4>Objective facets <span class="gov-count">${facets.length}</span></h4>
          ${facetRows}
          <button type="button" class="gov-add-btn" data-gov-facet-add>+ Add facet</button>
        </div>

        <div class="gov-section">
          <h4>Coverage <span class="gov-count">${coverage.length}</span></h4>
          ${facets.length === 0
            ? '<div class="gov-empty">Add facets above to start mapping coverage.</div>'
            : coverageRows}
        </div>

        <div class="gov-section">
          <h4>Invariants <span class="gov-count">${invariants.length}</span></h4>
          ${invariantCards}
          <button type="button" class="gov-add-btn" data-gov-inv-add>+ Add invariant</button>
        </div>

        <div class="gov-section">
          <h4>Coherence preview</h4>
          ${previewHtml}
        </div>
      </section>`;
  }

  async function refreshFingerprintPill() {
    const pill = document.querySelector('[data-gov-pill]');
    if (!pill) return;
    const stored = govFingerprint();
    if (!stored) {
      pill.textContent = 'Meta: not stamped';
      pill.className = 'gov-pill gov-pill-missing';
      return;
    }
    const current = await govComputeFingerprint();
    if (!current) {
      pill.textContent = 'Meta: stamped';
      pill.className = 'gov-pill gov-pill-missing';
      return;
    }
    if (stored === current) {
      pill.textContent = 'Meta: fresh';
      pill.className = 'gov-pill gov-pill-fresh';
    } else {
      pill.textContent = 'Meta: stale';
      pill.className = 'gov-pill gov-pill-stale';
    }
  }
