  /* ── Library discovery ── */
  // Known doc filenames — the compositor scans these on load.
  // When served from a file server, fetch each and check if it's a valid universal doc JSON.
  const KNOWN_DOC_FILES = [
    'figma-mobile-universal.json',
    'figma-mobile-living-doc.json',
  ];

  async function discoverLibrary() {
    library = [];
    const seen = new Set();
    state.libraryStatus = createLibraryStatus();
    state.libraryStatus.checkedAt = new Date().toISOString();
    state.libraryStatus.manifest.enabled = Boolean(appSettings.preferManifest && appSettings.libraryManifestUrl);
    state.libraryStatus.manifest.url = appSettings.libraryManifestUrl || '';
    state.libraryStatus.sibling.enabled = Boolean(appSettings.includeSiblingDiscovery);

    if (appSettings.preferManifest && appSettings.libraryManifestUrl) {
      await tryLoadLibraryManifest(appSettings.libraryManifestUrl, seen, state.libraryStatus.manifest);
      if (library.length > 0 && !appSettings.includeSiblingDiscovery) {
        state.libraryStatus.sibling.status = 'disabled';
        state.libraryStatus.totalCount = library.length;
        return;
      }
    } else {
      state.libraryStatus.manifest.status = 'disabled';
    }

    if (!appSettings.includeSiblingDiscovery) {
      state.libraryStatus.sibling.status = 'disabled';
      state.libraryStatus.totalCount = library.length;
      return;
    }

    state.libraryStatus.sibling.status = 'checking';
    const siblingStartCount = library.length;

    // Try fetching a directory listing (works with some dev servers)
    try {
      const res = await fetch('./');
      if (res.ok) {
        const html = await res.text();
        const matches = html.match(/href="([^"]+\.json)"/g) || [];
        const files = matches.map(m => m.replace(/href="|"/g, '')).filter(f => !f.startsWith('.') && f !== 'living-doc-registry.json' && !f.startsWith(TEMPLATE_FILENAME_PREFIX));
        for (const file of files) {
          await tryLoadLibraryItem(file, seen);
        }
        if (library.length > siblingStartCount) {
          state.libraryStatus.sibling.entryCount = library.length - siblingStartCount;
          state.libraryStatus.sibling.status = 'loaded';
          state.libraryStatus.totalCount = library.length;
          return;
        }
      }
    } catch (err) {
      state.libraryStatus.sibling.error = err?.message || String(err);
    }
    // Fallback: try known filenames
    for (const file of KNOWN_DOC_FILES) {
      await tryLoadLibraryItem(file, seen);
    }
    state.libraryStatus.sibling.entryCount = library.length - siblingStartCount;
    state.libraryStatus.sibling.status = state.libraryStatus.sibling.entryCount > 0 ? 'loaded' : 'empty';
    state.libraryStatus.totalCount = library.length;
  }

  function libraryKey(item) {
    return item?.id || item?.jsonHref || item?.filename || item?.href || item?.localHtmlPath || item?.title;
  }

  function addLibraryItem(item, seen) {
    const key = libraryKey(item);
    if (!key || seen.has(key)) return false;
    seen.add(key);
    library.push(item);
    return true;
  }

  async function tryLoadLibraryManifest(manifestUrl, seen, status = null) {
    if (status) {
      status.status = 'checking';
      status.url = manifestUrl;
    }
    try {
      const res = await fetch(manifestUrl, { cache: 'no-store' });
      if (!res.ok) {
        if (status) {
          status.status = res.status === 404 ? 'missing' : 'failed';
          status.error = `${res.status} ${res.statusText}`.trim();
        }
        return;
      }
      const manifest = await res.json();
      const entries = Array.isArray(manifest) ? manifest : manifest.entries;
      if (!Array.isArray(entries)) {
        if (status) status.status = 'invalid';
        return;
      }

      for (const entry of entries) {
        const item = {
          id: entry.id || entry.domain || entry.title,
          filename: entry.jsonHref || entry.href || entry.localHtmlPath || entry.domain || entry.title,
          title: entry.title || entry.domain || entry.id || 'Living doc',
          subtitle: entry.subtitle || '',
          domain: entry.domain || '',
          repo: entry.repo || '',
          updated: entry.updated || entry.createdAt || null,
          sectionCount: Number.isFinite(Number(entry.sectionCount)) ? Number(entry.sectionCount) : 0,
          brand: entry.brand || null,
          href: entry.href || entry.localHtmlUrl || '',
          jsonHref: entry.jsonHref || entry.localJsonUrl || '',
          syncSkill: entry.syncSkill || '',
          summary: entry.summary || '',
          source: 'manifest',
          manifestEntry: true,
        };
        if (item.jsonHref) {
          try {
            const docRes = await fetch(item.jsonHref, { cache: 'no-store' });
            if (docRes.ok) {
              item.json = await docRes.json();
              item.sectionCount = Array.isArray(item.json.sections) ? item.json.sections.length : item.sectionCount;
              item.title = item.json.title || item.title;
              item.updated = item.json.updated || item.updated;
            }
          } catch {}
        }
        if (addLibraryItem(item, seen) && status) {
          status.entryCount += 1;
          if (item.json || item.jsonHref) status.editableCount += 1;
          else status.indexOnlyCount += 1;
        }
      }
      if (status) status.status = status.entryCount > 0 ? 'loaded' : 'empty';
    } catch (err) {
      if (status) {
        status.status = 'failed';
        status.error = err?.message || String(err);
      }
    }
  }

  async function tryLoadLibraryItem(filename, seen) {
    try {
      if (filename.startsWith(TEMPLATE_FILENAME_PREFIX)) return;
      const res = await fetch(`./${filename}`);
      if (!res.ok) return;
      const json = await res.json();
      // Must have sections array to be a universal doc, or title to be any living doc
      if (json.sections || json.title) {
        return addLibraryItem({
          filename,
          title: json.title || filename,
          updated: json.updated || null,
          sectionCount: (json.sections || []).length,
          brand: json.brand || null,
          source: 'sibling',
          json,
        }, seen);
      }
    } catch {}
    return false;
  }

  async function openLibraryItem(item) {
    if (item?.json) {
      loadFromLibrary(item);
      return;
    }

    if (item?.jsonHref) {
      try {
        const res = await fetch(item.jsonHref, { cache: 'no-store' });
        if (res.ok) {
          item.json = await res.json();
          loadFromLibrary(item);
          return;
        }
      } catch {}
    }

    const href = item?.href || item?.localHtmlUrl;
    if (href) {
      window.open(href, '_blank', 'noopener');
    }
  }

  function loadFromLibrary(item) {
    const json = item.json;
    state.title = json.title || '';
    state.subtitle = json.subtitle || '';
    state.brand = json.brand || 'LD';
    state.objective = json.objective || '';
    state.successCondition = json.successCondition || '';
    state.docExtras = extractDocExtras(json);
    state.focusedSectionId = null;
    state.pendingFocusedSectionScroll = false;
    state.promptCopyState = null;
    state.originDoc = { filename: item.filename, title: item.title };
    state.previewTab = 'visual';
    state.sections = (json.sections || []).map(s => ({
      ...s,
      id: s.id || `sec-${slugify(s.title)}`,
      title: s.title || '',
      convergenceType: s.convergenceType || '',
      data: s.data || [],
    }));
    renderLeft();
    renderRight();
  }

  function applyTemplate(template) {
    if (!template?.json) return;
    loadFromLibrary({
      filename: template.filename || 'embedded-template.json',
      title: template.title || 'Template',
      json: template.json,
    });
  }

  /* ── Guide overlay ── */
  function openGuide() {
    const overlay = document.getElementById('guide-overlay');
    const panel = document.getElementById('guide-panel');
    panel.innerHTML = `<button class="guide-close" id="guide-close">\u00d7</button>` + renderHelp();
    overlay.classList.add('open');
    document.getElementById('guide-close').addEventListener('click', closeGuide);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeGuide(); });
  }
  function closeGuide() {
    document.getElementById('guide-overlay').classList.remove('open');
  }

  /* ── Init ── */
  async function init() {
    await loadRegistry();
    await discoverLibrary();
    state.leftDrawerOpen = !isEmbedded;
    state.leftDrawerMode = 'structure';
    // When embedded in a living doc iframe, skip auto-load — parent will call loadDocumentData
    const restored = isEmbedded ? false : autoLoad();
    if (restored && state.sections.length > 0) state.previewTab = 'visual';
    // Detect if we arrived from a living doc via the pencil link
    const ref = document.referrer;
    if (ref && ref.includes('.html') && !ref.includes('compositor')) {
      const refFile = ref.split('/').pop().replace('.html', '.json');
      const fromLib = library.find(l => l.filename === refFile);
      if (fromLib && !restored) {
        loadFromLibrary(fromLib);
        return; // loadFromLibrary calls render
      } else if (fromLib) {
        state.originDoc = { filename: fromLib.filename, title: fromLib.title };
      }
    }
    renderTopBar();
    renderLeft();
    renderRight();
  }

  // Allow parent page to load document data (when embedded as iframe in a living doc)
  // Supports both direct function call and postMessage
  function applyDocumentData(json) {
    state.leftDrawerMode = 'structure';
    state.leftDrawerOpen = !isEmbedded;
    state.title = json.title || '';
    state.subtitle = json.subtitle || '';
    state.brand = json.brand || 'LD';
    state.objective = json.objective || '';
    state.successCondition = json.successCondition || '';
    state.docExtras = extractDocExtras(json);
    state.focusedSectionId = null;
    state.pendingFocusedSectionScroll = false;
    state.promptCopyState = null;
    state.sections = (json.sections || []).map(s => ({
      ...s,
      id: s.id || `sec-${slugify(s.title)}`,
      title: s.title || '',
      convergenceType: s.convergenceType || '',
      data: s.data || [],
    }));
    state.originDoc = { filename: 'current-document.json', title: json.title || 'Current Document' };
    state.previewTab = 'visual';
    renderTopBar(); renderLeft(); renderRight();
  }
  window.loadDocumentData = applyDocumentData;

  // Listen for postMessage from parent (reliable cross-iframe communication)
  window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'load-document' && event.data.doc) {
      applyDocumentData(event.data.doc);
    }
  });

  init();
})();
</script>
</body>
