<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Living Doc Compositor</title>
<style>
  :root {
    --bg: #f5f7fa; --card: #ffffff; --ink: #1a2332; --muted: #64748b;
    --line: #e2e8f0; --accent: #2563eb; --accent-light: #dbeafe;
    --positive-bg: #ecfdf5; --positive-ink: #166534;
    --warning-bg: #fffbeb; --warning-ink: #92400e;
    --negative-bg: #fef2f2; --negative-ink: #991b1b;
    --neutral-bg: #f1f5f9; --neutral-ink: #475569;
    --radius: 12px; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    font: 14px/1.6 ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; cursor: pointer; }

  /* ── Layout ── */
  .top-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; background: var(--card);
    border-bottom: 1px solid var(--line); height: 56px;
  }
  .top-bar .logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0;
  }
  .top-bar h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .top-bar .tagline { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .top-bar .spacer { flex: 1; }
  .top-action {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .top-action:hover { border-color: var(--accent); color: var(--accent); }
  .top-action-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .top-action-primary:hover { opacity: 0.9; color: #fff; }
  .top-bar .lang-switch { display: flex; gap: 2px; margin-left: 8px; }
  .top-bar .lang-btn {
    padding: 4px 8px; border-radius: 6px; border: none;
    font-size: 10.5px; font-weight: 600; cursor: pointer; letter-spacing: 0.02em;
  }
  .app { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 56px); }
  .panel { overflow-y: auto; padding: 24px; }
  .panel-left {
    background: var(--card); border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 20px;
  }
  .panel-right { background: var(--bg); }
  .panel-header { display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .panel-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .panel-header .logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0;
  }

  /* ── Form fields ── */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  .field input, .field textarea {
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px;
    font: inherit; font-size: 14px; background: var(--bg); color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 56px; }

  /* ── Convergence type picker ── */
  .section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); padding: 8px 0 4px;
  }
  .ct-list { display: flex; flex-direction: column; gap: 6px; }
  .ct-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .ct-item:hover { border-color: var(--accent); }
  .ct-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .ct-item .ct-icon {
    width: 32px; height: 32px; border-radius: 8px; background: var(--neutral-bg);
    display: flex; align-items: center; justify-content: center; color: var(--muted); flex-shrink: 0;
  }
  .ct-item.selected .ct-icon { background: var(--accent); color: #fff; }
  .ct-item .ct-info { flex: 1; min-width: 0; }
  .ct-item .ct-name { font-size: 13.5px; font-weight: 600; }
  .ct-item .ct-sources { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ct-item .ct-projection {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
    padding: 2px 8px; border-radius: 999px; background: var(--neutral-bg); color: var(--neutral-ink);
  }
  .ct-icon { position: relative; }
  .ct-icon .ct-tooltip {
    display: none; position: fixed; z-index: 9999;
    width: 280px; padding: 12px 14px; border-radius: 10px;
    background: var(--ink); color: #e2e8f0; border: none;
    font-size: 12.5px; line-height: 1.55; font-weight: 400;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    pointer-events: none;
  }
  .ct-icon .ct-tooltip.visible { display: block; }

  /* ── Selected sections ── */
  .selected-sections { display: flex; flex-direction: column; gap: 6px; }
  .sel-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px; background: var(--bg);
    border: 1px solid var(--line); font-size: 13px;
  }
  .sel-item .sel-handle { cursor: grab; color: var(--muted); font-size: 16px; touch-action: none; }
  .sel-item.dragging { opacity: 0.4; }
  .sel-item.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .sel-item .sel-name { flex: 1; font-weight: 600; }
  .sel-item .sel-type { font-size: 11px; color: var(--muted); }
  .sel-item .sel-remove {
    width: 24px; height: 24px; border: none; background: none;
    color: var(--muted); font-size: 16px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  }
  .sel-item .sel-remove:hover { background: var(--negative-bg); color: var(--negative-ink); }
  .sel-title-input {
    flex: 1; border: none; background: none; font: inherit; font-weight: 600;
    font-size: 13px; outline: none; color: var(--ink); min-width: 0;
  }

  /* ── Actions ── */
  .actions { display: flex; gap: 8px; padding-top: 8px; }
  .btn {
    flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--line);
    font-weight: 600; font-size: 13px; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--card); color: var(--ink); }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ── Preview ── */
  .preview-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--card); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .preview-header h2 { font-size: 15px; font-weight: 700; }
  .preview-tabs { display: flex; gap: 4px; }
  .preview-tab {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); font-size: 12.5px; font-weight: 600; color: var(--muted);
  }
  .preview-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .preview-content { padding: 24px; }
  .preview-iframe { width: 100%; border: none; border-radius: var(--radius); background: #fff; min-height: calc(100vh - 80px); }
  .json-preview {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 20px; max-height: calc(100vh - 120px); overflow: auto;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 60vh; color: var(--muted); text-align: center; gap: 12px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 15px; max-width: 320px; }

  /* ── Load modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--card); border-radius: 16px; padding: 24px; width: 480px;
    max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .modal h2 { font-size: 17px; margin-bottom: 16px; }
  .modal .field { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

  /* ── Guide overlay ── */
  .guide-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .guide-overlay.open { opacity: 1; pointer-events: all; }
  .guide-panel {
    width: 90vw; max-width: 780px; max-height: 88vh;
    background: var(--bg); border-radius: 16px; overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.18);
    padding: 36px 40px 48px;
  }
  .guide-close {
    position: sticky; top: 0; float: right;
    width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 1;
  }
  .guide-close:hover { background: var(--negative-bg); color: var(--negative-ink); border-color: var(--negative-ink); }

  /* ── Action bar ── */
  .action-bar { display: flex; gap: 6px; }
  .action-bar .btn { flex: none; }
  .btn-icon {
    width: 36px; height: 36px; padding: 0; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Help ── */
  .help-toggle {
    display: flex; align-items: center; gap: 6px; padding: 8px 0 4px;
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); cursor: pointer; user-select: none;
  }
  .help-toggle svg { transition: transform 0.15s; }
  .help-toggle.open svg { transform: rotate(90deg); }
  .help-content {
    display: none; padding: 14px 16px; border-radius: 10px;
    background: var(--bg); border: 1px solid var(--line);
    font-size: 13px; line-height: 1.6; color: var(--muted);
  }
  .help-content.open { display: block; }
  .help-content h4 { margin: 0 0 6px; font-size: 13px; color: var(--ink); font-weight: 700; }
  .help-content p { margin: 0 0 10px; }
  .help-content p:last-child { margin-bottom: 0; }
  .help-content code {
    font-size: 12px; padding: 1px 5px; border-radius: 4px;
    background: var(--card); border: 1px solid var(--line);
  }
  .help-section { margin-bottom: 14px; }
  .help-section:last-child { margin-bottom: 0; }

  /* ── Library ── */
  .lib-list { display: flex; flex-direction: column; gap: 6px; }
  .lib-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; transition: all 0.15s;
  }
  .lib-item:hover { border-color: var(--accent); }
  .lib-item .lib-icon {
    width: 32px; height: 32px; border-radius: 8px; background: var(--neutral-bg);
    display: flex; align-items: center; justify-content: center; color: var(--muted); flex-shrink: 0;
  }
  .lib-item .lib-info { flex: 1; min-width: 0; }
  .lib-item .lib-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lib-item .lib-meta { font-size: 11px; color: var(--muted); }
  .lib-item .lib-sections {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
    background: var(--neutral-bg); color: var(--neutral-ink);
  }

  @media (max-width: 800px) {
    .top-bar h1 { font-size: 14px; }
    .top-bar .tagline { display: none; }
    .app { grid-template-columns: 1fr; height: calc(100vh - 56px); }
    .panel-right { display: none; }
  }
</style>
</head>

    try {

        subtitle: state.subtitle,
        brand: state.brand,
        objective: state.objective,
        successCondition: state.successCondition,
        sections: state.sections,
        locale,
      }));
    } catch {}
  }

  function autoLoad() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return false;
      const s = JSON.parse(saved);
      if (s.title || (s.sections && s.sections.length > 0)) {
        state.title = s.title || '';
        state.subtitle = s.subtitle || '';
        state.brand = s.brand || 'LD';
        state.objective = s.objective || '';
        state.successCondition = s.successCondition || '';
        state.sections = s.sections || [];
        if (s.locale && LOCALES[s.locale]) locale = s.locale;
        return true;
      }
    } catch {}
    return false;
  }

  /* ── Helpers ── */
  function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
  function slugify(s) { return (s || 'section').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>

          ${esc(t('shareTool'))}

        <button class="top-action" id="top-guide" title="${esc(t('guideHint'))}">

      state.objective = '';
      state.successCondition = '';

  /* ── Render left panel ── */
  function renderLeft() {
    const ct = REGISTRY.convergenceTypes;
    const types = Object.entries(ct);

    document.getElementById('left-panel').innerHTML = `

      <div class="field">
        <label>${esc(t('docTitle'))}</label>
        <input type="text" id="doc-title" value="${esc(state.title)}" placeholder="My Living Doc" />
      </div>
      <div class="field">
        <label>${esc(t('docSubtitle'))}</label>
        <textarea id="doc-subtitle" placeholder="One-line description...">${esc(state.subtitle)}</textarea>
      </div>
      <div class="field">
        <label>${esc(t('brandMark'))}</label>
        <input type="text" id="doc-brand" value="${esc(state.brand)}" maxlength="4" style="width:80px" />
      </div>

      <div class="field">
        <label>${esc(t('objective'))}</label>
        <textarea id="doc-objective" placeholder="${esc(t('objectivePlaceholder'))}">${esc(state.objective)}</textarea>
      </div>
      <div class="field">
        <label>${esc(t('successCondition'))}</label>
        <input type="text" id="doc-success" value="${esc(state.successCondition)}" placeholder="${esc(t('successConditionPlaceholder'))}" />
      </div>

      <div class="section-title">${esc(t('convergenceTypes'))}</div>
      <div class="ct-list">
        ${types.map(([id, def]) => {
          const selected = state.sections.some(s => s.convergenceType === id);
          const sourceLabels = (def.sources || []).map(s => s.label).join(', ');
          return `
            <div class="ct-item${selected ? ' selected' : ''}" data-ct-id="${esc(id)}">
              <div class="ct-icon" ${def.tooltip ? `data-tooltip="${esc(def.tooltip)}"` : ''}>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">${def.icon || ''}</svg>
                <div class="ct-tooltip"></div>
              </div>
              <div class="ct-info">
                <div class="ct-name">${esc(def.name)}</div>
                <div class="ct-sources">${esc(sourceLabels)}</div>
              </div>
              <span class="ct-projection">${esc(def.projection)}</span>
            </div>`;
        }).join('')}
      </div>

      ${state.sections.length > 0 ? `
      <div class="section-title">${esc(t('docSections'))} (${state.sections.length})</div>
      <div class="selected-sections">
        ${state.sections.map((s, i) => `
          <div class="sel-item" data-idx="${i}" draggable="true">
            <span class="sel-handle">\u2261</span>
            <input class="sel-title-input" data-idx="${i}" value="${esc(s.title)}" />
            <span class="sel-type">${esc(ct[s.convergenceType]?.projection || '')}</span>
            <button class="sel-remove" data-idx="${i}">\u00d7</button>
          </div>`).join('')}
      </div>` : ''}

      ${state.originDoc ? `
      <div class="section-title">Current document</div>
      <div class="lib-list">
        <div class="lib-item" id="origin-doc" style="border-color:var(--accent);background:color-mix(in srgb, var(--accent) 4%, var(--card))">
          <div class="lib-icon" style="background:var(--accent);color:#fff">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
            </svg>
          </div>
          <div class="lib-info">
            <div class="lib-name">${esc(state.originDoc.title)}</div>
            <div class="lib-meta">${esc(state.originDoc.filename)}</div>
          </div>
        </div>
      </div>` : ''}

      ${library.length > 0 ? `
      <div class="section-title">${esc(t('library'))} (${library.length})</div>
      <div class="lib-list">
        ${library.map((item, i) => `
          <div class="lib-item" data-lib-idx="${i}">
            <div class="lib-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
              </svg>
            </div>
            <div class="lib-info">
              <div class="lib-name">${esc(item.title)}</div>
              <div class="lib-meta">${esc(item.filename)}${item.updated ? ` \u00b7 ${esc(item.updated)}` : ''}</div>
            </div>
            ${item.sectionCount > 0 ? `<span class="lib-sections">${item.sectionCount} ${esc(t('sections'))}</span>` : ''}
          </div>`).join('')}
      </div>` : ''}

    `;

    // Events
    document.getElementById('doc-title').addEventListener('input', (e) => { state.title = e.target.value; renderRight(); });
    document.getElementById('doc-subtitle').addEventListener('input', (e) => { state.subtitle = e.target.value; renderRight(); });
    document.getElementById('doc-brand').addEventListener('input', (e) => { state.brand = e.target.value; renderRight(); });
    document.getElementById('doc-objective').addEventListener('input', (e) => { state.objective = e.target.value; renderRight(); });
    document.getElementById('doc-success').addEventListener('input', (e) => { state.successCondition = e.target.value; renderRight(); });

    document.querySelectorAll('.ct-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.ctId;
        const existing = state.sections.findIndex(s => s.convergenceType === id);
        if (existing >= 0) {
          state.sections.splice(existing, 1);
        } else {
          if (state.previewTab === 'help') state.previewTab = 'visual';
          state.sections.push({
            id: `sec-${slugify(ct[id].name)}`,
            title: ct[id].name,
            convergenceType: id,
            data: [],
          });
        }
        renderLeft();
        renderRight();
      });
    });

    document.querySelectorAll('.sel-title-input').forEach(el => {
      el.addEventListener('input', (e) => {
        const idx = parseInt(e.target.dataset.idx);
        state.sections[idx].title = e.target.value;
        state.sections[idx].id = `sec-${slugify(e.target.value)}`;
        renderRight();
      });
    });

    document.querySelectorAll('.sel-remove').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        state.sections.splice(parseInt(el.dataset.idx), 1);
        renderLeft();
        renderRight();
      });
    });

    // Drag-and-drop reorder
    let dragIdx = null;
    document.querySelectorAll('.sel-item[draggable]').forEach(el => {
      el.addEventListener('dragstart', (e) => {
        dragIdx = parseInt(el.dataset.idx);
        el.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        document.querySelectorAll('.sel-item.drag-over').forEach(d => d.classList.remove('drag-over'));
        dragIdx = null;
      });
      el.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        el.classList.add('drag-over');
      });
      el.addEventListener('dragleave', () => {
        el.classList.remove('drag-over');
      });
      el.addEventListener('drop', (e) => {
        e.preventDefault();
        el.classList.remove('drag-over');
        const dropIdx = parseInt(el.dataset.idx);
        if (dragIdx !== null && dragIdx !== dropIdx) {
          const [moved] = state.sections.splice(dragIdx, 1);
          state.sections.splice(dropIdx, 0, moved);
          renderLeft();
          renderRight();
        }
      });
    });

    // Tooltip positioning on icon hover
    document.querySelectorAll('.ct-icon[data-tooltip]').forEach(icon => {
      const tip = icon.querySelector('.ct-tooltip');
      icon.addEventListener('mouseenter', () => {
        tip.textContent = icon.dataset.tooltip;
        tip.classList.add('visible');
        const rect = icon.getBoundingClientRect();
        let left = rect.right + 12;
        let top = rect.top + rect.height / 2 - 60;
        if (left + 292 > window.innerWidth) left = rect.left - 292;
        if (top < 8) top = 8;
        if (top + 150 > window.innerHeight) top = window.innerHeight - 150;
        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
      });
      icon.addEventListener('mouseleave', () => {
        tip.classList.remove('visible');
      });
    });

    document.getElementById('origin-doc')?.addEventListener('click', () => {
      if (state.originDoc) {
        const item = library.find(l => l.filename === state.originDoc.filename);
        if (item) loadFromLibrary(item);
      }
    });

    document.querySelectorAll('.lib-item[data-lib-idx]').forEach(el => {
      el.addEventListener('click', () => {
        loadFromLibrary(library[parseInt(el.dataset.libIdx)]);
      });
    });

  }

  /* ── Visual preview (lightweight inline preview) ── */
  function renderVisualPreview(json) {
    const ct = REGISTRY.convergenceTypes;
    const sections = json.sections || [];

    const statusTones = { built: '#166534', implemented: '#166534', ready: '#166534', wired: '#166534', real: '#166534', 'real-backend': '#166534', 'ground-truth': '#166534', partial: '#92400e', 'hook-service-contract': '#92400e', 'visual-only': '#92400e', 'state-unwired': '#92400e', 'mock-api': '#92400e', drift: '#991b1b', 'not-built': '#64748b', 'not-started': '#64748b', planned: '#64748b', blocked: '#991b1b', gap: '#991b1b', 'screen-local': '#991b1b', 'navigation-unwired': '#991b1b', deprecated: '#991b1b', 'legacy-only': '#991b1b' };

    function statusDot(status) {
      const color = statusTones[status] || '#64748b';
      return `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:${color}11;color:${color};font-size:11px;font-weight:600">${esc(status.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' '))}</span>`;
    }

    const sectionHtml = sections.map(s => {
      const def = ct[s.convergenceType];
      if (!def) return '';
      const icon = def.icon ? `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="color:#64748b;flex-shrink:0">${def.icon}</svg>` : '';
      const sourceChips = (def.sources || []).map(src =>
        `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:11.5px;font-weight:600">${esc(src.label)}</span>`
      ).join(' ');
      const projLabel = def.projection === 'edge-table' ? 'Edge Table' : 'Card Grid';
      const items = s.data || [];
      const hasData = items.length > 0;

      // Stats bar if section has stats
      const statsHtml = (s.stats || []).length > 0
        ? `<div style="display:grid;grid-template-columns:repeat(${Math.min(s.stats.length, 4)},1fr);gap:8px;margin-top:12px">
            ${s.stats.map(st => `<div style="background:#f5f7fa;border-radius:8px;padding:10px 12px">
              <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:#64748b">${esc(st.label)}</div>
              <div style="font-size:24px;font-weight:700;margin-top:2px">${esc(String(st.value))}</div>
            </div>`).join('')}
          </div>`
        : '';

      // Data preview
      let dataHtml = '';
      if (hasData) {
        // Count statuses
        const statusCounts = {};
        for (const item of items) {
          const st = item.status || item.codeStatus || item.depth || 'unknown';
          statusCounts[st] = (statusCounts[st] || 0) + 1;
        }
        const statusBar = Object.entries(statusCounts).map(([st, count]) =>
          `${statusDot(st)} <span style="font-size:11px;color:#64748b">\u00d7${count}</span>`
        ).join(' ');

        const itemList = items.slice(0, 6).map(item =>
          `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9">
            <span style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.name || item.figmaName || item.id || '—')}</span>
            ${item.status ? statusDot(item.status) : ''}
            ${item.codeStatus ? statusDot(item.codeStatus) : ''}
          </div>`
        ).join('');

        dataHtml = `
          <div style="margin-top:14px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;padding:14px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
              <span style="font-size:13px;font-weight:700">${items.length} ${esc(t('items'))}</span>
              <span style="flex:1"></span>
              ${statusBar}
            </div>
            ${itemList}
            ${items.length > 6 ? `<div style="padding:6px 0;color:#64748b;font-size:12px">+ ${items.length - 6} ${esc(t('more'))}</div>` : ''}

      } else {
        // Show the source skeleton — what fields this type expects
        const sources = (def.sources || []).filter(src => src.label);
        const statusFields = (def.statusFields || []);
        const textFields = (def.textFields || []);
        const detailsFields = (def.detailsFields || []);

        const skeletonRows = [
          ...sources.map(src => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">${esc(src.label)}</span>
              <div style="flex:1;height:8px;border-radius:4px;background:linear-gradient(90deg,#e2e8f0 30%,transparent 30%);opacity:0.6"></div>
              <span style="font-size:10px;color:#94a3b8;font-style:italic">${esc(src.entityType || 'text')}</span>
            </div>`),
          ...statusFields.map(sf => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">Status</span>
              <div style="display:flex;gap:4px">
                ${(REGISTRY?.statusSets?.[sf.statusSet]?.values || []).slice(0, 4).map(v => {
                  const t = REGISTRY?.statusSets?.[sf.statusSet]?.tones?.[v] || 'neutral';
                  const colors = { positive: '#166534', warning: '#92400e', negative: '#991b1b', neutral: '#64748b' };
                  return `<span style="font-size:10px;padding:2px 7px;border-radius:999px;background:${colors[t]}11;color:${colors[t]};font-weight:600">${esc(v)}</span>`;
                }).join('')}
              </div>
            </div>`),
          ...textFields.map(tf => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">${esc(tf.label)}</span>
              <div style="flex:1;height:8px;border-radius:4px;background:linear-gradient(90deg,#e2e8f0 60%,transparent 60%);opacity:0.4"></div>
              <span style="font-size:10px;color:#94a3b8;font-style:italic">text</span>
            </div>`),
          ...detailsFields.map(df => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">${esc(df.label)}</span>
              <div style="flex:1;height:8px;border-radius:4px;background:linear-gradient(90deg,#e2e8f0 40%,transparent 40%);opacity:0.3"></div>
              <span style="font-size:10px;color:#94a3b8;font-style:italic">list</span>
            </div>`),
        ].join('');

        dataHtml = `
          <div style="margin-top:14px;border:1px dashed #e2e8f0;border-radius:10px;background:#fafbfc;padding:16px">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:#94a3b8;margin-bottom:10px">${esc(t('itemBlueprint'))}</div>
            ${skeletonRows}
            <div style="margin-top:10px;font-size:11.5px;color:#94a3b8;text-align:center">${esc(t('populatedBy'))}</div>
          </div>`;
      }

      return `
        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            ${icon}
            <span style="font-size:16px;font-weight:700">${esc(s.title)}</span>
            <span style="margin-left:auto;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;padding:3px 10px;border-radius:999px;background:#f1f5f9;color:#475569">${esc(projLabel)}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${sourceChips}
          </div>
          ${statsHtml}
          ${dataHtml}
        </div>`;
    }).join('');

    return `
      <div style="max-width:800px">
        <div style="padding:20px 0 24px">
          <div style="font-size:24px;font-weight:700;letter-spacing:-0.02em">${esc(json.title || 'Untitled Living Doc')}</div>
          ${json.subtitle ? `<div style="color:#64748b;margin-top:6px;font-size:14px">${esc(json.subtitle)}</div>` : ''}
        </div>
        ${json.objective ? `
        <div style="background:#fff;border:1px solid #e2e8f0;border-left:3px solid #2563eb;border-radius:12px;padding:16px 20px;margin-bottom:16px">
          <div style="font-size:13.5px"><strong>${esc(t('objective'))}</strong> ${esc(json.objective)}</div>
          ${json.successCondition ? `<div style="font-size:13px;color:#64748b;margin-top:6px"><strong>${esc(t('successCondition'))}</strong> ${esc(json.successCondition)}</div>` : ''}
        </div>` : ''}
        ${sections.length === 0 ? `<div style="color:#64748b;padding:40px;text-align:center">${esc(t('noSections'))}</div>` : sectionHtml}
      </div>`;
  }

  /* ── Build JSON ── */
  function buildJson() {
    const now = new Date().toISOString();
    const json = {
      title: state.title || 'Untitled Living Doc',
      subtitle: state.subtitle || '',
      brand: state.brand || 'LD',
      updated: now,
      ...(state.objective ? { objective: state.objective } : {}),
      ...(state.successCondition ? { successCondition: state.successCondition } : {}),
      pills: [`Updated ${now.slice(0, 10)}`],
      callouts: [],
      sections: state.sections.map(s => ({
        id: s.id,
        title: s.title,
        convergenceType: s.convergenceType,
        data: s.data || [],
      })),
    };
    return json;
  }

  /* ── Export ── */
  function exportJson() {
    const json = buildJson();
    const filename = `${slugify(state.title || 'living-doc')}.json`;
    const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showExportHint(filename);
  }

  function showExportHint(filename) {
    let hint = document.getElementById('export-hint');
    if (!hint) {
      hint = document.createElement('div');
      hint.id = 'export-hint';
      hint.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:3000;background:var(--ink);color:#e2e8f0;padding:14px 20px;border-radius:12px;font-size:13px;line-height:1.5;max-width:480px;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:flex;gap:12px;align-items:flex-start';
      document.body.appendChild(hint);
    }
    hint.innerHTML = `
      <div style="flex:1">
        <strong>${esc(filename)}</strong> ${esc(t('exportedTo'))}
        <pre style="margin:8px 0 0;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,0.1);font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow-x:auto">mv ~/Downloads/${esc(filename)} docs/</pre>
      </div>
      <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer;padding:0;line-height:1">\u00d7</button>`;
    clearTimeout(hint._timer);
    hint._timer = setTimeout(() => hint.remove(), 12000);
  }

  /* ── Generate HTML ── */
  function generateHtml() {
    const json = buildJson();
    const reg = REGISTRY;
    const compositorSrc = document.documentElement.outerHTML;

    function escH(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function toTitle(v) { return String(v ?? '').split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' '); }
    function bdg(label, tone) { return '<span class="badge badge-' + tone + '">' + escH(label) + '</span>'; }
    function getTone(setName, val) { return reg.statusSets?.[setName]?.tones?.[val] ?? 'neutral'; }
    function getLabel(setName, val) { return reg.statusSets?.[setName]?.labels?.[val] ?? toTitle(val); }

    function renderCard(item, ctDef) {
      const badges = (ctDef.statusFields || []).filter(sf => item[sf.key]).map(sf => bdg(getLabel(sf.statusSet, item[sf.key]), getTone(sf.statusSet, item[sf.key]))).join(' ');
      const sources = (ctDef.sources || []).filter(src => src.entityType && item[src.key]?.length > 0).map(src =>
        '<div class="flow-meta"><strong>' + escH(src.label) + '</strong> ' + item[src.key].map(v => '<code>' + escH(v) + '</code>').join(' ') + '</div>'
      ).join('');
      const texts = (ctDef.textFields || []).filter(tf => item[tf.key]).map(tf => '<p class="code-refs"><strong>' + escH(tf.label) + '</strong> ' + escH(item[tf.key]) + '</p>').join('');
      const notes = item.notes?.length > 0 ? '<ul class="notes">' + item.notes.map(n => '<li>' + escH(n) + '</li>').join('') + '</ul>' : '';
      return '<article class="flow-card"' + (item.id ? ' id="' + escH(item.id) + '"' : '') + '><header class="flow-card-header"><div><h3>' + escH(item.name) + '</h3></div><div class="badge-row">' + badges + '</div></header>' + sources + notes + texts + '</article>';
    }

    function renderEdgeTable(items, ctDef) {
      const headers = (ctDef.columnHeaders || []).map(h => '<th>' + escH(h) + '</th>').join('');
      const rows = items.map(item => {
        const a = ctDef.sourceA, b = ctDef.sourceB;
        return '<tr><td>' + escH(item[a.displayKey] || item[a.key]) + '<br/><code>' + escH(item[a.key]) + '</code></td><td>' + (item[b.key] ? '<code>' + escH(item[b.key]) + '</code>' : 'None yet') + '</td><td>' + (ctDef.edgeStatus ? bdg(toTitle(item[ctDef.edgeStatus.key]), getTone(ctDef.edgeStatus.statusSet, item[ctDef.edgeStatus.key])) : '') + '</td><td>' + (item[ctDef.edgeNotes?.key] || []).map(n => escH(n)).join('<br/>') + '</td></tr>';
      }).join('');
      return '<table class="full-table"><thead><tr>' + headers + '</tr></thead><tbody>' + rows + '</tbody></table>';
    }

    const sections = json.sections || [];
    const sidebarH = sections.map(s => { const ct = reg.convergenceTypes[s.convergenceType]; if (!ct) return ''; return '<a href="#' + escH(s.id) + '" class="nav-icon" data-target="' + escH(s.id) + '" aria-label="' + escH(s.title) + '"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">' + (ct.icon||'') + '</svg><span class="nav-tooltip">' + escH(s.title) + '</span></a>'; }).join('');

    const sectionsH = sections.map(s => {
      const ct = reg.convergenceTypes[s.convergenceType]; if (!ct) return '';
      const icon = ct.icon ? '<svg class="section-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">' + ct.icon + '</svg>' : '';
      const callout = s.callout ? '<section class="callout">' + s.callout.map(p => '<p>' + escH(p) + '</p>').join('') + '</section>' : '';
      const stats = s.stats ? '<div class="summary-grid">' + s.stats.map(st => '<article class="stat-card"><h3>' + escH(st.label) + '</h3><div class="value">' + escH(String(st.value)) + '</div></article>').join('') + '</div>' : '';
      const items = s.data || [];
      let content = '';
      if (ct.projection === 'card-grid') content = '<div class="flows-grid">' + items.map(item => renderCard(item, ct)).join('') + '</div>';
      else if (ct.projection === 'edge-table') content = renderEdgeTable(items, ct);
      return '<section class="section' + (ct.projection === 'edge-table' ? ' table-card' : '') + '" id="' + escH(s.id) + '"><h2>' + icon + ' ' + escH(s.title) + '</h2>' + callout + stats + content + '</section>';
    }).join('');

    const metaJ = JSON.stringify(json, null, 2).replace(/<\/script/gi, '<\\/script');
    const compSafe = compositorSrc.replace(/"/g, '&quot;');

    const fullHtml = '<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>' + escH(json.title) + '</title><style>:root{color-scheme:light;--bg:#f5f7fa;--card:#fff;--ink:#1a2332;--muted:#64748b;--line:#e2e8f0;--positive-bg:#ecfdf5;--positive-ink:#166534;--warning-bg:#fffbeb;--warning-ink:#92400e;--negative-bg:#fef2f2;--negative-ink:#991b1b;--neutral-bg:#f1f5f9;--neutral-ink:#475569;--accent:#2563eb;--sidebar:56px;--max:1120px;--radius:12px;--shadow-sm:0 1px 2px rgba(0,0,0,.04)}*{box-sizing:border-box}html{scroll-behavior:smooth;scroll-padding-top:24px}body{margin:0;padding:0;background:var(--bg);color:var(--ink);font:15px/1.6 ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:.88em;background:var(--neutral-bg);border:1px solid var(--line);border-radius:5px;padding:1px 6px}.sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:2px;z-index:100;overflow-y:auto}.sidebar .brand{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;margin-bottom:12px;flex-shrink:0}.nav-icon{position:relative;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .15s,color .15s;text-decoration:none;flex-shrink:0}.nav-icon:hover{background:var(--neutral-bg);color:var(--ink);text-decoration:none}.nav-icon.active{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent)}.nav-tooltip{position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:var(--ink);color:#fff;font-size:12px;font-weight:600;padding:5px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s}.nav-icon:hover .nav-tooltip{opacity:1}.comp-toggle{margin-top:auto;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0}.comp-toggle:hover{background:var(--neutral-bg);color:var(--ink)}.comp-overlay{position:fixed;inset:0;z-index:200;background:#fff;display:none}.comp-overlay.open{display:block}.comp-overlay iframe{width:100%;height:100%;border:none}.comp-close{position:fixed;top:12px;right:16px;z-index:300;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:20px;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1)}.comp-close.open{display:flex}.comp-close:hover{background:var(--negative-bg);color:var(--negative-ink)}.content{margin-left:var(--sidebar)}.wrap{max-width:var(--max);margin:0 auto;padding:36px 32px 64px}header.page-header{padding:0 0 28px}h1{margin:0 0 8px;font-size:28px;line-height:1.25;letter-spacing:-.025em;font-weight:700}.subtitle{margin:0 0 20px;color:var(--muted);max-width:880px;font-size:15px;line-height:1.6}.pill-row,.badge-row,.meta-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow-sm);color:var(--muted);font-size:12.5px;font-weight:500}.section{margin-top:48px;padding-top:36px;border-top:1px solid var(--line)}.section:first-of-type{border-top:none;padding-top:0}.section h2{margin:0 0 20px;font-size:19px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:10px}.section-icon{color:var(--muted);flex-shrink:0}.callout{margin-top:20px;padding:16px 20px;border-radius:var(--radius);border:1px solid var(--line);background:var(--card);box-shadow:var(--shadow-sm)}.callout p{margin:0 0 8px;line-height:1.55}.callout p:last-child{margin-bottom:0}.summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-top:20px}.stat-card,.flow-card,.table-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm)}.stat-card{padding:20px}.stat-card h3{margin:0;font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}.stat-card .value{margin-top:6px;font-size:32px;font-weight:700;letter-spacing:-.02em;line-height:1.1}.flows-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.flow-card-header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}h3{margin:0;font-size:15px;font-weight:650}.notes{margin:10px 0 0 18px;padding:0;color:var(--muted);font-size:14px;line-height:1.5}.notes li{margin-bottom:4px}.badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap}.badge-positive{background:var(--positive-bg);color:var(--positive-ink)}.badge-warning{background:var(--warning-bg);color:var(--warning-ink)}.badge-negative{background:var(--negative-bg);color:var(--negative-ink)}.badge-neutral{background:var(--neutral-bg);color:var(--neutral-ink)}.full-table{width:100%;border-collapse:collapse;margin-top:14px}.full-table th,.full-table td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:13.5px}.full-table th{color:var(--muted);font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.03em}.full-table thead th{border-bottom:2px solid var(--line);padding-bottom:10px}.flow-meta{margin-top:14px;color:var(--muted);font-size:13.5px;line-height:1.65}.code-refs{margin-top:10px;color:var(--muted);font-size:13.5px;line-height:1.55}.table-card{padding:24px}.footnote{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:12.5px}@media(max-width:720px){.sidebar,.comp-overlay,.comp-close{display:none}.content{margin-left:0}.wrap{padding:20px 16px 48px}.summary-grid{grid-template-columns:1fr}h1{font-size:24px}}</style></head><body>' +
    '<script type="application/json" id="doc-meta">' + metaJ + '<\/script>' +
    '<nav class="sidebar"><div class="brand">' + escH(json.brand || 'LD') + '</div>' + sidebarH + '<div class="comp-toggle" id="comp-toggle" title="Open compositor"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div></nav>' +
    '<div class="comp-overlay" id="comp-overlay"><iframe id="comp-iframe" srcdoc="' + compSafe + '"></iframe></div><button class="comp-close" id="comp-close">&times;</button>' +
    '<div class="content"><div class="wrap"><header class="page-header"><h1>' + escH(json.title) + '</h1>' + (json.subtitle ? '<p class="subtitle">' + escH(json.subtitle) + '</p>' : '') + (json.pills ? '<div class="pill-row">' + json.pills.map(p => '<span class="pill">' + escH(p) + '</span>').join('') + '</div>' : '') + '</header>' +
    (json.objective ? '<section class="callout" style="border-left:3px solid var(--accent)"><p><strong>Objective</strong> ' + escH(json.objective) + '</p>' + (json.successCondition ? '<p style="color:var(--muted)"><strong>Success condition</strong> ' + escH(json.successCondition) + '</p>' : '') + '</section>' : '') +
    sectionsH +
    (json.source ? '<p class="footnote">Source: ' + escH(json.source) + '</p>' : '') +
    '</div></div>' +
    '<script>(()=>{const i=document.querySelectorAll(".nav-icon[data-target]");const s=[...i].map(icon=>({icon,el:document.getElementById(icon.dataset.target)})).filter(s=>s.el);let a=null;const act=icon=>{if(a===icon)return;if(a)a.classList.remove("active");icon.classList.add("active");a=icon};const o=new IntersectionObserver(e=>{for(const en of e)if(en.isIntersecting){const m=s.find(s=>s.el===en.target);if(m)act(m.icon)}},{rootMargin:"-20% 0px -60% 0px"});for(const{el}of s)o.observe(el);if(s.length>0)act(s[0].icon)})();<\/script>' +
    '<script>(()=>{const ov=document.getElementById("comp-overlay");const cl=document.getElementById("comp-close");const tg=document.getElementById("comp-toggle");tg.addEventListener("click",()=>{ov.classList.add("open");cl.classList.add("open")});cl.addEventListener("click",()=>{ov.classList.remove("open");cl.classList.remove("open")})})();<\/script>' +
    '</body></html>';

    const blob = new Blob([fullHtml], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = slugify(state.title || 'living-doc') + '-' + ts + '.html';
    a.click();
    URL.revokeObjectURL(url);
    showExportHint(a.download);
  }

  /* ── Load modal ── */
  function renderLoadModal() {
    if (!state.showLoadModal) {
      document.getElementById('load-modal')?.remove();
      return;
    }
    let overlay = document.getElementById('load-modal');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'load-modal';
      document.body.appendChild(overlay);
    }
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <h2>${esc(t('loadTitle'))}</h2>
        <div class="field">
          <label>${esc(t('pasteJson'))}</label>
          <textarea id="load-json-text" rows="8" placeholder='{"title": "...", "sections": [...]}'></textarea>
        </div>
        <div class="field">
          <label>${esc(t('loadFromFile'))}</label>
          <input type="file" id="load-json-file" accept=".json" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="load-cancel">${esc(t('cancel'))}</button>
          <button class="btn btn-primary" id="load-apply">${esc(t('apply'))}</button>
        </div>
      </div>`;

    document.getElementById('load-cancel').addEventListener('click', () => {
      state.showLoadModal = false; renderLoadModal();
    });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) { state.showLoadModal = false; renderLoadModal(); }
    });
    document.getElementById('load-json-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { document.getElementById('load-json-text').value = reader.result; };
      reader.readAsText(file);
    });
    document.getElementById('load-apply').addEventListener('click', () => {
      try {
        const json = JSON.parse(document.getElementById('load-json-text').value);
        state.title = json.title || '';
        state.subtitle = json.subtitle || '';
        state.brand = json.brand || 'LD';
        state.objective = json.objective || '';
        state.successCondition = json.successCondition || '';
        state.sections = (json.sections || []).map(s => ({
          id: s.id || `sec-${slugify(s.title)}`,
          title: s.title || '',
          convergenceType: s.convergenceType || '',
          data: s.data || [],
        }));
        state.showLoadModal = false;
        renderLoadModal();
        renderLeft();
        renderRight();
      } catch (err) {
        alert(t('invalidJson') + ': ' + err.message);
      }
    });
  }

  /* ── Library discovery ── */
  // Known doc filenames — the compositor scans these on load.
  // When served from a file server, fetch each and check if it's a valid universal doc JSON.
  const KNOWN_DOC_FILES = [
    'figma-mobile-universal.json',
    'figma-mobile-living-doc.json',
  ];

  async function discoverLibrary() {
    library = [];
    // Try fetching a directory listing (works with some dev servers)
    try {
      const res = await fetch('./');
      if (res.ok) {
        const html = await res.text();
        const matches = html.match(/href="([^"]+\.json)"/g) || [];
        const files = matches.map(m => m.replace(/href="|"/g, '')).filter(f => !f.startsWith('.') && f !== 'living-doc-registry.json');
        for (const file of files) {
          await tryLoadLibraryItem(file);
        }
        if (library.length > 0) return;
      }
    } catch {}
    // Fallback: try known filenames
    for (const file of KNOWN_DOC_FILES) {
      await tryLoadLibraryItem(file);
    }
  }

  async function tryLoadLibraryItem(filename) {
    try {
      const res = await fetch(`./${filename}`);
      if (!res.ok) return;
      const json = await res.json();
      // Must have sections array to be a universal doc, or title to be any living doc
      if (json.sections || json.title) {
        library.push({
          filename,
          title: json.title || filename,
          updated: json.updated || null,
          sectionCount: (json.sections || []).length,
          brand: json.brand || null,
          json,
        });
      }
    } catch {}
  }

  function loadFromLibrary(item) {
    const json = item.json;
    state.title = json.title || '';
    state.subtitle = json.subtitle || '';
    state.brand = json.brand || 'LD';
    state.objective = json.objective || '';
    state.successCondition = json.successCondition || '';
    state.originDoc = { filename: item.filename, title: item.title };
    state.sections = (json.sections || []).map(s => ({
      id: s.id || `sec-${slugify(s.title)}`,
      title: s.title || '',
      convergenceType: s.convergenceType || '',
      data: s.data || [],
    }));
    renderLeft();
    renderRight();
  }

  /* ── Guide overlay ── */
  function openGuide() {
    const overlay = document.getElementById('guide-overlay');
    const panel = document.getElementById('guide-panel');
    panel.innerHTML = `<button class="guide-close" id="guide-close">\u00d7</button>` + renderHelp();
    overlay.classList.add('open');
    document.getElementById('guide-close').addEventListener('click', closeGuide);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeGuide(); });
  }
  function closeGuide() {
    document.getElementById('guide-overlay').classList.remove('open');
  }

  /* ── Init ── */
  async function init() {
    await loadRegistry();
    await discoverLibrary();
    // When embedded in a living doc iframe, skip auto-load — parent will call loadDocumentData
    const restored = isEmbedded ? false : autoLoad();
    if (restored && state.sections.length > 0) state.previewTab = 'visual';
    // Detect if we arrived from a living doc via the pencil link
    const ref = document.referrer;
    if (ref && ref.includes('.html') && !ref.includes('compositor')) {
      const refFile = ref.split('/').pop().replace('.html', '.json');
      const fromLib = library.find(l => l.filename === refFile);
      if (fromLib && !restored) {
        loadFromLibrary(fromLib);
        return; // loadFromLibrary calls render
      } else if (fromLib) {
        state.originDoc = { filename: fromLib.filename, title: fromLib.title };
      }
    }
    renderTopBar();
    renderLeft();
    renderRight();
  }

  // Allow parent page to load document data (when embedded as iframe in a living doc)
  window.loadDocumentData = function(json) {
    state.title = json.title || '';
    state.subtitle = json.subtitle || '';
    state.brand = json.brand || 'LD';
    state.objective = json.objective || '';
    state.successCondition = json.successCondition || '';
    state.sections = (json.sections || []).map(s => ({
      id: s.id || `sec-${slugify(s.title)}`,
      title: s.title || '',
      convergenceType: s.convergenceType || '',
      data: s.data || [],
    }));
    state.originDoc = { filename: 'current-document.json', title: json.title || 'Current Document' };
    state.previewTab = 'visual';
    renderTopBar(); renderLeft(); renderRight();
  };

  init();
})();
</script>
