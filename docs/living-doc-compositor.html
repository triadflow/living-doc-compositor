<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Living Doc Compositor</title>
<style>
  :root {
    --bg: #f5f7fa; --card: #ffffff; --ink: #1a2332; --muted: #64748b;
    --line: #e2e8f0; --accent: #2563eb; --accent-light: #dbeafe;
    --positive-bg: #ecfdf5; --positive-ink: #166534;
    --warning-bg: #fffbeb; --warning-ink: #92400e;
    --negative-bg: #fef2f2; --negative-ink: #991b1b;
    --neutral-bg: #f1f5f9; --neutral-ink: #475569;
    --radius: 12px; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    font: 14px/1.6 ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; cursor: pointer; }

  /* ── Layout ── */
  .top-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; background: var(--card);
    border-bottom: 1px solid var(--line); height: 56px; position: relative; z-index: 20;
  }
  .top-bar .logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0;
  }
  .top-bar h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .top-bar .tagline { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .top-bar .spacer { flex: 1; }
  .top-action {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .top-action:hover { border-color: var(--accent); color: var(--accent); }
  .top-action-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .top-action-primary:hover { opacity: 0.9; color: #fff; }
  .top-menu-anchor { position: relative; }
  .top-menu-trigger { min-width: 44px; justify-content: center; }
  .top-menu-panel {
    position: absolute; top: calc(100% + 10px); right: 0; width: 260px; padding: 10px;
    border-radius: 14px; border: 1px solid var(--line); background: var(--card);
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14); display: flex; flex-direction: column; gap: 10px;
  }
  .top-menu-group {
    display: flex; flex-direction: column; gap: 6px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  .top-menu-group:last-child { border-bottom: none; padding-bottom: 0; }
  .top-menu-label {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
  }
  .top-menu-item {
    width: 100%; display: flex; align-items: center; gap: 10px; padding: 9px 11px;
    border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--ink);
    font-size: 12.5px; font-weight: 600; text-align: left;
  }
  .top-menu-item:hover { background: var(--bg); border-color: var(--line); color: var(--accent); }
  .top-menu-item.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .top-menu-item.primary:hover { opacity: 0.92; color: #fff; }
  .top-menu-lang-grid { display: flex; gap: 6px; }
  .top-menu-lang-btn {
    min-width: 38px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: 0.03em;
  }
  .top-menu-lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .top-menu-lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .top-menu-lang-btn.active:hover { color: #fff; }
  .app { display: grid; grid-template-columns: 424px 1fr; height: calc(100vh - 56px); transition: grid-template-columns 0.18s ease; }
  .app.app-left-drawer-closed { grid-template-columns: 92px 1fr; }
  .panel { overflow-y: auto; padding: 24px; }
  .panel-left {
    background: var(--card); border-right: 1px solid var(--line);
    padding: 0; overflow: hidden; min-height: 0;
  }
  .panel-right { background: var(--bg); }
  .panel-header { display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .panel-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .panel-header .logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0;
  }

  /* ── Form fields ── */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  .field input, .field textarea {
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px;
    font: inherit; font-size: 14px; background: var(--bg); color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 56px; }

  /* ── Convergence type picker ── */
  .section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); padding: 8px 0 4px;
  }
  .ct-groups { display: flex; flex-direction: column; gap: 18px; }
  .ct-group { display: flex; flex-direction: column; gap: 10px; }
  .ct-group-header { display: flex; flex-direction: column; gap: 2px; }
  .ct-group-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
  }
  .ct-group-copy { font-size: 12px; color: var(--muted); line-height: 1.45; }
  .ct-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  .ct-item {
    display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
    min-width: 0; padding: 10px 11px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .ct-item:hover { border-color: var(--accent); }
  .ct-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .ct-item-head { width: 100%; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .ct-item .ct-icon {
    width: 30px; height: 30px; border-radius: 9px; background: var(--neutral-bg);
    display: flex; align-items: center; justify-content: center; color: var(--ct-icon-color, var(--muted)); flex-shrink: 0;
  }
  .ct-item.selected .ct-icon { background: var(--accent); color: #fff; }
  .ct-item .ct-name { font-size: 12.5px; font-weight: 700; line-height: 1.35; min-height: 34px; }
  .ct-item .ct-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .ct-item .ct-chip {
    display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px;
    background: var(--neutral-bg); color: var(--neutral-ink); font-size: 10.5px; font-weight: 700;
  }
  .ct-item.selected .ct-chip { background: rgba(255,255,255,0.8); color: var(--accent); }
  .ct-item .ct-projection {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    padding: 3px 8px; border-radius: 999px; background: var(--neutral-bg); color: var(--neutral-ink);
  }
  .ct-icon { position: relative; }
  .ct-icon .ct-tooltip {
    display: none; position: fixed; z-index: 9999;
    width: 280px; padding: 12px 14px; border-radius: 10px;
    background: var(--ink); color: #e2e8f0; border: none;
    font-size: 12.5px; line-height: 1.55; font-weight: 400;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    pointer-events: none;
  }
  .ct-icon .ct-tooltip.visible { display: block; }

  /* ── Left rail + drawer ── */
  .left-shell { display: grid; grid-template-columns: 72px minmax(0, 1fr); height: 100%; min-height: 0; }
  .left-shell.drawer-closed { grid-template-columns: 72px; }
  .left-rail {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 10px; border-right: 1px solid var(--line); background: var(--card);
    min-height: 0; overflow-y: auto;
  }
  .left-rail-spacer { flex: 1; }
  .rail-button {
    position: relative; width: 52px; min-height: 58px; padding: 8px 4px; border-radius: 14px;
    border: 1px solid transparent; background: transparent; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    transition: all 0.15s;
  }
  .rail-button:hover { background: var(--bg); border-color: var(--line); color: var(--accent); }
  .rail-button.active { background: color-mix(in srgb, var(--accent) 8%, var(--card)); border-color: color-mix(in srgb, var(--accent) 22%, var(--line)); color: var(--accent); }
  .rail-button-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.03em; line-height: 1.1;
    color: inherit; text-align: center;
  }
  .rail-badge {
    position: absolute; top: 4px; right: 4px; min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 999px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; line-height: 1;
  }
  .left-drawer { min-width: 0; min-height: 0; display: flex; flex-direction: column; background: var(--card); }
  .left-shell.drawer-closed .left-drawer { display: none; }
  .left-drawer-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    padding: 18px 18px 14px; border-bottom: 1px solid var(--line);
  }
  .left-drawer-copy { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .left-drawer-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .left-drawer-note { font-size: 12px; color: var(--muted); line-height: 1.45; }
  .left-drawer-close {
    flex: none; width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); display: inline-flex; align-items: center; justify-content: center;
  }
  .left-drawer-close:hover { border-color: var(--accent); color: var(--accent); }
  .left-drawer-body { padding: 18px; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
  .left-drawer .template-grid { grid-template-columns: 1fr; }
  .left-drawer .template-groups { gap: 18px; }
  .left-drawer .template-card { padding: 14px; }
  .left-drawer .template-card-footer { align-items: stretch; flex-direction: column; }
  .left-drawer .template-card-action { width: 100%; justify-content: center; }

  /* ── Selected sections ── */
  .selected-sections { display: flex; flex-direction: column; gap: 6px; }
  .sel-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 12px; border-radius: 8px; background: var(--bg);
    border: 1px solid var(--line); font-size: 13px;
    cursor: pointer; transition: border-color 0.15s, background-color 0.15s, box-shadow 0.15s;
  }
  .sel-item:hover { border-color: color-mix(in srgb, var(--accent) 20%, var(--line)); }
  .sel-item.focused {
    border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
    background: color-mix(in srgb, var(--accent) 8%, var(--bg));
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .sel-item .sel-handle { cursor: grab; color: var(--muted); font-size: 16px; touch-action: none; }
  .sel-item.dragging { opacity: 0.4; }
  .sel-item.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .sel-item .sel-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .sel-item .sel-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .sel-item .sel-name { flex: 1; font-weight: 600; }
  .sel-item .sel-type { font-size: 11px; color: var(--muted); }
  .sel-item .sel-remove {
    width: 24px; height: 24px; border: none; background: none;
    color: var(--muted); font-size: 16px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  }
  .sel-item .sel-remove:hover { background: var(--negative-bg); color: var(--negative-ink); }
  .sel-title-input {
    flex: 1; border: none; background: none; font: inherit; font-weight: 600;
    font-size: 13px; outline: none; color: var(--ink); min-width: 0;
  }
  .sel-contract {
    font-size: 11.5px; line-height: 1.45; color: var(--muted);
  }
  .sel-select {
    min-width: 94px; padding: 4px 8px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); font: inherit; font-size: 12px;
  }

  /* ── Actions ── */
  .actions { display: flex; gap: 8px; padding-top: 8px; }
  .btn {
    flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--line);
    font-weight: 600; font-size: 13px; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--card); color: var(--ink); }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ── Preview ── */
  .preview-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--card); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .preview-header-tabs-only {
    justify-content: flex-end;
    padding: 0 24px 0;
    background: transparent;
    border-bottom: none;
    position: static;
  }
  .preview-header h2 { font-size: 15px; font-weight: 700; }
  .preview-tabs { display: flex; gap: 4px; }
  .preview-tab {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); font-size: 12.5px; font-weight: 600; color: var(--muted);
  }
  .preview-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .preview-content { padding: 24px; scroll-behavior: smooth; }
  .preview-iframe { width: 100%; border: none; border-radius: var(--radius); background: #fff; min-height: calc(100vh - 80px); }
  .doc-editor-card {
    margin-bottom: 18px; padding: 20px; border-radius: 14px;
    background: var(--card); border: 1px solid var(--line); box-shadow: var(--shadow-sm);
  }
  .doc-editor-header { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .doc-editor-header h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .doc-editor-header p { color: var(--muted); font-size: 13.5px; line-height: 1.6; }
  .doc-editor-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 14px; }
  .doc-editor-card .field { min-width: 0; }
  .doc-editor-card .field input,
  .doc-editor-card .field textarea { background: var(--bg); }
  .doc-editor-field-wide { grid-column: 1 / -1; }
  .visual-workspace {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    grid-template-areas:
      "structure prompt"
      "sections prompt";
    gap: 18px 20px;
    align-items: start;
  }
  .visual-structure-card { grid-area: structure; }
  .visual-sections { grid-area: sections; min-width: 0; }
  .visual-prompt-panel {
    grid-area: prompt;
    position: sticky;
    top: 88px;
    align-self: start;
  }
  .prompt-card {
    display: flex; flex-direction: column; gap: 14px;
    padding: 18px; border-radius: 14px; background: var(--card);
    border: 1px solid var(--line); box-shadow: var(--shadow-sm);
  }
  .prompt-card-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .prompt-card-title-wrap { display: flex; flex-direction: column; gap: 4px; }
  .prompt-card-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .prompt-card-intro { color: var(--muted); font-size: 13px; line-height: 1.6; }
  .prompt-copy-btn {
    flex: none; padding: 9px 14px; border-radius: 10px; border: 1px solid var(--accent);
    background: var(--accent); color: #fff; font-weight: 700; font-size: 12.5px;
  }
  .prompt-copy-btn:hover { opacity: 0.92; }
  .prompt-controls {
    display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px;
  }
  .prompt-control {
    display: flex; flex-direction: column; gap: 4px;
  }
  .prompt-control label {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted);
  }
  .prompt-control select {
    padding: 8px 10px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); font: inherit; font-size: 13px;
  }
  .prompt-focus-note {
    padding: 10px 12px; border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 6%, var(--card));
    border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--line));
    color: var(--muted); font-size: 12.5px; line-height: 1.55;
  }
  .prompt-output {
    min-height: 420px; width: 100%; resize: vertical;
    padding: 14px 16px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink);
    font: 12.5px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: pre; overflow: auto;
  }
  .visual-section-card {
    scroll-margin-top: 92px;
    transition: border-color 0.15s, box-shadow 0.15s, background-color 0.15s;
  }
  .visual-section-card.focused {
    border-color: color-mix(in srgb, var(--accent) 30%, var(--line)) !important;
    background: color-mix(in srgb, var(--accent) 3%, #fff) !important;
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .doc-preview-pills { margin: 0 0 18px; }
  .json-preview {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12.5px; line-height: 1.5;
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    max-height: calc(100vh - 120px); overflow: auto;
  }
  .json-preview-lines { padding: 20px; min-width: max-content; }
  .json-line {
    display: block; padding: 0 10px; border-radius: 8px; white-space: pre;
    scroll-margin-top: 92px; transition: background-color 0.15s, border-color 0.15s;
  }
  .json-line.focused {
    background: color-mix(in srgb, var(--accent) 9%, transparent);
  }
  .json-line.focused-start {
    border-top: 1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
    border-top-left-radius: 10px; border-top-right-radius: 10px;
  }
  .json-line.focused-end {
    border-bottom: 1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
    border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;
  }
  .template-intro {
    margin-bottom: 18px; padding: 18px 20px; border-radius: 14px;
    border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--line));
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 7%, var(--card)), var(--card));
  }
  .template-intro p { color: var(--muted); margin-top: 6px; }
  .template-groups { display: flex; flex-direction: column; gap: 26px; }
  .template-group { display: flex; flex-direction: column; gap: 14px; }
  .template-group-header h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .template-group-header p { color: var(--muted); margin-top: 4px; font-size: 13.5px; line-height: 1.6; }
  .template-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  .template-card {
    display: flex; flex-direction: column; gap: 14px; min-width: 0;
    padding: 18px; border-radius: 14px; border: 1px solid var(--line);
    background: var(--card); box-shadow: var(--shadow-sm);
  }
  .template-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .template-card-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .template-card-subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; line-height: 1.5; }
  .template-card-meta { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
  .template-card-body { display: flex; flex-direction: column; gap: 10px; }
  .template-card-objective { color: var(--ink); font-size: 13.5px; line-height: 1.6; }
  .template-card-section { display: flex; flex-direction: column; gap: 6px; }
  .template-card-label {
    color: var(--muted); font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .template-card-copy { color: var(--ink); font-size: 13px; line-height: 1.65; }
  .template-pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .template-pill {
    display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 999px;
    background: var(--neutral-bg); color: var(--neutral-ink); font-size: 11.5px; font-weight: 600;
  }
  .template-card-footer { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-top: auto; }
  .template-card-file { color: var(--muted); font-size: 11.5px; overflow-wrap: anywhere; }

      "guideMakeStep5body": "One JSON entry in living-doc-registry.json. Name, icon, sources, status set, projection. No code changes. The compositor and renderer pick it up immediately.",
      "guideMakeOr": "Or use the advisor skill — it helps you discover the type through dialog, checks for overlap, and writes the registry entry.",
      "guideConcept": "The Concept",
      "guideConceptBody": "A living doc is a subgraph view — a navigable projection of entities and their relationships. Higher-order abstractions compress the search space for both humans and LLMs: the type tells you what’s inside, how things relate, and where to look when something’s wrong. Every token spent is on reasoning, not on parsing structure.",
      "guideFundamentals": "Three Fundamentals",
      "entity": "Entity",
      "entityDesc": "Has identity, has its own properties. A Figma page, a ticket, a code file, an API endpoint.",
      "edge": "Edge",
      "edgeDesc": "A typed relationship between entities. Implements, specifies, tests, deploys.",
      "scope": "Scope",
      "scopeDesc": "A named convergence of entities. Has no properties of its own — borrows them from its sources.",
      "guideCtTitle": "Convergence Types",
      "guideCtBody": "Each type is a specific combination of source entities. The combination is the type. Different sources produce a different type. The visual projection (card grid or edge table) follows automatically.",
      "guideConstraints": "Key Constraints",
      "constraint1title": "The view is fixed per entity type.",
      "constraint1body": "If you know the entity, you know how to render it. There is no card-vs-table choice.",
      "constraint2title": "A scope is not flexible.",
      "constraint2body": "It is exactly the set of entities that define it. Different sources produce a different scope type.",
      "constraint3title": "Properties are always borrowed.",
      "constraint3body": "A scope’s status is derived from the entities inside it. The scope stores nothing of its own except a name and a derivation rule.",
      "constraint4title": "Aggregates are derived, not authored.",
      "constraint4body": "Status summaries, gap counts, stat grids compute themselves from the scopes and entities.",
      "guideWorkflow": "Workflow",
      "step1title": "Compose",
      "step1body": "Select convergence types in the left panel. Set title and section names. This defines the structure — no data yet.",
      "step2title": "Export",
      "step2body": "Download the JSON scaffold. This is the empty structure definition you can fill with real source data.",
      "step3title": "Populate",
      "step3body": "Add the actual entities to each section’s data arrays based on the section’s convergence type and source material.",
      "step4title": "Render",
      "step4body": "render-living-doc.mjs doc.json — one universal renderer, any living doc.",
      "guideInference": "Why This Matters for Inference",
      "guideInferenceBody": "Higher-order abstractions compress the search space. When an LLM sees a convergence type, it immediately knows: what entities are inside, how they relate, what status means, and where to look when something’s wrong. Every token is spent on reasoning about the domain, not on understanding the document format. The typed structure eliminates an entire class of ambiguity at inference time.",
      "guideSkills": "How It Stays Alive",
      "guideSkillsBody": "Two skills and a renderer. No domain-specific ingestion layer, no scheduled jobs.",
      "skillBootstrap": "The bootstrap. Connects a session to the living docs for the current repo. Shows what exists, what’s stale, and lets the LLM update sections as a natural part of working. The document is self-describing — the skill just opens the door.",
      "skillAdvisor": "The thinking partner. Helps discover which convergence types fit a domain through dialog. Shows existing types as examples, identifies new patterns, checks for overlap, and writes the registry entry.",
      "skillRenderer": "One command, any document. Reads the JSON, resolves convergence types from the registry, produces the HTML with sidebar, icons, and scroll tracking."

      "guideIntroTitle": "Wat is dit?",
      "guideIntro1": "Je werk leeft op veel plekken. Ontwerpen in Figma. Code in repo’s. Tickets in GitHub. Workflows in CI. Beslissingen in gesprekken. Om de echte status van iets te begrijpen, moet je ze allemaal bezoeken en zelf samenvoegen.",

      "guideIntroTitle": "Apa ini?",
      "guideIntro1": "Pekerjaan Anda tersebar di banyak tempat. Desain di Figma. Kode di repo. Tiket di GitHub. Workflow di CI. Keputusan di percakapan. Untuk memahami keadaan sebenarnya, Anda harus mengunjungi semuanya dan menyatukannya sendiri.",
      "guideIntro2": "Living doc menyatukan potongan-potongan itu dalam satu halaman. Bukan sebagai salinan — sebagai tampilan terstruktur yang tetap terhubung ke sumbernya. Saat kode berubah, doc mencerminkannya. Saat probe gagal, Anda melihatnya. Saat tiket ditutup, status diperbarui.",

      "guideGrowTitle": "Living doc tumbuh",

      "guideIntroTransition": "Di bawah ini cara kerjanya secara teknis.",

    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return false;
      const s = JSON.parse(saved);
      if (s.title || (s.sections && s.sections.length > 0)) {
        state.title = s.title || '';
        state.subtitle = s.subtitle || '';
        state.brand = s.brand || 'LD';
        state.objective = s.objective || '';
        state.successCondition = s.successCondition || '';
        state.docExtras = s.docExtras || {};

  function extractDocExtras(json) {
    return Object.fromEntries(Object.entries(json || {}).filter(([key]) => !DOC_CORE_KEYS.has(key)));

  function readDocMetaValue(source, field) {
    for (const key of [field.key, ...(field.aliases || [])]) {
      const value = source?.[key];
      if (typeof value === 'string' && value.trim()) return value.trim();
    }
    return '';
  }

  function writeDocMetaValue(target, field, value) {
    const keys = [field.key, ...(field.aliases || [])];
    const existingKey = keys.find((key) => Object.prototype.hasOwnProperty.call(target, key));
    const writeKey = existingKey || field.key;
    const trimmed = String(value ?? '').trim();
    for (const key of keys) {
      if (key !== writeKey) delete target[key];
    }
    if (trimmed) target[writeKey] = trimmed;
    else delete target[writeKey];
  }

  function slugifyDocIdSeed(value) {
    return String(value ?? '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function suggestDocId(doc, fallbackOrigin = '') {
    const current = readDocMetaValue(doc, DOC_ID_FIELD);
    if (current) return current;
    const seed = slugifyDocIdSeed(fallbackOrigin.replace(/\.(html|json)$/i, '')) || slugifyDocIdSeed(doc?.title) || 'living-doc';
    return `doc:${seed}`;
  }

  function normalizeFocusedSection() {
    const exists = state.sections.some((section) => section.id === state.focusedSectionId);
    if (!exists) {
      state.focusedSectionId = null;
      state.pendingFocusedSectionScroll = false;
    }
    return state.focusedSectionId;
  }

  function focusSection(sectionId) {
    if (!state.sections.some((section) => section.id === sectionId)) return;
    state.focusedSectionId = sectionId;
    state.pendingFocusedSectionScroll = true;
    renderLeft();
    renderRight();
  }

  function scrollTargetIntoContainer(container, target, offset = 0) {
    if (!container || !target) return;
    const containerRect = container.getBoundingClientRect();
    const targetRect = target.getBoundingClientRect();
    const nextTop = targetRect.top - containerRect.top + container.scrollTop - offset;
    container.scrollTo({ top: Math.max(nextTop, 0), behavior: 'smooth' });
  }

  function syncFocusedSectionInPreview() {
    const focusedSectionId = normalizeFocusedSection();
    if (!focusedSectionId || !state.pendingFocusedSectionScroll) return;
    const candidates = state.previewTab === 'json'
      ? Array.from(document.querySelectorAll('.json-line[data-section-id]'))
      : Array.from(document.querySelectorAll('.visual-section-card[data-section-id]'));
    const target = candidates.find((element) => element.dataset.sectionId === focusedSectionId);
    if (!target) return;
    state.pendingFocusedSectionScroll = false;
    requestAnimationFrame(() => {
      const jsonHost = target.closest('.json-preview');
      if (jsonHost) {
        scrollTargetIntoContainer(jsonHost, target, 16);
        return;
      }
      const rightPanel = document.getElementById('right-panel');
      if (rightPanel) {
        scrollTargetIntoContainer(rightPanel, target, 104);
        return;
      }
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  function describeSourceCoverage(syncHints) {
    if (!syncHints || typeof syncHints !== 'object') return '';
    const pairs = Object.entries(syncHints)
      .map(([key, value]) => [String(key).trim(), String(value ?? '').trim()])
      .filter(([key, value]) => key && value);
    if (pairs.length === 0) return '';
    return pairs.map(([key, value]) => `${key}: ${value}`).join(' · ');
  }

  function formatExactTimestamp(value) {
    const date = new Date(value);

    return date.toISOString().replace('.000Z', 'Z');

        editableOnly: Boolean(state.libraryEditableOnly),
      },
      entryCount: filteredEntries.length,
      totalLibraryCount: library.length,
      entries: filteredEntries.map(({ item }) => sanitizeLibraryIndexEntry(item)),
    };
  }

  function renderLibraryFilters(filteredEntries) {
    if (!library.length) return '';
    const domains = libraryFilterValues('domain');
    const repos = libraryFilterValues('repo');
    const domainOptions = [`<option value="">${esc(t('allDomains'))}</option>`]
      .concat(domains.map((value) => `<option value="${esc(value)}"${state.libraryDomainFilter === value ? ' selected' : ''}>${esc(value)}</option>`))
      .join('');
    const repoOptions = [`<option value="">${esc(t('allRepos'))}</option>`]
      .concat(repos.map((value) => `<option value="${esc(value)}"${state.libraryRepoFilter === value ? ' selected' : ''}>${esc(value)}</option>`))
      .join('');
    return `
      <div class="library-filter-card">
        <label>
          ${esc(t('searchLibrary'))}
          <input id="library-search" value="${esc(state.librarySearchQuery)}" placeholder="${esc(t('searchLibraryPlaceholder'))}" />
        </label>
        <div class="library-filter-grid">
          <label>
            ${esc(t('domainFilter'))}
            <select id="library-domain-filter">${domainOptions}</select>
          </label>
          <label>
            ${esc(t('repoFilter'))}
            <select id="library-repo-filter">${repoOptions}</select>
          </label>
        </div>
        <label class="library-filter-check">
          <input type="checkbox" id="library-editable-only"${state.libraryEditableOnly ? ' checked' : ''} />
          <span>${esc(t('editableOnly'))}</span>
        </label>
        <div class="library-filter-summary">${esc(t('showingLibraryEntries'))}: ${filteredEntries.length}/${library.length}</div>
      </div>`;
  }

  function renderLibraryDrawer() {
    const statusSummary = `<div class="library-status-card">${renderLibraryStatusRows(true)}</div>`;
    const filteredEntries = getFilteredLibraryEntries();
    const filterControls = renderLibraryFilters(filteredEntries);
    const currentDoc = state.originDoc ? `
      <div>
        <div class="section-title">Current document</div>
        <div class="lib-list">
          <div class="lib-item" id="origin-doc" style="border-color:var(--accent);background:color-mix(in srgb, var(--accent) 4%, var(--card))">
            <div class="lib-icon" style="background:var(--accent);color:#fff">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
              </svg>
            </div>
            <div class="lib-info">
              <div class="lib-name">${esc(state.originDoc.title)}</div>
              <div class="lib-meta">${esc(state.originDoc.filename)}</div>

          </div>
        </div>

    const libList = library.length ? `
      <div>
        <div class="section-title">${esc(t('library'))} (${filteredEntries.length}/${library.length})</div>
        <div class="lib-list">
          ${filteredEntries.map(({ item, index }) => `
            <div class="lib-item" data-lib-idx="${index}">
              <div class="lib-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                  <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
                </svg>
              </div>
              <div class="lib-info">
                <div class="lib-name">${esc(item.title)}</div>
                <div class="lib-meta">${esc(libraryMetaLine(item))}${item.updated ? ` \u00b7 ${esc(item.updated)}` : ''}</div>
              </div>
              ${item.sectionCount > 0 ? `<span class="lib-sections">${item.sectionCount} ${esc(t('sections'))}</span>` : ''}
              ${item.source === 'sibling' ? `<span class="lib-sections">${esc(t('librarySourceSibling'))}</span>` : ''}
              ${item.manifestEntry ? `<span class="lib-sections">${esc(t('librarySourceManifest'))}</span>` : ''}
              ${item.json || item.jsonHref ? `<span class="lib-sections">${esc(t('libraryEditableEntries'))}</span>` : ''}
              ${!item.json && !item.jsonHref && (item.href || item.localHtmlUrl) ? `<span class="lib-sections">${esc(t('libraryIndexOnlyEntries'))}</span>` : ''}
            </div>`).join('')}
        </div>
      </div>` : `<div class="empty-state"><p>${esc(t('noneYet'))}</p></div>`;
    const filteredEmpty = library.length && filteredEntries.length === 0
      ? `<div class="empty-state" style="height:auto;padding:20px 0"><p>${esc(t('noLibraryMatches'))}</p></div>`
      : '';
    return `${statusSummary}${filterControls}${currentDoc}${filteredEntries.length ? libList : filteredEmpty || libList}`;
  }

    syncTopMenuDismiss();

      event.stopPropagation();
      state.topMenuOpen = !state.topMenuOpen;
      renderTopBar();

    document.querySelectorAll('.top-menu-lang-btn[data-locale]').forEach(btn => {
      btn.addEventListener('click', () => {
        locale = btn.dataset.locale;

        renderTopBar(); renderLeft(); renderRight();
      });

    document.getElementById('top-new')?.addEventListener('click', () => {
      state.topMenuOpen = false;
      state.title = ''; state.subtitle = ''; state.brand = 'LD';
      state.objective = ''; state.successCondition = '';
      state.docExtras = {};
      state.originDoc = null;
      state.focusedSectionId = null;
      state.pendingFocusedSectionScroll = false;
      state.promptCopyState = null;
      state.leftDrawerMode = 'structure';
      state.leftDrawerOpen = true;
      state.leftDrawerScrollTopByMode = { structure: 0 };
      state.sections = []; state.previewTab = 'visual';
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
      renderTopBar(); renderLeft(); renderRight();

      state.topMenuOpen = false;
      renderTopBar();
      exportJson();
    });
    document.getElementById('top-html')?.addEventListener('click', () => {
      state.topMenuOpen = false;
      renderTopBar();

      state.topMenuOpen = false;
      renderTopBar();
      const saved = { ...state, sections: [...state.sections] };
      state.title = 'Living Doc Compositor';
      state.subtitle = 'Squeeze the intel out of that token';
      state.objective = '';
      state.successCondition = '';
      state.brand = 'LD';
      state.docExtras = {};
      state.sections = [];
      generateHtml();
      Object.assign(state, saved);
      state.sections = saved.sections;

      state.topMenuOpen = false;

      state.topMenuOpen = false;

  /* ── Render left panel ── */
  function renderLeft() {
    rememberLeftDrawerScroll();
    const ct = REGISTRY.convergenceTypes;
    const groups = getConvergenceGroups();
    const railItems = getLeftRailItems(ct);
    const leftPanel = document.getElementById('left-panel');
    const drawerMeta = getLeftDrawerMeta();
    syncShellLayout();

    const renderRailButton = (item) => {
      const active = state.leftDrawerOpen && state.leftDrawerMode === item.key;
      return `
        <button class="rail-button${active ? ' active' : ''}" data-rail-mode="${esc(item.key)}" title="${esc(item.title)}" aria-label="${esc(item.title)}">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">${item.icon}</svg>
          <span class="rail-button-label">${esc(item.label)}</span>
          ${item.badge ? `<span class="rail-badge">${esc(String(item.badge))}</span>` : ''}
        </button>`;
    };
    const topRail = railItems.filter((item) => !item.bottom).map(renderRailButton).join('');
    const bottomRail = railItems.filter((item) => item.bottom).map(renderRailButton).join('');

    let drawerContent = '';
    if (state.leftDrawerMode === 'structure') drawerContent = renderStructureDrawer(groups);
    else if (state.leftDrawerMode === 'sections') drawerContent = renderSectionsDrawer(ct);
    else if (state.leftDrawerMode === 'templates') drawerContent = renderTemplatesView();
    else if (state.leftDrawerMode === 'library') drawerContent = renderLibraryDrawer();
    else drawerContent = renderStructureDrawer(groups);

    leftPanel.innerHTML = `
      <div class="left-shell${state.leftDrawerOpen ? '' : ' drawer-closed'}">
        <nav class="left-rail">
          ${topRail}
          <div class="left-rail-spacer"></div>
          ${bottomRail}
        </nav>
        <div class="left-drawer">
          <div class="left-drawer-header">
            <div class="left-drawer-copy">
              <div class="left-drawer-title">${esc(drawerMeta.title)}</div>
              ${drawerMeta.note ? `<div class="left-drawer-note">${esc(drawerMeta.note)}</div>` : ''}
            </div>
            <button class="left-drawer-close" id="left-drawer-close" title="${esc(t('collapseStructure'))}" aria-label="${esc(t('collapseStructure'))}">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.4 7l-1.4-1.4L8.6 11l5.4 5.4 1.4-1.4-4-4z"/></svg>
            </button>
          </div>
          <div class="left-drawer-body" data-drawer-mode="${esc(state.leftDrawerMode)}">${drawerContent}</div>
        </div>
      </div>
    `;
    restoreLeftDrawerScroll();

    document.querySelectorAll('.rail-button[data-rail-mode]').forEach((button) => {
      button.addEventListener('click', () => {
        openLeftDrawer(button.dataset.railMode);
      });
    });
    document.getElementById('left-drawer-close')?.addEventListener('click', closeLeftDrawer);

    if (state.leftDrawerMode === 'structure') {
      document.querySelectorAll('.ct-item').forEach(el => {
        el.addEventListener('click', () => {
          const id = el.dataset.ctId;
          const existing = state.sections.findIndex(s => s.convergenceType === id);
          if (existing >= 0) {
            const removed = state.sections[existing];
            state.sections.splice(existing, 1);
            if (removed?.id === state.focusedSectionId) {
              state.focusedSectionId = null;
              state.pendingFocusedSectionScroll = false;
            }
          } else {
            const newSection = {
              id: `sec-${slugify(ct[id].name)}`,
              title: ct[id].name,
              convergenceType: id,
              data: [],
            };
            state.sections.push(newSection);
            state.focusedSectionId = newSection.id;
            state.pendingFocusedSectionScroll = true;
          }
          renderLeft();
          renderRight();
        });
      });

      document.querySelectorAll('.ct-icon[data-tooltip]').forEach(icon => {
        const tip = icon.querySelector('.ct-tooltip');
        icon.addEventListener('mouseenter', () => {
          tip.textContent = icon.dataset.tooltip;
          tip.classList.add('visible');
          const rect = icon.getBoundingClientRect();
          let left = rect.right + 12;
          let top = rect.top + rect.height / 2 - 60;
          if (left + 292 > window.innerWidth) left = rect.left - 292;
          if (top < 8) top = 8;
          if (top + 150 > window.innerHeight) top = window.innerHeight - 150;
          tip.style.left = left + 'px';
          tip.style.top = top + 'px';
        });
        icon.addEventListener('mouseleave', () => {
          tip.classList.remove('visible');
        });
      });
    }

    if (state.leftDrawerMode === 'sections') {
      document.querySelectorAll('.sel-item[data-section-id]').forEach(el => {
        el.addEventListener('click', (event) => {
          if (event.target.closest('input, select, button, summary, label, textarea')) return;
          focusSection(el.dataset.sectionId);
        });
      });

      document.querySelectorAll('.sel-title-input').forEach(el => {
        el.addEventListener('input', (e) => {
          const idx = parseInt(e.target.dataset.idx);
          const previousId = state.sections[idx].id;
          state.sections[idx].title = e.target.value;
          state.sections[idx].id = `sec-${slugify(e.target.value)}`;
          if (state.focusedSectionId === previousId) state.focusedSectionId = state.sections[idx].id;
          const container = e.target.closest('.sel-item');
          if (container) container.dataset.sectionId = state.sections[idx].id;
          renderRight();
        });
      });

      document.querySelectorAll('.sel-remove').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(el.dataset.idx);
          const removed = state.sections[idx];
          state.sections.splice(idx, 1);
          if (removed?.id === state.focusedSectionId) {
            state.focusedSectionId = null;
            state.pendingFocusedSectionScroll = false;
          }
          renderLeft();
          renderRight();
        });
      });

      let dragIdx = null;
      document.querySelectorAll('.sel-item[draggable]').forEach(el => {
        el.addEventListener('dragstart', (e) => {
          dragIdx = parseInt(el.dataset.idx);
          el.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => {
          el.classList.remove('dragging');
          document.querySelectorAll('.sel-item.drag-over').forEach(d => d.classList.remove('drag-over'));
          dragIdx = null;
        });
        el.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          el.classList.add('drag-over');
        });
        el.addEventListener('dragleave', () => {
          el.classList.remove('drag-over');
        });
        el.addEventListener('drop', (e) => {
          e.preventDefault();
          el.classList.remove('drag-over');
          const dropIdx = parseInt(el.dataset.idx);
          if (dragIdx !== null && dragIdx !== dropIdx) {
            const [moved] = state.sections.splice(dragIdx, 1);
            state.sections.splice(dropIdx, 0, moved);
            renderLeft();
            renderRight();
          }
        });
      });
    }

    if (state.leftDrawerMode === 'templates') {
      document.querySelectorAll('.template-card-action[data-template-file]').forEach((button) => {
        button.addEventListener('click', () => {
          const template = TEMPLATES.find((entry) => entry.filename === button.dataset.templateFile);
          if (template) applyTemplate(template);
        });
      });
    }

    if (state.leftDrawerMode === 'library') {
      document.getElementById('library-search')?.addEventListener('input', (event) => {
        state.librarySearchQuery = event.target.value;
        renderLeft();
      });
      document.getElementById('library-domain-filter')?.addEventListener('change', (event) => {
        state.libraryDomainFilter = event.target.value;
        renderLeft();
      });
      document.getElementById('library-repo-filter')?.addEventListener('change', (event) => {
        state.libraryRepoFilter = event.target.value;
        renderLeft();
      });
      document.getElementById('library-editable-only')?.addEventListener('change', (event) => {
        state.libraryEditableOnly = event.target.checked;
        renderLeft();
      });
      document.getElementById('origin-doc')?.addEventListener('click', () => {
        if (state.originDoc) {
          const item = library.find(l => l.filename === state.originDoc.filename);
          if (item) loadFromLibrary(item);
        }
      });
      document.querySelectorAll('.lib-item[data-lib-idx]').forEach(el => {
        el.addEventListener('click', async () => {
          await openLibraryItem(library[parseInt(el.dataset.libIdx)]);
        });
      });
    }
  }

  /* ── Render right panel ── */
  function renderRight() {
    autoSave();
    const panel = document.getElementById('right-panel');

    if (state.previewTab !== 'json') state.previewTab = 'visual';
    const json = buildJson();
    const title = t('preview');

    panel.innerHTML = `
      <div class="preview-header">
        <h2>${esc(title)}</h2>
        <div class="preview-tabs">
          <button class="preview-tab${state.previewTab === 'visual' ? ' active' : ''}" data-tab="visual">${esc(t('visual'))}</button>
          <button class="preview-tab${state.previewTab === 'json' ? ' active' : ''}" data-tab="json">${esc(t('json'))}</button>
        </div>
      </div>
      <div class="preview-content">
        ${state.previewTab === 'json'
          ? renderJsonPreview(json)
          : renderVisualPreview(json)}
      </div>`;

    panel.querySelectorAll('.preview-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        state.previewTab = tab.dataset.tab;
        if (state.focusedSectionId) state.pendingFocusedSectionScroll = true;
        renderRight();
      });
    });

    if (state.previewTab === 'visual') {
      const bindDocField = (id, setter, afterInput) => {
        const input = panel.querySelector(`#${id}`);
        if (!input) return;
        input.addEventListener('input', (event) => {
          setter(event.target.value);
          if (typeof afterInput === 'function') afterInput();
          syncPromptOutputInPlace();
          autoSave();
        });
      };

      panel.querySelectorAll('.visual-section-card[data-section-id]').forEach((card) => {
        card.addEventListener('click', () => {
          focusSection(card.dataset.sectionId);
        });
      });
      panel.querySelector('#copy-prompt')?.addEventListener('click', () => {
        copyPromptText();
      });

      bindDocField('doc-title', (value) => { state.title = value; }, () => {
        const docIdInput = panel.querySelector('#doc-meta-docId');
        if (docIdInput && !docIdInput.value.trim()) {
          docIdInput.placeholder = suggestDocId({ ...state.docExtras, title: state.title }, currentOriginLabel());
        }
      });
      bindDocField('doc-subtitle', (value) => { state.subtitle = value; });
      bindDocField('doc-brand', (value) => { state.brand = value; });
      bindDocField('doc-objective', (value) => { state.objective = value; });
      bindDocField('doc-success', (value) => { state.successCondition = value; });

      DOC_META_FIELDS.forEach((field) => {
        bindDocField(`doc-meta-${field.key}`, (value) => {
          state.docExtras = { ...(state.docExtras || {}) };
          writeDocMetaValue(state.docExtras, field, value);
        });
      });
    }

    syncFocusedSectionInPreview();
  }

  function renderTemplatesView() {
    if (!TEMPLATES.length) {

  function renderJsonPreview(json) {
    const formatPrimitive = (value) => {
      if (typeof value === 'string') return JSON.stringify(value);
      if (typeof value === 'number' || typeof value === 'boolean') return String(value);
      if (value === null) return 'null';
      return JSON.stringify(value);
    };

    const buildLines = (key, value, depth, sectionId) => {
      const indent = '  '.repeat(depth);
      const keyPrefix = key === null ? '' : `${JSON.stringify(key)}: `;

      if (value === null || typeof value !== 'object') {
        return [{ text: `${indent}${keyPrefix}${formatPrimitive(value)}`, sectionId }];
      }

      if (Array.isArray(value)) {
        if (!value.length) return [{ text: `${indent}${keyPrefix}[]`, sectionId }];
        const lines = [{ text: `${indent}${keyPrefix}[`, sectionId }];
        value.forEach((entry, index) => {
          const entrySectionId = key === 'sections' && entry && typeof entry === 'object'
            ? entry.id || `section-${index}`
            : sectionId;
          const childLines = buildLines(null, entry, depth + 1, entrySectionId);
          if (index < value.length - 1) childLines[childLines.length - 1].text += ',';
          lines.push(...childLines);
        });
        lines.push({ text: `${indent}]`, sectionId });
        return lines;
      }

      const entries = Object.entries(value);
      if (!entries.length) return [{ text: `${indent}${keyPrefix}{}`, sectionId }];
      const lines = [{ text: `${indent}${keyPrefix}{`, sectionId }];
      entries.forEach(([entryKey, entryValue], index) => {
        const childLines = buildLines(entryKey, entryValue, depth + 1, sectionId);
        if (index < entries.length - 1) childLines[childLines.length - 1].text += ',';
        lines.push(...childLines);
      });
      lines.push({ text: `${indent}}`, sectionId });
      return lines;
    };

    const focusedSectionId = normalizeFocusedSection();
    const lines = buildLines(null, json, 0, null);

    return `
      <div class="json-preview">
        <div class="json-preview-lines">
          ${lines.map((line, index) => {
            const isFocused = focusedSectionId && line.sectionId === focusedSectionId;
            const previousFocused = isFocused && index > 0 && lines[index - 1].sectionId === focusedSectionId;
            const nextFocused = isFocused && index < lines.length - 1 && lines[index + 1].sectionId === focusedSectionId;
            const classes = [
              'json-line',
              isFocused ? 'focused' : '',
              isFocused && !previousFocused ? 'focused-start' : '',
              isFocused && !nextFocused ? 'focused-end' : '',
            ].filter(Boolean).join(' ');
            return `<div class="${classes}"${line.sectionId ? ` data-section-id="${esc(line.sectionId)}"` : ''}>${esc(line.text)}</div>`;
          }).join('')}
        </div>
      </div>`;
  }

  function buildSectionItemBlueprint(section) {
    const ct = REGISTRY?.convergenceTypes?.[section?.convergenceType];
    if (!ct) return null;

    if (ct.projection === 'edge-table') {
      const blueprint = {};
      if (ct.sourceA?.key) blueprint[ct.sourceA.key] = '';
      if (ct.sourceB?.key) blueprint[ct.sourceB.key] = '';
      if (ct.edgeStatus?.key) blueprint[ct.edgeStatus.key] = '';
      if (ct.edgeNotes?.key) blueprint[ct.edgeNotes.key] = [];
      return Object.keys(blueprint).length ? blueprint : null;
    }

    const sourceFields = Array.isArray(ct.sources) ? ct.sources.filter((source) => source?.key) : [];
    const statusFields = Array.isArray(ct.statusFields) ? ct.statusFields.filter((field) => field?.key) : [];
    const textFields = Array.isArray(ct.textFields) ? ct.textFields.filter((field) => field?.key) : [];
    const detailsFields = Array.isArray(ct.detailsFields) ? ct.detailsFields.filter((field) => field?.key) : [];

    if (!sourceFields.length && !statusFields.length && !textFields.length && !detailsFields.length) {
      return null;
    }

    const blueprint = { name: '' };
    sourceFields.forEach((source) => {
      if (!(source.key in blueprint)) blueprint[source.key] = [];
    });
    statusFields.forEach((field) => {
      if (!(field.key in blueprint)) blueprint[field.key] = '';
    });
    textFields.forEach((field) => {
      if (!(field.key in blueprint)) blueprint[field.key] = '';
    });
    detailsFields.forEach((field) => {
      if (!(field.key in blueprint)) blueprint[field.key] = [];
    });
    return blueprint;
  }

  function compactObject(object) {
    return Object.fromEntries(Object.entries(object).filter(([, value]) => {
      if (value === null || value === undefined) return false;
      if (typeof value === 'string') return value.trim().length > 0;
      if (Array.isArray(value)) return value.length > 0;
      if (typeof value === 'object') return Object.keys(value).length > 0;
      return true;
    }));
  }

  function buildPromptContext() {
    const json = buildJson();
    const registryTypeIds = [...new Set(json.sections.map((section) => section.convergenceType).filter(Boolean))];
    const registrySlice = Object.fromEntries(registryTypeIds.map((typeId) => {
      const def = REGISTRY?.convergenceTypes?.[typeId];
      if (!def) return [typeId, null];
      return [typeId, compactObject({
        name: def.name,
        category: def.category,
        description: def.description,
        structuralContract: def.structuralContract,
        notFor: def.notFor,
        promptGuidance: def.promptGuidance,
        projection: def.projection,
        columns: def.columns,
        columnHeaders: def.columnHeaders,
        sources: def.sources,
        statusFields: def.statusFields,
        textFields: def.textFields,
        detailsFields: def.detailsFields,
        sourceA: def.sourceA,
        sourceB: def.sourceB,
        edgeStatus: def.edgeStatus,
        edgeNotes: def.edgeNotes,
        nestable: def.nestable,
      })];
    }).filter(([, def]) => def));

    const documentIdentity = compactObject({
      docId: json.docId,
      title: json.title,
      subtitle: json.subtitle,
      objective: json.objective,
      scope: json.scope,
      owner: json.owner,
      sourceCoverage: json.sourceCoverage,
      version: json.version,
      canonicalOrigin: json.canonicalOrigin,
      derivedFrom: json.derivedFrom,
    });

    const sectionMap = json.sections.map((section) => compactObject({
      id: section.id,
      title: section.title,
      convergenceType: section.convergenceType,
      itemCount: Array.isArray(section.data) ? section.data.length : 0,
      itemBlueprint: section.itemBlueprint,
    }));

    const projectSection = (section) => {
      const projected = {
        id: section.id,
        title: section.title,
        convergenceType: section.convergenceType,
        itemBlueprint: section.itemBlueprint || buildSectionItemBlueprint(section),
        data: section.data || [],
      };
      if (section.callout) projected.callout = section.callout;
      if (section.stats) projected.stats = section.stats;
      if (section.pills) projected.pills = section.pills;
      return projected;
    };

    const payload = {
      ...documentIdentity,
      sections: json.sections.map(projectSection),
    };

    const templateSemantics = buildTemplateSemantics(json);
    const referenceRepo = buildReferenceRepoContext(templateSemantics);
    const convergenceSemantics = buildConvergenceSemantics(sectionMap, registrySlice);

    return {
      documentIdentity,
      sectionMap,
      registrySlice,
      convergenceSemantics,
      payload,
      templateSemantics,
      referenceRepo,
    };
  }

  function buildPromptText() {
    const context = buildPromptContext();
    const jsonBlock = (value) => `\`\`\`json\n${JSON.stringify(value, null, 2)}\n\`\`\``;
    const header = [
      'Create a reusable code-agent skill package from the living document below.',
      'Use the structure and payload exactly as given so the result can inspect, update, and refresh this document shape without rediscovering it first.',
    ];
    const packageRequirements = [
      '- Recommend a concise artifact or skill folder name.',
      '- Output a compact file tree for the package.',
      '- Include one primary instruction file that explains when to use the skill and how to operate it.',
      '- Add supporting files only when they materially help future sessions reuse the workflow.',
    ];
    const semanticLayers = [
      '- Treat `Convergence type definitions used by this document` as the hard schema contract.',
      '- Treat `Convergence steering` as the selected-type operating identity for this specific document shape.',
      '- Treat `Current document payload` as the concrete current-state examples and source cues.',
      '- Treat `Public reference repo for deeper concept context and latest updates` as supporting background material for deeper conceptual grounding and freshness checks.',
      context.templateSemantics
        ? '- Treat `Template semantics` as the higher-level workflow identity, intended use, and growth path for the skill.'
        : '- Because no template semantics block is present, infer the workflow identity from the convergence types and current section map only.',
    ];
    const requirements = [
      '- Preserve section ids, titles, convergence types, and registry-defined field shapes.',
      '- Do not invent source keys, status fields, derivations, or section structures that are not present in the document or registry slice.',
      '- Treat `itemBlueprint` as the structural contract for empty or partially filled sections.',
      '- Make the skill visibly specific to the selected convergence types, especially when the document is new or sparse.',
      '- Use the payload as concrete examples and source cues, not as permission to reshape the schema.',
      '- Cover the document-wide workflow across the provided section map.',
      '- Show how the skill should inspect, update, or refresh the provided section structures from their source surfaces.',
      '- Assume the listed GitHub repo is publicly readable. Use it for deeper model understanding and to check for newer repo-level updates when needed.',
      '- If the repo references disagree with this prompt, keep the prompt payload, section map, and registry slice authoritative for this document instance.',
      context.templateSemantics
        ? '- Use the template semantics block to shape the skill trigger conditions, workflow order, and higher-level identity without changing the schema contract.'
        : '- Without a template harness, keep the skill identity grounded in the convergence-type meanings and the current section map.',
      '- Keep the core instructions compact and split bulky examples, lookup tables, or domain notes into optional supporting files only when they add real value.',
      '- Do not output README files, changelogs, installation guides, or other auxiliary docs.',
      '- If you choose a `SKILL.md` format, keep the frontmatter minimal and the instructions imperative.',
    ];
    const templateSteering = context.templateSemantics ? [
      ...(context.templateSemantics.operatingThesis ? [
        `- Organize the skill around this operating thesis: ${context.templateSemantics.operatingThesis}`,
      ] : []),
      ...(context.templateSemantics.keepDistinct?.length ? [
        `- Keep these concerns distinct in the skill's mental model and workflow: ${context.templateSemantics.keepDistinct.join('; ')}.`,
      ] : []),
      ...(context.templateSemantics.notFor?.length ? [
        `- Do not let the skill drift into these neighboring modes: ${context.templateSemantics.notFor.join('; ')}.`,
      ] : []),
    ] : [];
    const renderConvergenceTypeSteering = (type) => {
      const guidance = type.promptGuidance;
      if (!guidance) {
        return [`- ${type.typeName}: missing required registry promptGuidance. Update scripts/living-doc-registry.json before using this type for prompt generation.`];
      }
      return [
        `- ${type.typeName}: ${guidance.operatingThesis}`,
        ...(guidance.keepDistinct?.length ? [`  Keep distinct: ${guidance.keepDistinct.join('; ')}.`] : []),
        ...(guidance.inspect?.length ? [`  Inspect: ${guidance.inspect.join('; ')}.`] : []),
        ...(guidance.update?.length ? [`  Update: ${guidance.update.join('; ')}.`] : []),
        ...(guidance.avoid?.length ? [`  Avoid: ${guidance.avoid.join('; ')}.`] : []),
        ...(type.structuralContract ? [`  Preserve structure: ${type.structuralContract}`] : []),
        ...(type.sourceSurfaces?.length ? [`  Source surfaces: ${type.sourceSurfaces.join('; ')}.`] : []),
        ...(type.statusFields?.length ? [`  Status fields: ${type.statusFields.join('; ')}.`] : []),
      ];
    };
    const convergenceSteering = context.convergenceSemantics ? [
      `- ${context.convergenceSemantics.compositionThesis}`,
      ...context.convergenceSemantics.selectedTypes.flatMap(renderConvergenceTypeSteering),
    ] : [];
    const responseShape = [
      '- Start with a short rationale for the package.',
      '- Then output the proposed file tree.',
      '- Then output the full contents of each file in fenced code blocks.',
      '- If a supporting file is unnecessary, omit it instead of adding placeholders.',
    ];

    return [
      ...header,
      '',
      'Package requirements:',
      ...packageRequirements,
      '',
      'Document identity:',
      jsonBlock(context.documentIdentity),
      '',
      'Section map:',
      jsonBlock(context.sectionMap),
      '',
      'Convergence type definitions used by this document:',
      jsonBlock(context.registrySlice),
      ...(convergenceSteering.length ? [
        '',
        'Convergence steering:',
        ...convergenceSteering,
      ] : []),
      '',
      'Public reference repo for deeper concept context and latest updates:',
      jsonBlock(context.referenceRepo),
      ...(context.templateSemantics ? [
        '',
        'Template semantics:',
        jsonBlock(context.templateSemantics),
      ] : []),
      ...(templateSteering.length ? [
        '',
        'Template steering:',
        ...templateSteering,
      ] : []),
      '',
      'Current document payload:',
      jsonBlock(context.payload),
      '',
      'Interpret these layers differently:',
      ...semanticLayers,
      '',
      'Requirements:',
      ...requirements,
      '',
      'Response shape:',
      ...responseShape,
    ].join('\n');
  }

  function copyPromptText() {
    const textarea = document.getElementById('prompt-output');
    if (!textarea) return;
    const value = textarea.value;
    const markCopied = () => {
      state.promptCopyState = 'copied';
      renderRight();
      clearTimeout(copyPromptText._timer);
      copyPromptText._timer = setTimeout(() => {
        state.promptCopyState = null;
        renderRight();
      }, 1600);
    };

    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(value).then(markCopied).catch(() => {
        textarea.focus();
        textarea.select();
        document.execCommand('copy');
        markCopied();
      });
      return;
    }

    textarea.focus();
    textarea.select();
    document.execCommand('copy');
    markCopied();
  }

  /* ── Visual preview (lightweight inline preview) ── */
  function renderVisualPreview(json) {
    const ct = REGISTRY.convergenceTypes;

    const statusTones = { built: '#166534', implemented: '#166534', ready: '#166534', wired: '#166534', real: '#166534', 'real-backend': '#166534', 'ground-truth': '#166534', revised: '#166534', final: '#166534', published: '#166534', carrying: '#166534', resolved: '#166534', stable: '#166534', anchored: '#166534', partial: '#92400e', 'hook-service-contract': '#92400e', 'visual-only': '#92400e', 'state-unwired': '#92400e', 'mock-api': '#92400e', drafted: '#92400e', developing: '#92400e', overloaded: '#92400e', risk: '#92400e', fragile: '#92400e', outlined: '#64748b', seeded: '#64748b', watch: '#64748b', drift: '#991b1b', 'not-built': '#64748b', 'not-started': '#64748b', planned: '#64748b', blocked: '#991b1b', gap: '#991b1b', 'screen-local': '#991b1b', 'navigation-unwired': '#991b1b', deprecated: '#991b1b', 'legacy-only': '#991b1b', missing: '#991b1b', contradicted: '#991b1b', broken: '#991b1b' };

      const projLabel = projection === 'edge-table'

        ].join('');

        dataHtml = `
          <div style="margin-top:14px;border:1px dashed #e2e8f0;border-radius:10px;background:#fafbfc;padding:16px">

      return `

          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            ${icon}

            ${sourceChips}

    }).join('');

    const identityFields = DOC_META_FIELDS.map((field) => {
      const dynamicPlaceholder = field.key === 'docId'
        ? suggestDocId({ ...state.docExtras, title: state.title }, currentOriginLabel())

      const value = readDocMetaValue(state.docExtras, field);

  /* ── Build JSON ── */
  function buildJson() {
    const now = new Date().toISOString();
    const docExtras = { ...(state.docExtras || {}) };
    const docIdField = DOC_ID_FIELD;
    if (!readDocMetaValue(docExtras, docIdField)) {
      writeDocMetaValue(docExtras, docIdField, suggestDocId({ ...docExtras, title: state.title }, currentOriginLabel()));
    }
    const canonicalField = DOC_CANONICAL_ORIGIN_FIELD;
    if (!readDocMetaValue(docExtras, canonicalField) && currentOriginLabel()) {
      writeDocMetaValue(docExtras, canonicalField, currentOriginLabel());
    }
    const json = {
      ...docExtras,
      title: state.title || 'Untitled Living Doc',
      subtitle: state.subtitle || '',
      brand: state.brand || 'LD',
      updated: now,
      ...(state.objective ? { objective: state.objective } : {}),
      ...(state.successCondition ? { successCondition: state.successCondition } : {}),
      ...(!state.docExtras.pills ? { pills: [`Updated ${now.slice(0, 10)}`] } : {}),
      sections: state.sections.map(({ id, title, convergenceType, data, itemBlueprint, projection, columns, ...rest }) => {
        const sectionBlueprint = itemBlueprint && typeof itemBlueprint === 'object'
          ? itemBlueprint
          : buildSectionItemBlueprint({ convergenceType });
        return {
          ...rest,
          id,
          title,
          convergenceType,
          ...(sectionBlueprint ? { itemBlueprint: sectionBlueprint } : {}),
          data: data || [],
        };
      }),
    };
    return json;
  }

  /* ── Export ── */
  function exportJson() {
    const json = buildJson();
    const filename = `${slugify(state.title || 'living-doc')}.json`;
    const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showExportHint(filename);
  }

  function showExportHint(filename) {
    let hint = document.getElementById('export-hint');
    if (!hint) {
      hint = document.createElement('div');
      hint.id = 'export-hint';
      hint.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:3000;background:var(--ink);color:#e2e8f0;padding:14px 20px;border-radius:12px;font-size:13px;line-height:1.5;max-width:480px;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:flex;gap:12px;align-items:flex-start';
      document.body.appendChild(hint);
    }
    hint.innerHTML = `
      <div style="flex:1">
        <strong>${esc(filename)}</strong> ${esc(t('exportedTo'))}
        <pre style="margin:8px 0 0;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,0.1);font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow-x:auto">mv ~/Downloads/${esc(filename)} docs/</pre>
      </div>
      <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer;padding:0;line-height:1">\u00d7</button>`;
    clearTimeout(hint._timer);
    hint._timer = setTimeout(() => hint.remove(), 12000);
  }

  /* ── Generate HTML ── */
  function generateHtml() {
    const json = buildJson();
    const reg = REGISTRY;
    const compositorSrc = document.documentElement.outerHTML;

    function escH(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function inlineH(s) { return escH(s).replace(/`([^`]+)`/g, '<code>$1</code>'); }
    function splitLines(value) { return String(value ?? '').split(/\n+/).map(line => line.trim()).filter(Boolean); }
    function renderLineStack(value, className) {
      const lines = splitLines(value);
      if (!lines.length) return '';
      return lines.map(line => '<span class="' + className + '">' + inlineH(line) + '</span>').join('');
    }
    function shouldRenderReferenceChips(lines) {
      return lines.length > 1 && lines.every(line => line.length <= 40 && !/[:`/.]/.test(line));
    }
    function toTitle(v) { return String(v ?? '').split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' '); }
    function bdg(label, tone) { return '<span class="badge badge-' + tone + '">' + escH(label) + '</span>'; }
    function getTone(setName, val) { return reg.statusSets?.[setName]?.tones?.[val] ?? 'neutral'; }
    function getLabel(setName, val) { return reg.statusSets?.[setName]?.labels?.[val] ?? toTitle(val); }
    function normalizeNote(note) {
      if (typeof note === 'string') return { text: note, role: 'description', tone: null, title: '' };
      if (!note || typeof note !== 'object') return null;
      const text = String(note.text ?? note.value ?? '').trim();
      if (!text) return null;
      return { text, role: note.role ?? (note.tone ? 'callout' : 'description'), tone: note.tone ?? null, title: String(note.title ?? '').trim() };
    }
    function normalizeCallout(callout) {
      if (Array.isArray(callout)) return { tone: 'neutral', title: '', items: callout, columnHeaders: [], rows: [] };
      if (!callout || typeof callout !== 'object') return null;
      return { tone: callout.tone ?? 'neutral', title: String(callout.title ?? '').trim(), items: Array.isArray(callout.items) ? callout.items : [], columnHeaders: Array.isArray(callout.columnHeaders) ? callout.columnHeaders : [], rows: Array.isArray(callout.rows) ? callout.rows : [] };
    }
    function renderRawTable(columnHeaders, rows) {
      if (!columnHeaders?.length || !rows?.length) return '';
      return '<div class="callout-table-wrap"><table class="full-table callout-table"><thead><tr>' + columnHeaders.map(h => '<th>' + inlineH(h) + '</th>').join('') + '</tr></thead><tbody>' + rows.map(row => '<tr>' + row.map(cell => '<td>' + inlineH(cell) + '</td>').join('') + '</tr>').join('') + '</tbody></table></div>';
    }
    function renderCallout(callout) {
      const c = normalizeCallout(callout);
      if (!c) return '';
