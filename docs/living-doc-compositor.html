    function statusDot(status) {
      const color = statusTones[status] || '#64748b';
      return `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;background:${color}11;color:${color};font-size:11px;font-weight:600">${esc(status.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' '))}</span>`;
    }

    const sectionHtml = sections.map(s => {
      const def = ct[s.convergenceType];
      if (!def) return '';
      const projection = def.projection;
      const icon = def.icon ? `<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="color:${esc(def.iconColor || '#64748b')};flex-shrink:0">${def.icon}</svg>` : '';
      const sourceChips = (def.sources || []).map(src =>
        `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:11.5px;font-weight:600">${esc(src.label)}</span>`
      ).join(' ');
      const projLabel = projection === 'edge-table'
        ? 'Edge Table'
        : `Card Grid${def.columns ? ` (${def.columns})` : ''}`;
      const items = s.data || [];
      const hasData = items.length > 0;

      // Stats bar if section has stats
      const statsHtml = (s.stats || []).length > 0
        ? `<div style="display:grid;grid-template-columns:repeat(${Math.min(s.stats.length, 4)},1fr);gap:8px;margin-top:12px">
            ${s.stats.map(st => `<div style="background:#f5f7fa;border-radius:8px;padding:10px 12px">
              <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:#64748b">${esc(st.label)}</div>
              <div style="font-size:24px;font-weight:700;margin-top:2px">${esc(String(st.value))}</div>
            </div>`).join('')}
          </div>`
        : '';

      // Data preview
      let dataHtml = '';
      if (hasData) {
        // Count statuses
        const statusCounts = {};
        for (const item of items) {
          const st = item.status || item.codeStatus || item.depth || 'unknown';
          statusCounts[st] = (statusCounts[st] || 0) + 1;
        }
        const statusBar = Object.entries(statusCounts).map(([st, count]) =>
          `${statusDot(st)} <span style="font-size:11px;color:#64748b">\u00d7${count}</span>`
        ).join(' ');

        const itemList = items.slice(0, 6).map(item =>
          `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9">
            <span style="font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.name || item.figmaName || item.id || '—')}</span>
            ${item.status ? statusDot(item.status) : ''}
            ${item.codeStatus ? statusDot(item.codeStatus) : ''}
          </div>`
        ).join('');

        dataHtml = `
          <div style="margin-top:14px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;padding:14px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
              <span style="font-size:13px;font-weight:700">${items.length} ${esc(t('items'))}</span>
              <span style="flex:1"></span>
              ${statusBar}
            </div>
            ${itemList}
            ${items.length > 6 ? `<div style="padding:6px 0;color:#64748b;font-size:12px">+ ${items.length - 6} ${esc(t('more'))}</div>` : ''}
          </div>`;
      } else {
        // Show the source skeleton — what fields this type expects
        const sources = (def.sources || []).filter(src => src.label);
        const statusFields = (def.statusFields || []);
        const textFields = (def.textFields || []);
        const detailsFields = (def.detailsFields || []);

        const skeletonRows = [
          ...sources.map(src => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">${esc(src.label)}</span>
              <div style="flex:1;height:8px;border-radius:4px;background:linear-gradient(90deg,#e2e8f0 30%,transparent 30%);opacity:0.6"></div>
              <span style="font-size:10px;color:#94a3b8;font-style:italic">${esc(src.entityType || 'text')}</span>
            </div>`),
          ...statusFields.map(sf => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">Status</span>
              <div style="display:flex;gap:4px">
                ${(REGISTRY?.statusSets?.[sf.statusSet]?.values || []).slice(0, 4).map(v => {
                  const t = REGISTRY?.statusSets?.[sf.statusSet]?.tones?.[v] || 'neutral';
                  const colors = { positive: '#166534', warning: '#92400e', negative: '#991b1b', neutral: '#64748b' };
                  return `<span style="font-size:10px;padding:2px 7px;border-radius:999px;background:${colors[t]}11;color:${colors[t]};font-weight:600">${esc(v)}</span>`;
                }).join('')}
              </div>
            </div>`),
          ...textFields.map(tf => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">${esc(tf.label)}</span>
              <div style="flex:1;height:8px;border-radius:4px;background:linear-gradient(90deg,#e2e8f0 60%,transparent 60%);opacity:0.4"></div>
              <span style="font-size:10px;color:#94a3b8;font-style:italic">text</span>
            </div>`),
          ...detailsFields.map(df => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9">
              <span style="font-size:12px;font-weight:600;color:#475569;width:110px;flex-shrink:0">${esc(df.label)}</span>
              <div style="flex:1;height:8px;border-radius:4px;background:linear-gradient(90deg,#e2e8f0 40%,transparent 40%);opacity:0.3"></div>
              <span style="font-size:10px;color:#94a3b8;font-style:italic">list</span>
            </div>`),
        ].join('');

        dataHtml = `
          <div style="margin-top:14px;border:1px dashed #e2e8f0;border-radius:10px;background:#fafbfc;padding:16px">
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:#94a3b8;margin-bottom:10px">${esc(t('itemBlueprint'))}</div>
            ${skeletonRows}
            <div style="margin-top:10px;font-size:11.5px;color:#94a3b8;text-align:center">${esc(t('populatedBy'))}</div>
          </div>`;
      }

      return `
        <div class="visual-section-card${state.focusedSectionId === s.id ? ' focused' : ''}" data-section-id="${esc(s.id)}" style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
            ${icon}
            <span style="font-size:16px;font-weight:700">${esc(s.title)}</span>
            <span style="margin-left:auto;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;padding:3px 10px;border-radius:999px;background:#f1f5f9;color:#475569">${esc(projLabel)}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${sourceChips}
          </div>
          ${statsHtml}
          ${dataHtml}
        </div>`;
    }).join('');

    const identityFields = DOC_META_FIELDS.map((field) => {
      const dynamicPlaceholder = field.key === 'docId'
        ? suggestDocId({ ...state.docExtras, title: state.title }, currentOriginLabel())
        : field.key === 'canonicalOrigin' && currentOriginLabel()
          ? currentOriginLabel()
          : t(field.placeholderKey);
      const value = readDocMetaValue(state.docExtras, field);
      return `
        <div class="field${field.multiline ? ' doc-editor-field-wide' : ''}">
          <label>${esc(t(field.labelKey))}</label>
          ${field.multiline
            ? `<textarea id="doc-meta-${esc(field.key)}" placeholder="${esc(dynamicPlaceholder)}">${esc(value)}</textarea>`
            : `<input type="text" id="doc-meta-${esc(field.key)}" value="${esc(value)}" placeholder="${esc(dynamicPlaceholder)}" />`}
        </div>`;
    }).join('');

    const structureEditor = `
      <section class="doc-editor-card visual-structure-card">
        <div class="doc-editor-header">
          <h3>${esc(t('documentStructure'))}</h3>
          <p>${esc(t('documentStructureIntro'))}</p>
        </div>
        <div class="doc-editor-grid">
          <div class="field doc-editor-field-wide">
            <label>${esc(t('docTitle'))}</label>
            <input type="text" id="doc-title" value="${esc(state.title)}" placeholder="My Living Doc" />
          </div>
          <div class="field doc-editor-field-wide">
            <label>${esc(t('docSubtitle'))}</label>
            <textarea id="doc-subtitle" placeholder="One-line description...">${esc(state.subtitle)}</textarea>
          </div>
          <div class="field">
            <label>${esc(t('brandMark'))}</label>
            <input type="text" id="doc-brand" value="${esc(state.brand)}" maxlength="4" />
          </div>
          <div class="field doc-editor-field-wide">
            <label>${esc(t('objective'))}</label>
            <textarea id="doc-objective" placeholder="${esc(t('objectivePlaceholder'))}">${esc(state.objective)}</textarea>
          </div>
          <div class="field doc-editor-field-wide">
            <label>${esc(t('successCondition'))}</label>
            <input type="text" id="doc-success" value="${esc(state.successCondition)}" placeholder="${esc(t('successConditionPlaceholder'))}" />
          </div>
          <div class="section-title doc-editor-field-wide">${esc(t('identityLineage'))}</div>
          ${identityFields}
        </div>
      </section>`;

    const sectionsHtml = sections.length === 0
      ? `<div style="color:#64748b;padding:40px;text-align:center">${esc(t('noSections'))}</div>`
      : sectionHtml;

    return `
      <div class="visual-workspace">
        ${structureEditor}
        ${renderGovernancePanel()}
        ${renderPromptPanel()}
        <div class="visual-sections">
          ${sectionsHtml}
        </div>
      </div>`;
  }

  /* ── Build JSON ── */
  function buildJson() {
    const now = new Date().toISOString();
    const docExtras = { ...(state.docExtras || {}) };
    const docIdField = DOC_ID_FIELD;
    if (!readDocMetaValue(docExtras, docIdField)) {
      writeDocMetaValue(docExtras, docIdField, suggestDocId({ ...docExtras, title: state.title }, currentOriginLabel()));
    }
    const canonicalField = DOC_CANONICAL_ORIGIN_FIELD;
    if (!readDocMetaValue(docExtras, canonicalField) && currentOriginLabel()) {
      writeDocMetaValue(docExtras, canonicalField, currentOriginLabel());
    }
    const json = {
      ...docExtras,
      title: state.title || 'Untitled Living Doc',
      subtitle: state.subtitle || '',
      brand: state.brand || 'LD',
      updated: now,
      ...(state.objective ? { objective: state.objective } : {}),
      ...(state.successCondition ? { successCondition: state.successCondition } : {}),
      ...(!state.docExtras.pills ? { pills: [`Updated ${now.slice(0, 10)}`] } : {}),
      sections: state.sections.map(({ id, title, convergenceType, data, itemBlueprint, projection, columns, ...rest }) => {
        const sectionBlueprint = itemBlueprint && typeof itemBlueprint === 'object'
          ? itemBlueprint
          : buildSectionItemBlueprint({ convergenceType });
        return {
          ...rest,
          id,
          title,
          convergenceType,
          ...(sectionBlueprint ? { itemBlueprint: sectionBlueprint } : {}),
          data: data || [],
        };
      }),
    };
    return json;
  }

  /* ── Export ── */
  function exportJson() {
    const json = buildJson();
    const filename = `${slugify(state.title || 'living-doc')}.json`;
    const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    showExportHint(filename);
  }

  function showExportHint(filename) {
    let hint = document.getElementById('export-hint');
    if (!hint) {
      hint = document.createElement('div');
      hint.id = 'export-hint';
      hint.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:3000;background:var(--ink);color:#e2e8f0;padding:14px 20px;border-radius:12px;font-size:13px;line-height:1.5;max-width:480px;box-shadow:0 8px 24px rgba(0,0,0,0.2);display:flex;gap:12px;align-items:flex-start';
      document.body.appendChild(hint);
    }
    hint.innerHTML = `
      <div style="flex:1">
        <strong>${esc(filename)}</strong> ${esc(t('exportedTo'))}
        <pre style="margin:8px 0 0;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,0.1);font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow-x:auto">mv ~/Downloads/${esc(filename)} docs/</pre>
      </div>
      <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer;padding:0;line-height:1">\u00d7</button>`;
    clearTimeout(hint._timer);
    hint._timer = setTimeout(() => hint.remove(), 12000);
  }

  /* ── Generate HTML ── */
  function generateHtml() {
    const json = buildJson();
    const reg = REGISTRY;
    const compositorSrc = document.documentElement.outerHTML;

    function escH(s) { return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function inlineH(s) { return escH(s).replace(/`([^`]+)`/g, '<code>$1</code>'); }
    function splitLines(value) { return String(value ?? '').split(/\n+/).map(line => line.trim()).filter(Boolean); }
    function renderLineStack(value, className) {
      const lines = splitLines(value);
      if (!lines.length) return '';
      return lines.map(line => '<span class="' + className + '">' + inlineH(line) + '</span>').join('');
    }
    function shouldRenderReferenceChips(lines) {
      return lines.length > 1 && lines.every(line => line.length <= 40 && !/[:`/.]/.test(line));
    }
    function toTitle(v) { return String(v ?? '').split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' '); }
    function bdg(label, tone) { return '<span class="badge badge-' + tone + '">' + escH(label) + '</span>'; }
    function getTone(setName, val) { return reg.statusSets?.[setName]?.tones?.[val] ?? 'neutral'; }
    function getLabel(setName, val) { return reg.statusSets?.[setName]?.labels?.[val] ?? toTitle(val); }
    function normalizeNote(note) {
      if (typeof note === 'string') return { text: note, role: 'description', tone: null, title: '' };
      if (!note || typeof note !== 'object') return null;
      const text = String(note.text ?? note.value ?? '').trim();
      if (!text) return null;
      return { text, role: note.role ?? (note.tone ? 'callout' : 'description'), tone: note.tone ?? null, title: String(note.title ?? '').trim() };
    }
    function normalizeCallout(callout) {
      if (Array.isArray(callout)) return { tone: 'neutral', title: '', items: callout, columnHeaders: [], rows: [] };
      if (!callout || typeof callout !== 'object') return null;
      return { tone: callout.tone ?? 'neutral', title: String(callout.title ?? '').trim(), items: Array.isArray(callout.items) ? callout.items : [], columnHeaders: Array.isArray(callout.columnHeaders) ? callout.columnHeaders : [], rows: Array.isArray(callout.rows) ? callout.rows : [] };
    }
    function renderRawTable(columnHeaders, rows) {
      if (!columnHeaders?.length || !rows?.length) return '';
      return '<div class="callout-table-wrap"><table class="full-table callout-table"><thead><tr>' + columnHeaders.map(h => '<th>' + inlineH(h) + '</th>').join('') + '</tr></thead><tbody>' + rows.map(row => '<tr>' + row.map(cell => '<td>' + inlineH(cell) + '</td>').join('') + '</tr>').join('') + '</tbody></table></div>';
    }
    function renderCallout(callout) {
      const c = normalizeCallout(callout);
      if (!c) return '';
      return '<section class="callout callout-' + escH(c.tone) + '">' + (c.title ? '<h3 class="callout-title">' + escH(c.title) + '</h3>' : '') + c.items.map(item => '<p>' + renderLineStack(item, 'callout-line') + '</p>').join('') + renderRawTable(c.columnHeaders, c.rows) + '</section>';
    }
    function entityTypeDef(entityType) {
      return reg.entityTypes?.[entityType] || {};
    }
    function interpolateTemplate(template, context) {
      if (!template) return null;
      let missing = false;
      const rendered = String(template).replace(/\{([^}]+)\}/g, (_, key) => {
        const value = context?.[key];
        if (value === undefined || value === null || value === '') {
          missing = true;
          return '';
        }
        return String(value);
      });
      return missing ? null : rendered;
    }
    const lookupMaps = {};
    function buildLookup(entityType, items) {
      if (!lookupMaps[entityType] && Array.isArray(items)) {
        lookupMaps[entityType] = new Map(items.map((item) => [String(item.id), item]));
      }
      return lookupMaps[entityType] || new Map();
    }
    Object.entries(reg.entityTypes || {}).forEach(([entityType, def]) => {
      if (def.collectionKey && Array.isArray(json[def.collectionKey])) buildLookup(entityType, json[def.collectionKey]);
    });
    function buildEntityContext(entityType, value) {
      const def = entityTypeDef(entityType);
      const context = typeof value === 'object' && value ? { ...value } : {};
      const rawValue = typeof value === 'string' || typeof value === 'number' ? String(value) : null;
      if (rawValue && def.collectionKey) {
        const resolved = lookupMaps[entityType]?.get(rawValue);
        if (resolved) Object.assign(context, resolved);
      }
      if (def.valueKey && context[def.valueKey] == null && rawValue != null) context[def.valueKey] = rawValue;
      if (context.id == null && def.valueKey && context[def.valueKey] != null) context.id = context[def.valueKey];
      if ((entityType === 'figma-page' || entityType === 'figma-node')) {
        context.figmaCanonicalUrl = context.figmaCanonicalUrl || json.figma?.canonicalUrl || '';
        if (context.nodeId != null && context.nodeIdParam == null) context.nodeIdParam = encodeURIComponent(String(context.nodeId).replace(':', '-'));
        if (context.id == null && context.nodeId != null) context.id = context.nodeId;
      }
      return context;
    }
    function entityDisplayValue(entityType, value, options = {}) {
      const def = entityTypeDef(entityType);
      const context = buildEntityContext(entityType, value);
      const override = typeof options.displayOverride === 'string' ? options.displayOverride.trim() : '';
      if (override) return override;
      if (def.displayKey && context?.[def.displayKey] != null && context[def.displayKey] !== '') return String(context[def.displayKey]);
      if (def.valueKey && context?.[def.valueKey] != null && context[def.valueKey] !== '') return String(context[def.valueKey]);
      if (typeof value === 'string' || typeof value === 'number') return String(value);
      if (value && typeof value === 'object') return String(value.id ?? value.name ?? value.ref ?? JSON.stringify(value));
      return '';
    }
    function renderEntityRef(entityType, value, options = {}) {
      const def = entityTypeDef(entityType);
      const context = buildEntityContext(entityType, value);
      const display = `${def.displayPrefix || ''}${entityDisplayValue(entityType, value, options)}`;
      const fallback = '<code>' + escH(display || String(value ?? '')) + '</code>';
      switch (def.refRender) {
        case 'issue-link': {
          const href = interpolateTemplate(def.hrefTemplate, context);
          const primary = href ? '<a href="' + escH(href) + '"><code>' + escH(display) + '</code></a>' : fallback;
          const secondaryHref = interpolateTemplate(def.secondaryHref, context);
          const secondary = secondaryHref && def.secondaryLabel ? ' <a href="' + escH(secondaryHref) + '"><code>' + escH(def.secondaryLabel) + '</code></a>' : '';
          return primary + secondary;
        }
        case 'code-link':
        case 'link':
        case 'anchor-link': {
          const href = interpolateTemplate(def.hrefTemplate, context);
          return href ? '<a href="' + escH(href) + '"><code>' + escH(display) + '</code></a>' : fallback;
        }
        case 'code-badge':
        default:
          return fallback;
      }
    }
    function renderRefList(values, src) {
      if (!values || values.length === 0) return '';
      if (src.entityType === 'ticket') {
        return '<div class="ticket-row">' + (src.label ? '<strong>' + escH(src.label) + '</strong>' : '') + '<div class="ticket-badges">' + values.map(value => {
          const issueUrl = value?.issueUrl;
          const issueNumber = String(value?.issueNumber ?? value ?? '').trim();
          const label = issueNumber.startsWith('#') ? issueNumber : ('#' + issueNumber);
          const badge = '<span class="ticket-badge badge badge-neutral">' + escH(label) + '</span>';
          return issueUrl ? '<a href="' + escH(issueUrl) + '" class="ticket-link">' + badge + '</a>' : badge;
        }).join('') + '</div></div>';
      }
      return '<div class="flow-meta"><strong>' + escH(src.label) + '</strong> ' + values.map(v => renderEntityRef(src.entityType, v)).join(' ') + '</div>';
    }
    function renderNotes(notes) {
      const normalized = (notes || []).map(normalizeNote).filter(Boolean);
      if (!normalized.length) return '';
      return '<div class="note-stack">' + normalized.map(note => {
        const prefix = note.title ? '<strong class="note-title">' + escH(note.title) + '</strong>' : '';
        if (note.role === 'reference') {
          const lines = splitLines(note.text);
          if (shouldRenderReferenceChips(lines)) return '<div class="note-reference">' + prefix + '<div class="note-chip-row">' + lines.map(line => '<span class="note-chip">' + inlineH(line) + '</span>').join('') + '</div></div>';
          return '<div class="note-reference">' + prefix + '<div class="note-reference-lines">' + lines.map(line => '<span class="note-reference-line">' + inlineH(line) + '</span>').join('') + '</div></div>';
        }
        if (note.role === 'callout' || note.tone) return '<div class="note-callout note-callout-' + escH(note.tone ?? 'neutral') + '">' + prefix + renderLineStack(note.text, 'note-line') + '</div>';
        return '<p class="note-description">' + prefix + renderLineStack(note.text, 'note-line') + '</p>';
      }).join('') + '</div>';
    }
    function renderDetails(items, label) {
      if (!items || items.length === 0) return '';
      return '<details class="details-block"><summary>' + escH(label) + ' (' + items.length + ')</summary>' + renderNotes(items) + '</details>';
    }
    function renderSharedLibraryIndex(sharedLibrary) {
      if (!sharedLibrary) return '';
      const entries = Array.isArray(sharedLibrary.entries) ? sharedLibrary.entries : [];
      const filterParts = Object.entries(sharedLibrary.filters || {})
        .filter(([, value]) => value !== undefined && value !== false && value !== '')
        .map(([key, value]) => '<span class="pill">' + escH(key) + ': ' + escH(String(value)) + '</span>')
        .join('');
      const cards = entries.map((entry) => {
        const href = entry.href || entry.jsonHref || '';
        const title = href
          ? '<a href="' + escH(href) + '">' + escH(entry.title || 'Living doc') + '</a>'
          : escH(entry.title || 'Living doc');
        const meta = [entry.domain, entry.repo, entry.updated, entry.sectionCount ? entry.sectionCount + ' sections' : '']
          .filter(Boolean)
          .map((value) => '<span>' + escH(value) + '</span>')
          .join('');
        return '<article class="shared-library-card"><header><h3>' + title + '</h3><div class="badge-row">' + (entry.loadable ? bdg('Editable metadata', 'positive') : bdg('Index only', 'neutral')) + '</div></header>' + (entry.subtitle ? '<p>' + escH(entry.subtitle) + '</p>' : '') + (entry.summary ? '<p class="shared-library-summary">' + escH(entry.summary) + '</p>' : '') + (meta ? '<div class="meta-row">' + meta + '</div>' : '') + '</article>';

  /* ── Library discovery ── */
  // Known doc filenames — the compositor scans these on load.
  // When served from a file server, fetch each and check if it's a valid universal doc JSON.
  const KNOWN_DOC_FILES = [
    'figma-mobile-universal.json',
    'figma-mobile-living-doc.json',
  ];

  async function discoverLibrary() {
    library = [];
    const seen = new Set();
    state.libraryStatus = createLibraryStatus();
    state.libraryStatus.checkedAt = new Date().toISOString();
    state.libraryStatus.manifest.enabled = Boolean(appSettings.preferManifest && appSettings.libraryManifestUrl);
    state.libraryStatus.manifest.url = appSettings.libraryManifestUrl || '';
    state.libraryStatus.sibling.enabled = Boolean(appSettings.includeSiblingDiscovery);

    if (appSettings.preferManifest && appSettings.libraryManifestUrl) {
      await tryLoadLibraryManifest(appSettings.libraryManifestUrl, seen, state.libraryStatus.manifest);
      if (library.length > 0 && !appSettings.includeSiblingDiscovery) {
        state.libraryStatus.sibling.status = 'disabled';
        state.libraryStatus.totalCount = library.length;
        return;
      }
    } else {
      state.libraryStatus.manifest.status = 'disabled';
    }

    if (!appSettings.includeSiblingDiscovery) {
      state.libraryStatus.sibling.status = 'disabled';
      state.libraryStatus.totalCount = library.length;
      return;
    }

    state.libraryStatus.sibling.status = 'checking';
    const siblingStartCount = library.length;

    // Try fetching a directory listing (works with some dev servers)
    try {
      const res = await fetch('./');
      if (res.ok) {
        const html = await res.text();
        const matches = html.match(/href="([^"]+\.json)"/g) || [];
        const files = matches.map(m => m.replace(/href="|"/g, '')).filter(f => !f.startsWith('.') && f !== 'living-doc-registry.json' && !f.startsWith(TEMPLATE_FILENAME_PREFIX));
        for (const file of files) {
          await tryLoadLibraryItem(file, seen);
        }
        if (library.length > siblingStartCount) {
          state.libraryStatus.sibling.entryCount = library.length - siblingStartCount;
          state.libraryStatus.sibling.status = 'loaded';
          state.libraryStatus.totalCount = library.length;
          return;
        }
      }
    } catch (err) {
      state.libraryStatus.sibling.error = err?.message || String(err);
    }
    // Fallback: try known filenames
    for (const file of KNOWN_DOC_FILES) {
      await tryLoadLibraryItem(file, seen);
    }
    state.libraryStatus.sibling.entryCount = library.length - siblingStartCount;
    state.libraryStatus.sibling.status = state.libraryStatus.sibling.entryCount > 0 ? 'loaded' : 'empty';
    state.libraryStatus.totalCount = library.length;
  }

  function libraryKey(item) {
    return item?.id || item?.jsonHref || item?.filename || item?.href || item?.localHtmlPath || item?.title;
  }

  function addLibraryItem(item, seen) {
    const key = libraryKey(item);
    if (!key || seen.has(key)) return false;
    seen.add(key);
    library.push(item);
    return true;
  }

  async function tryLoadLibraryManifest(manifestUrl, seen, status = null) {
    if (status) {
      status.status = 'checking';
      status.url = manifestUrl;
    }
    try {
      const res = await fetch(manifestUrl, { cache: 'no-store' });
      if (!res.ok) {
        if (status) {
          status.status = res.status === 404 ? 'missing' : 'failed';
          status.error = `${res.status} ${res.statusText}`.trim();
        }
        return;
      }
      const manifest = await res.json();
      const entries = Array.isArray(manifest) ? manifest : manifest.entries;
      if (!Array.isArray(entries)) {
        if (status) status.status = 'invalid';
        return;
      }

      for (const entry of entries) {
        const item = {
          id: entry.id || entry.domain || entry.title,
          filename: entry.jsonHref || entry.href || entry.localHtmlPath || entry.domain || entry.title,
          title: entry.title || entry.domain || entry.id || 'Living doc',
          subtitle: entry.subtitle || '',
          domain: entry.domain || '',
          repo: entry.repo || '',
          updated: entry.updated || entry.createdAt || null,
          sectionCount: Number.isFinite(Number(entry.sectionCount)) ? Number(entry.sectionCount) : 0,
          brand: entry.brand || null,
          href: entry.href || entry.localHtmlUrl || '',
          jsonHref: entry.jsonHref || entry.localJsonUrl || '',
          syncSkill: entry.syncSkill || '',
          summary: entry.summary || '',
          source: 'manifest',
          manifestEntry: true,
        };
        if (item.jsonHref) {
          try {
            const docRes = await fetch(item.jsonHref, { cache: 'no-store' });
            if (docRes.ok) {
              item.json = await docRes.json();
              item.sectionCount = Array.isArray(item.json.sections) ? item.json.sections.length : item.sectionCount;
              item.title = item.json.title || item.title;
              item.updated = item.json.updated || item.updated;
            }
          } catch {}
        }
        if (addLibraryItem(item, seen) && status) {
          status.entryCount += 1;
          if (item.json || item.jsonHref) status.editableCount += 1;
          else status.indexOnlyCount += 1;
        }
      }
      if (status) status.status = status.entryCount > 0 ? 'loaded' : 'empty';
    } catch (err) {
      if (status) {
        status.status = 'failed';
        status.error = err?.message || String(err);
      }
    }
  }

  async function tryLoadLibraryItem(filename, seen) {
    try {
      if (filename.startsWith(TEMPLATE_FILENAME_PREFIX)) return;
      const res = await fetch(`./${filename}`);
      if (!res.ok) return;
      const json = await res.json();
      // Must have sections array to be a universal doc, or title to be any living doc
      if (json.sections || json.title) {
        return addLibraryItem({
          filename,
          title: json.title || filename,
          updated: json.updated || null,
          sectionCount: (json.sections || []).length,
          brand: json.brand || null,
          source: 'sibling',
          json,
        }, seen);
      }
    } catch {}
    return false;
  }

  async function openLibraryItem(item) {
    if (item?.json) {
      loadFromLibrary(item);
      return;
    }

    if (item?.jsonHref) {
      try {
        const res = await fetch(item.jsonHref, { cache: 'no-store' });
        if (res.ok) {
          item.json = await res.json();
          loadFromLibrary(item);
          return;
        }
      } catch {}
    }

    const href = item?.href || item?.localHtmlUrl;
    if (href) {
      window.open(href, '_blank', 'noopener');
    }
  }

  function loadFromLibrary(item) {
    const json = item.json;
    state.title = json.title || '';
    state.subtitle = json.subtitle || '';
    state.brand = json.brand || 'LD';
    state.objective = json.objective || '';
    state.successCondition = json.successCondition || '';
    state.docExtras = extractDocExtras(json);
    state.focusedSectionId = null;
    state.pendingFocusedSectionScroll = false;
    state.promptCopyState = null;
    state.originDoc = { filename: item.filename, title: item.title };
    state.previewTab = 'visual';
    state.boardDimensionId = '';
    state.sections = (json.sections || []).map(s => ({
      ...s,
      id: s.id || `sec-${slugify(s.title)}`,
      title: s.title || '',
      convergenceType: s.convergenceType || '',
      data: s.data || [],
    }));
    renderLeft();
    renderRight();
  }

  function applyTemplate(template) {
    if (!template?.json) return;
    loadFromLibrary({
      filename: template.filename || 'embedded-template.json',
      title: template.title || 'Template',
      json: template.json,
    });
  }

  /* ── Guide overlay ── */
  function openGuide() {
    const overlay = document.getElementById('guide-overlay');
    const panel = document.getElementById('guide-panel');
    panel.innerHTML = renderHelp();
    // inject close button into the content column so it sticks with scrolling text
    const content = panel.querySelector('#guide-content');
    if (content) {
      const closeBtn = document.createElement('button');
      closeBtn.className = 'guide-close';
      closeBtn.id = 'guide-close';
      closeBtn.textContent = '\u00d7';
      content.insertBefore(closeBtn, content.firstChild);
    }
    overlay.classList.add('open');
    document.getElementById('guide-close').addEventListener('click', closeGuide);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeGuide(); });

    // active-chapter highlighting + scroll-margin for in-content anchors
    const tocLinks = Array.from(panel.querySelectorAll('.guide-toc-link[data-guide-toc]'));
    const layers = Array.from(panel.querySelectorAll('.guide-layer'));
    const setActive = (id) => {
      const num = id?.replace('guide-layer-', '');
      tocLinks.forEach((link) => {
        link.classList.toggle('active', link.dataset.guideToc === num);
      });
    };
    if (layers.length) setActive(layers[0].id);
    if (content && layers.length && typeof IntersectionObserver === 'function') {
      const observer = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((e) => e.isIntersecting)
          .sort((a, b) => a.target.offsetTop - b.target.offsetTop);
        if (visible.length > 0) setActive(visible[0].target.id);
      }, { root: content, rootMargin: '-30% 0px -60% 0px', threshold: 0 });
      layers.forEach((layer) => observer.observe(layer));
    }
    tocLinks.forEach((link) => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        const num = link.dataset.guideToc;
        const target = panel.querySelector(`#guide-layer-${num}`);
        if (target && content) content.scrollTo({ top: target.offsetTop - 24, behavior: 'smooth' });
        setActive(`guide-layer-${num}`);
      });
    });

    panel.querySelectorAll('[data-guide-copy]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const key = btn.dataset.guideCopy;
        const source = panel.querySelector(`[data-guide-copy-target="${key}"]`);
        if (!source) return;
        const text = source.textContent.trim();
        const original = btn.dataset.labelCopy || btn.textContent;
        const copied = btn.dataset.labelCopied || 'Copied';
        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            window.prompt('Copy:', text);
          }
          btn.textContent = copied;
          setTimeout(() => { btn.textContent = original; }, 1500);
        } catch (err) {
          window.prompt('Copy:', text);
        }
      });
    });
  }
  function closeGuide() {
    document.getElementById('guide-overlay').classList.remove('open');
  }

  /* ── Init ── */
  async function init() {
    await loadRegistry();
    await discoverLibrary();
    state.leftDrawerOpen = !isEmbedded;
    state.leftDrawerMode = 'structure';
    // Embedded mode: block autoLoad, autoSave, and referrer hydration; wait
    // for the parent's postMessage-driven applyDocumentData so the doc on
    // disk is the only source of truth for fingerprint checks. See #58.
    if (isEmbedded) {
      state.pendingDocLoad = true;
      renderTopBar();
      renderLeft();
      renderRight();
      return;
    }
    const restored = autoLoad();
    if (restored && state.sections.length > 0) state.previewTab = 'visual';
    // Detect if we arrived from a living doc via the pencil link
    const ref = document.referrer;
    if (ref && ref.includes('.html') && !ref.includes('compositor')) {
      const refFile = ref.split('/').pop().replace('.html', '.json');
      const fromLib = library.find(l => l.filename === refFile);
      if (fromLib && !restored) {
        loadFromLibrary(fromLib);
        return; // loadFromLibrary calls render
      } else if (fromLib) {
        state.originDoc = { filename: fromLib.filename, title: fromLib.title };
      }
    }
    renderTopBar();
    renderLeft();
    renderRight();
  }

  // Allow parent page to load document data (when embedded as iframe in a living doc)
  // Supports both direct function call and postMessage
  function applyDocumentData(json) {
    state.pendingDocLoad = false;
    state.leftDrawerMode = 'structure';
    state.leftDrawerOpen = !isEmbedded;
    state.title = json.title || '';
    state.subtitle = json.subtitle || '';
    state.brand = json.brand || 'LD';
    state.objective = json.objective || '';
    state.successCondition = json.successCondition || '';
    state.docExtras = extractDocExtras(json);
    state.focusedSectionId = null;
    state.pendingFocusedSectionScroll = false;
    state.promptCopyState = null;
    state.sections = (json.sections || []).map(s => ({
      ...s,
      id: s.id || `sec-${slugify(s.title)}`,
      title: s.title || '',
      convergenceType: s.convergenceType || '',
      data: s.data || [],
    }));
    state.originDoc = { filename: 'current-document.json', title: json.title || 'Current Document' };
    state.previewTab = 'visual';
    state.boardDimensionId = '';
    renderTopBar(); renderLeft(); renderRight();
  }
  window.loadDocumentData = applyDocumentData;

  // Listen for postMessage from parent (reliable cross-iframe communication)
  window.addEventListener('message', (event) => {
    if (event.data && event.data.type === 'load-document' && event.data.doc) {
      applyDocumentData(event.data.doc);
    }
  });

  init();
})();
</script>
