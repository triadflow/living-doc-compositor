<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Living Doc Compositor</title>
<style>
  :root {
    --bg: #f5f7fa; --card: #ffffff; --ink: #1a2332; --muted: #64748b;
    --line: #e2e8f0; --accent: #2563eb; --accent-light: #dbeafe;
    --positive-bg: #ecfdf5; --positive-ink: #166534;
    --warning-bg: #fffbeb; --warning-ink: #92400e;
    --negative-bg: #fef2f2; --negative-ink: #991b1b;
    --neutral-bg: #f1f5f9; --neutral-ink: #475569;
    --radius: 12px; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    font: 14px/1.6 ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; cursor: pointer; }

  /* ── Layout ── */
  .top-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; background: var(--card);
    border-bottom: 1px solid var(--line); height: 56px; position: relative; z-index: 20;
  }
  .top-bar .logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0;
  }
  .top-bar h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
  .top-bar .tagline { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .top-bar .spacer { flex: 1; }
  .top-action {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .top-action:hover { border-color: var(--accent); color: var(--accent); }
  .top-action-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .top-action-primary:hover { opacity: 0.9; color: #fff; }
  .top-menu-anchor { position: relative; }
  .top-menu-trigger { min-width: 44px; justify-content: center; }
  .top-menu-panel {
    position: absolute; top: calc(100% + 10px); right: 0; width: 260px; padding: 10px;
    border-radius: 14px; border: 1px solid var(--line); background: var(--card);
    box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14); display: flex; flex-direction: column; gap: 10px;
  }
  .top-menu-group {
    display: flex; flex-direction: column; gap: 6px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  .top-menu-group:last-child { border-bottom: none; padding-bottom: 0; }
  .top-menu-label {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
  }
  .top-menu-item {
    width: 100%; display: flex; align-items: center; gap: 10px; padding: 9px 11px;
    border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--ink);
    font-size: 12.5px; font-weight: 600; text-align: left;
  }
  .top-menu-item:hover { background: var(--bg); border-color: var(--line); color: var(--accent); }
  .top-menu-item.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .top-menu-item.primary:hover { opacity: 0.92; color: #fff; }
  .top-menu-lang-grid { display: flex; gap: 6px; }
  .top-menu-lang-btn {
    min-width: 38px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: 0.03em;
  }
  .top-menu-lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .top-menu-lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .top-menu-lang-btn.active:hover { color: #fff; }
  .app { display: grid; grid-template-columns: 424px 1fr; height: calc(100vh - 56px); transition: grid-template-columns 0.18s ease; }
  .app.app-left-drawer-closed { grid-template-columns: 92px 1fr; }
  .panel { overflow-y: auto; padding: 24px; }
  .panel-left {
    background: var(--card); border-right: 1px solid var(--line);
    padding: 0; overflow: hidden; min-height: 0;
  }
  .panel-right { background: var(--bg); }
  .panel-header { display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .panel-header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .panel-header .logo {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; flex-shrink: 0;
  }

  /* ── Form fields ── */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
  .field input, .field textarea {
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px;
    font: inherit; font-size: 14px; background: var(--bg); color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 56px; }

  /* ── Convergence type picker ── */
  .section-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--muted); padding: 8px 0 4px;
  }
  .ct-groups { display: flex; flex-direction: column; gap: 18px; }
  .ct-group { display: flex; flex-direction: column; gap: 10px; }
  .ct-group-header { display: flex; flex-direction: column; gap: 2px; }
  .ct-group-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--muted);
  }
  .ct-group-copy { font-size: 12px; color: var(--muted); line-height: 1.45; }
  .ct-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  .ct-item {
    display: flex; flex-direction: column; align-items: flex-start; gap: 10px;
    min-width: 0; padding: 10px 11px; border-radius: 12px; border: 1px solid var(--line);
    background: var(--card); cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .ct-item:hover { border-color: var(--accent); }
  .ct-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .ct-item-head { width: 100%; display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .ct-item .ct-icon {
    width: 30px; height: 30px; border-radius: 9px; background: var(--neutral-bg);
    display: flex; align-items: center; justify-content: center; color: var(--ct-icon-color, var(--muted)); flex-shrink: 0;
  }
  .ct-item.selected .ct-icon { background: var(--accent); color: #fff; }
  .ct-item .ct-name { font-size: 12.5px; font-weight: 700; line-height: 1.35; min-height: 34px; }
  .ct-item .ct-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .ct-item .ct-chip {
    display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px;
    background: var(--neutral-bg); color: var(--neutral-ink); font-size: 10.5px; font-weight: 700;
  }
  .ct-item.selected .ct-chip { background: rgba(255,255,255,0.8); color: var(--accent); }
  .ct-item .ct-projection {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
    padding: 3px 8px; border-radius: 999px; background: var(--neutral-bg); color: var(--neutral-ink);
  }
  .ct-icon { position: relative; }
  .ct-icon .ct-tooltip {
    display: none; position: fixed; z-index: 9999;
    width: 280px; padding: 12px 14px; border-radius: 10px;
    background: var(--ink); color: #e2e8f0; border: none;
    font-size: 12.5px; line-height: 1.55; font-weight: 400;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    pointer-events: none;
  }
  .ct-icon .ct-tooltip.visible { display: block; }

  /* ── Left rail + drawer ── */
  .left-shell { display: grid; grid-template-columns: 72px minmax(0, 1fr); height: 100%; min-height: 0; }
  .left-shell.drawer-closed { grid-template-columns: 72px; }
  .left-rail {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 10px; border-right: 1px solid var(--line); background: var(--card);
    min-height: 0; overflow-y: auto;
  }
  .left-rail-spacer { flex: 1; }
  .rail-button {
    position: relative; width: 52px; min-height: 58px; padding: 8px 4px; border-radius: 14px;
    border: 1px solid transparent; background: transparent; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
    transition: all 0.15s;
  }
  .rail-button:hover { background: var(--bg); border-color: var(--line); color: var(--accent); }
  .rail-button.active { background: color-mix(in srgb, var(--accent) 8%, var(--card)); border-color: color-mix(in srgb, var(--accent) 22%, var(--line)); color: var(--accent); }
  .rail-button-label {
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.03em; line-height: 1.1;
    color: inherit; text-align: center;
  }
  .rail-badge {
    position: absolute; top: 4px; right: 4px; min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 999px; background: var(--accent); color: #fff; display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; line-height: 1;
  }
  .left-drawer { min-width: 0; min-height: 0; display: flex; flex-direction: column; background: var(--card); }
  .left-shell.drawer-closed .left-drawer { display: none; }
  .left-drawer-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    padding: 18px 18px 14px; border-bottom: 1px solid var(--line);
  }
  .left-drawer-copy { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .left-drawer-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .left-drawer-note { font-size: 12px; color: var(--muted); line-height: 1.45; }
  .left-drawer-close {
    flex: none; width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); display: inline-flex; align-items: center; justify-content: center;
  }
  .left-drawer-close:hover { border-color: var(--accent); color: var(--accent); }
  .left-drawer-body { padding: 18px; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
  .left-drawer .template-grid { grid-template-columns: 1fr; }
  .left-drawer .template-groups { gap: 18px; }
  .left-drawer .template-card { padding: 14px; }
  .left-drawer .template-card-footer { align-items: stretch; flex-direction: column; }
  .left-drawer .template-card-action { width: 100%; justify-content: center; }

  /* ── Selected sections ── */
  .selected-sections { display: flex; flex-direction: column; gap: 6px; }
  .sel-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 8px 12px; border-radius: 8px; background: var(--bg);
    border: 1px solid var(--line); font-size: 13px;
    cursor: pointer; transition: border-color 0.15s, background-color 0.15s, box-shadow 0.15s;
  }
  .sel-item:hover { border-color: color-mix(in srgb, var(--accent) 20%, var(--line)); }
  .sel-item.focused {
    border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
    background: color-mix(in srgb, var(--accent) 8%, var(--bg));
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 10%, transparent);
  }
  .sel-item .sel-handle { cursor: grab; color: var(--muted); font-size: 16px; touch-action: none; }
  .sel-item.dragging { opacity: 0.4; }
  .sel-item.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .sel-item .sel-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .sel-item .sel-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .sel-item .sel-name { flex: 1; font-weight: 600; }
  .sel-item .sel-type { font-size: 11px; color: var(--muted); }
  .sel-item .sel-remove {
    width: 24px; height: 24px; border: none; background: none;
    color: var(--muted); font-size: 16px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  }
  .sel-item .sel-remove:hover { background: var(--negative-bg); color: var(--negative-ink); }
  .sel-title-input {
    flex: 1; border: none; background: none; font: inherit; font-weight: 600;
    font-size: 13px; outline: none; color: var(--ink); min-width: 0;
  }
  .sel-contract {
    font-size: 11.5px; line-height: 1.45; color: var(--muted);
  }
  .sel-select {
    min-width: 94px; padding: 4px 8px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink); font: inherit; font-size: 12px;
  }

  /* ── Actions ── */
  .actions { display: flex; gap: 8px; padding-top: 8px; }
  .btn {
    flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--line);
    font-weight: 600; font-size: 13px; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--card); color: var(--ink); }
  .btn-secondary:hover { border-color: var(--accent); }

  /* ── Preview ── */
  .preview-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--card); border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .preview-doc-title {
    color: var(--muted); font-weight: 500; font-size: 0.82em;
    margin-left: 10px; letter-spacing: -0.005em;
  }
  .preview-header-heading {
    display: flex; align-items: baseline; gap: 0; min-width: 0;
  }
  .preview-header-heading h2 { margin: 0; }
  .preview-header-tabs-only {
    justify-content: flex-end;
    padding: 0 24px 0;
    background: transparent;
    border-bottom: none;
    position: static;
  }
  .preview-header h2 { font-size: 15px; font-weight: 700; }
  .preview-tabs { display: flex; gap: 4px; }
  .preview-tab {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--card); font-size: 12.5px; font-weight: 600; color: var(--muted);
  }
  .preview-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .flow-placeholder {
    margin: 24px; padding: 32px 36px; border-radius: 14px;
    background: var(--card); border: 1px dashed var(--line);
    max-width: 720px;
  }
  .flow-placeholder-eyebrow {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    background: color-mix(in srgb, var(--accent) 12%, var(--card));
    color: var(--accent); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;
  }
  .flow-placeholder h3 { margin: 0 0 8px; font-size: 18px; letter-spacing: -0.01em; }
  .flow-placeholder p { margin: 0 0 16px; color: var(--muted); line-height: 1.6; font-size: 13.5px; }
  .flow-placeholder-summary {
    padding: 10px 14px; border-radius: 8px;
    background: color-mix(in srgb, var(--accent) 6%, var(--card));
    border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--line));
    font-size: 12.5px; color: var(--ink);
  }
  .flow-placeholder-summary-empty {
    background: color-mix(in srgb, #f59e0b 10%, var(--card));
    border-color: color-mix(in srgb, #f59e0b 30%, var(--line));
    color: #92400e;
  }
  .flow-view { display: flex; flex-direction: column; min-height: 100%; }
  .flow-mode-toggle {
    display: inline-flex; gap: 4px; margin: 12px 16px 0; padding: 4px;
    border: 1px solid var(--line); border-radius: 10px; background: var(--card);
    align-self: flex-start; box-shadow: var(--shadow-sm);
  }
  .flow-mode-btn {
    appearance: none; border: none; border-radius: 7px; padding: 6px 12px;
    background: transparent; color: var(--muted); font: inherit; font-size: 12px;
    font-weight: 700; cursor: pointer;
  }
  .flow-mode-btn:hover { color: var(--ink); }
  .flow-mode-btn.active { background: var(--accent); color: #fff; }

  /* ── Level 2 body canvas ── */
  .l2-body-stats {
    display: flex; gap: 8px; padding: 10px 16px; background: var(--card);
    border-bottom: 1px solid var(--line); flex-wrap: wrap;
  }
  .l2-body-stat {
    display: inline-flex; gap: 6px; padding: 4px 10px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--line); font-size: 12.5px;
  }
  .l2-body-stat strong { color: var(--ink); font-weight: 700; }
  .l2-body-layout {
    display: grid; grid-template-columns: 220px 1fr; flex: 1; min-height: 0;
  }
  .l2-body-palette {
    border-right: 1px solid var(--line); background: var(--card);
    padding: 16px 14px; overflow-y: auto;
  }
  .l2-body-palette-intro {
    font-size: 11.5px; color: var(--muted); margin: 0 0 14px; line-height: 1.45;
  }
  .l2-body-palette-group { margin-bottom: 14px; }
  .l2-body-palette-title {
    display: block; font-size: 10.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em;
    margin: 0 0 6px;
  }
  .l2-body-palette-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; margin-bottom: 4px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--line);
    font-size: 12px; color: var(--ink); cursor: grab; user-select: none;
  }
  .l2-body-palette-chip:hover { border-color: var(--accent); color: var(--accent); }
  .l2-body-palette-chip:active { cursor: grabbing; }
  .l2-body-palette-swatch {
    display: inline-block; width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  }
  .l2-body-canvas-wrap {
    position: relative; flex: 1; overflow: auto; background: var(--bg);
    min-height: 420px; min-width: 0;
  }
  .l2-body-canvas.l2-drag-over::after {
    content: ""; position: absolute; inset: 8px;
    border: 2px dashed var(--accent); border-radius: 14px;
    pointer-events: none; z-index: 3;
  }
  .l2-swap-popover {
    position: absolute; z-index: 30;
    width: 260px; max-height: 320px; overflow-y: auto;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    box-shadow: var(--shadow-md); padding: 8px 6px;
  }
  .l2-swap-popover-group { margin-bottom: 6px; }
  .l2-swap-popover-group-title {
    display: block; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted);
    padding: 4px 10px 2px;
  }
  .l2-swap-popover-item {
    width: 100%; display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; border-radius: 6px;
    background: transparent; border: none; text-align: left;
    font: inherit; font-size: 12.5px; color: var(--ink); cursor: pointer;
  }
  .l2-swap-popover-item:hover { background: color-mix(in srgb, var(--accent) 10%, var(--card)); }
  .l2-swap-popover-item.current {
    background: color-mix(in srgb, var(--accent) 12%, var(--card));
    color: var(--accent); font-weight: 700;
  }
  .l2-swap-popover-item.current::after {
    content: "\2713"; margin-left: auto; color: var(--accent); font-weight: 700;
  }
  .l2-swap-popover-swatch {
    display: inline-block; width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  }
  .l2-gov-strip {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 16px;
    border-bottom: 1px solid var(--line); background: var(--card);
    align-items: center; position: relative; z-index: 4;
  }
  .l2-gov-strip.l2-gov-strip-invariants {
    border-bottom: none; border-top: 1px solid var(--line); background: #fffbeb;
  }
  .l2-gov-strip-label {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    background: var(--neutral-bg); color: var(--neutral-ink); margin-right: 4px;
  }
  .l2-gov-strip-label.l2-gov-strip-label-invariant {
    background: #fef3c7; color: #92400e;
  }
  .l2-gov-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--line);
    font-size: 11.5px; color: var(--ink);
  }
  .l2-gov-chip-orphan {
    background: var(--negative-bg); border-color: #fecaca; color: var(--negative-ink);
  }
  .l2-gov-chip-docwide {
    background: #fde68a; border-color: #fbbf24; color: #92400e; font-weight: 700;
  }
  .l2-gov-chip { cursor: pointer; transition: box-shadow 0.12s, border-color 0.12s; }
  .l2-gov-chip:hover { border-color: var(--accent); }
  .l2-gov-chip-selected {
    border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .l2-gov-chip strong { font-weight: 700; }

  .registry-modal {

      "guideStartRenderCmd": "node scripts/render-living-doc.mjs docs/my-doc.json",
      "guideStartRenderResult": "Produces docs/my-doc.html with snapshot identity, lineage, sidebar navigation, and the complete compositor embedded.",
      "guideStartShare": "Share safely",
      "guideStartShareBody": "A shared HTML file can include only the current document or a filtered library index. Use --share-safe when generating manifests that may leave your machine; filtered indexes include sanitized metadata, not raw local paths.",
      "guideIntroTransition": "Below is how it works under the hood.",
      "guideMakeTitle": "Make Your Own",
      "guideMakeIntro": "None of the existing convergence types fit your domain? You can define a new one. A convergence type is just the answer to one question: what things keep showing up together?",
      "guideMakeStep1title": "Notice the pattern",
      "guideMakeStep1body": "You keep checking the same three or four things together. Terraform modules and AWS resources. Test suites and coverage reports. API contracts and client implementations. That repeated grouping is your convergence.",
      "guideMakeStep2title": "Name the sources",
      "guideMakeStep2body": "Each thing in that grouping is an entity type. List them: \"Terraform module + AWS resource + deployment workflow.\" These are the sources that produce your convergence.",
      "guideMakeStep3title": "Identify the borrowed property",
      "guideMakeStep3body": "What status do you care about when you look at this grouping? Deployed vs drifted? Covered vs uncovered? That status is not stored — it is derived from the sources. Pick the derivation: worst-of, count, any-match.",
      "guideMakeStep4title": "Check against existing types",
      "guideMakeStep4body": "Before creating a new type, compare with what exists. Is yours really a new combination of sources, or an instance of an existing type with different scope boundaries?",
      "guideMakeStep5title": "Add it to the registry",
      "guideMakeStep5body": "One JSON entry in living-doc-registry.json. Define name, icon, projection, sources or edge sources, statusFields or edgeStatus, and promptGuidance. Add textFields or detailsFields when the card needs richer copy. No renderer code changes.",
      "guideMakeOr": "Use the registry overview before adding a type. The advisor skill can still help discover the shape, check overlap, and write the registry entry.",
      "guideConcept": "The Concept",
      "guideConceptBody": "A living doc is a subgraph view — a navigable projection of entities and their relationships. The canonical JSON stores the current projection; the rendered HTML is a portable snapshot with the full tool embedded. The registry tells readers and agents what each section means.",
      "guideFundamentals": "Three Fundamentals",
      "entity": "Entity",
      "entityDesc": "Has identity, has its own properties. A Figma page, a ticket, a code file, an API endpoint.",
      "edge": "Edge",
      "edgeDesc": "A typed relationship between entities. Implements, specifies, tests, deploys.",
      "scope": "Scope",
      "scopeDesc": "A named convergence of entities. Its section shape, status fields, and prompt behavior come from the registry and source data.",
      "guideCtTitle": "Convergence Types",
      "guideCtBody": "Each type is a specific combination of source entities plus a registry contract: projection, sources, status fields, optional text/detail fields, and promptGuidance. The compositor and renderer read that contract instead of hard-coding type behavior.",
      "guideConstraints": "Key Constraints",
      "constraint1title": "The registry owns type meaning.",
      "constraint1body": "Add or change convergence behavior in scripts/living-doc-registry.json, not in renderer shortcuts.",
      "constraint2title": "The JSON stays canonical.",
      "constraint2body": "Rendered HTML is a portable snapshot and may drift; update the source JSON and re-render when facts change.",
      "constraint3title": "Prompt guidance is part of the schema.",
      "constraint3body": "Every type should say how to inspect, update, distinguish, and avoid drift through promptGuidance.",
      "constraint4title": "Sharing is explicit.",
      "constraint4body": "Local catalog paths stay private unless you deliberately export sanitized manifest or filtered index metadata.",
      "guideWorkflow": "Workflow",
      "step1title": "Shape",
      "step1body": "Create or load a document, choose a template if useful, and select convergence types from the Structure rail.",
      "step2title": "Populate",
      "step2body": "Export or edit the canonical JSON and fill each section’s data arrays with real source identifiers, status fields, notes, and references.",
      "step3title": "Steer",
      "step3body": "Use the prompt builder when an agent needs the current section map, payload, template semantics, and registry slice.",
      "step4title": "Render",
      "step4body": "Generate a standalone HTML snapshot from the canonical JSON; the exported page carries identity, lineage, and the full compositor.",
      "guideInference": "Why This Matters for Inference",
      "guideInferenceBody": "Higher-order abstractions compress the search space. When an LLM sees a convergence type, it immediately knows: what entities are inside, how they relate, what status means, and where to look when something’s wrong. Every token is spent on reasoning about the domain, not on understanding the document format. The typed structure eliminates an entire class of ambiguity at inference time.",
      "guideSkills": "How It Stays Alive",
      "guideSkillsBody": "A registry, locale file, renderer, prompt builder, local library manifest, and optional skills keep the document usable. The HTML travels alone; the JSON remains the source to refresh.",
      "skillBootstrap": "The bootstrap. Connects a session to the living docs for the current repo. Shows what exists, what’s stale, and lets the LLM update sections as a natural part of working. The document is self-describing — the skill just opens the door.",
      "skillAdvisor": "The thinking partner. Helps discover which convergence types fit a domain through dialog. Shows existing types as examples, identifies new patterns, checks for overlap, and writes the registry entry.",
      "skillRenderer": "One command, any document. Syncs embedded registry, locales, and templates, then produces the HTML with snapshot identity, sidebar, icons, scroll tracking, and the full compositor.",
      "skillCrystallize": "The refinement pass. Derives objectiveFacets, coverage edges, invariants, and per-section rationale from a doc whose shape has stabilized, then stamps metaFingerprint. Run it when structure is ready to crystallize; re-run on refresh when sections change.",
      "guideLayerIndexLabel": "Layers",
      "guideLayer1Title": "Start Here",
      "guideLayer1Tagline": "Clone the repo, drop a prompt into Claude Code, or read the concept on the landing page first.",
      "guideLayer1LandingTitle": "Read the concept first",
      "guideLayer1LandingBody": "If you arrived here via a shared HTML snapshot, the landing page has the 30-second pitch plus screenshots. A good first stop before cloning anything.",
      "guideLayer1LandingCta": "Open the landing page",
      "guideLayer1CloneTitle": "Clone the repo",
      "guideLayer1CloneBody": "Node 18+ and a browser. No install, no runtime deps beyond the renderer. The compositor you're looking at right now lives at docs/living-doc-compositor.html inside the repo.",
      "guideLayer1ClaudeTitle": "Paste this into Claude Code",
      "guideLayer1ClaudeBody": "After cloning, open the repo in Claude Code and paste the prompt below. It tells the agent to read the README, pick a starter template that fits what you're working on, and scaffold your first living doc.",
      "guideLayer1ClaudePrompt": "I just cloned triadflow/living-doc-compositor and want to author my first living doc. Read the README and scripts/living-doc-registry.json, then: (1) recommend a starter template from docs/ that fits the work I'll describe next, (2) scaffold a new JSON copy with my title and scope, (3) render it with node scripts/render-living-doc.mjs. If the /living-doc skill is relevant, invoke it.",
      "guideLayer1RepoCta": "Open the GitHub repo",
      "guideLayer1Copy": "Copy",
      "guideLayer1Copied": "Copied",
      "guideLayer2Title": "The Idea",
      "guideLayer2Tagline": "What a living doc is, and why it exists.",
      "guideLayer3Title": "The Structure",
      "guideLayer3Tagline": "How a doc is shaped — entities, edges, convergence types, the registry that governs them.",
      "guideLayer4Title": "The Governance Layer",
      "guideLayer4Tagline": "A layer above the structure — declares the intent of the doc so it can be reasoned about without re-derivation.",
      "guideLayer4Body1": "Every agent that opens a living doc re-derives the same things silently: which facets of the objective each section carries, which invariants should hold, whether the document still covers the work. The governance layer promotes that silent reasoning into structured data at the doc root.",
      "guideLayer4Body2": "Four optional fields live next to `title` and `sections`: `objectiveFacets`, `coverage`, `invariants`, `metaFingerprint`. A new convergence type — `coherence-map` — renders a projection of them. A per-section `rationale` captures why a convergence type was chosen here, in this doc's context.",
      "guideLayer4FacetsTitle": "Objective facets",
      "guideLayer4FacetsBody": "Decompose the free-form objective sentence into typed units. Each facet has an id, name, and description. \"UI fidelity\", \"repo connection\", \"push runtime\" become addressable instead of prose.",
      "guideLayer4CoverageTitle": "Coverage edges",
      "guideLayer4CoverageBody": "Each edge maps one facet to one carrying section and optionally one card within it. Coverage is computable — \"is facet X still carried?\" becomes a set-difference, not an LLM re-read.",
      "guideLayer4InvariantsTitle": "Invariants",
      "guideLayer4InvariantsBody": "Doc-local contracts the doc already follows: \"decisions migrate out of verification\", \"every capability has a code path\". Scoped to section ids or the whole doc via appliesTo. Enforced at plan time, not review time.",
      "guideLayer4FingerprintTitle": "Fingerprint and freshness",
      "guideLayer4FingerprintBody": "A sha256 of the section structure at crystallization time. Renders as a banner when the sections have moved but the meta has not — stale coverage is worse than no coverage, so drift becomes loud.",
      "guideLayer4CrystallizeTitle": "Second-pass refinement, not an authoring gate",
      "guideLayer4CrystallizeBody": "Don't crystallize early iteration — facets haven't settled. Run `/crystallize <doc>` once the shape is stable; the skill proposes facets, coverage, invariants, and rationale from what the doc already contains. Re-run with `--refresh` on structural change. Open the Flow tab to watch the facets and coverage populate as the skill writes them.",
      "guideLayer4FlowIntro": "The Flow tab in the compositor is the primary surface for governance. Open a crystallized doc, switch to Flow, and the layer becomes a canvas: facets on the left, sections in the middle, invariants on the right, with typed wires between them.",
      "guideLayer4FlowFacets": "In the Flow canvas: the left column. Orphan facets render as pink cards with an Orphan badge, so gaps in the coverage are visible at a glance. Drag a facet's right port to a section's left port to add a coverage edge.",
      "guideLayer4FlowCoverage": "In the Flow canvas: gray bezier wires from each facet's right port to the section's left port. Drift (the target section has been removed) renders as a dashed red wire trailing off toward the sections column. Click a wire to remove it.",
      "guideLayer4FlowInvariants": "In the Flow canvas: the right column, amber arrows with arrowheads point at the sections they govern. Click the Doc-wide chip on an invariant to toggle `appliesTo: [\"*\"]`; the arrows collapse into one arrow pointing at a virtual anchor above the sections column. Drag to a specific section to rescope.",
      "guideLayer4FlowFingerprint": "In the Flow canvas: an amber banner pins at the top when the fingerprint is stale. Coverage and invariant wires dim and desaturate so the stale state is unmistakable. The banner's Stamp button re-computes and stores the new fingerprint; the Crystallize button copies `/crystallize <doc> --refresh` to the clipboard.",
      "guideLayer4ReadingTitle": "Reading the Flow canvas",
      "guideLayer4ReadingBody": "Three columns, three roles. Two wire colors, two node states. One italicized footer per section.",
      "guideLayer4ReadingColumns": "Columns · Objective facets (left) → sections (middle) → invariants (right). Each is a governance role expressed as a column.",
      "guideLayer4ReadingWires": "Wires · Gray bezier = coverage (facet is carried by section). Amber bezier with arrowhead = invariant (rule governs section). Dashed variants signal drift or in-flight preview.",
      "guideLayer4ReadingStates": "States · Pink facet card + Orphan badge = no coverage edges. Dashed red wire = drifted (points at a missing section). Dimmed + desaturated wires = metaFingerprint is stale.",
      "guideLayer4ReadingStats": "Stats bar · Pinned at the top: facet / section / coverage / invariant counts, rationale declared vs total, and loud pills for orphan or drift counts when either is non-zero.",
      "guideLayer4ReadingRationale": "Rationale · Italicized dashed card at the bottom of each section node. A dotted \"no rationale declared yet\" stub appears when the field is missing so authoring gaps stay visible.",
      "guideLayer4EditingTitle": "Editing via the Flow canvas",
      "guideLayer4EditingBody": "Every interaction writes to the same `docExtras` that `/crystallize` and the tabular editor use, so the canvas stays in sync with the other views.",
      "guideLayer4EditingDrag": "Drag a port → create a wire. Facet out-port to section in-port adds coverage (picks an unused cardId from the section). Invariant out-port to section right-port adds that section to `appliesTo`, stripping any existing `\"*\"`.",
      "guideLayer4EditingClick": "Click a wire → remove it. Click the Doc-wide chip on an invariant → toggle doc-wide scope. Click a section's rationale card → edit the sentence inline via prompt.",
      "guideLayer4EditingRemove": "× on hover → delete a node. Facets cascade their coverage; sections intentionally leave coverage edges behind as drift (the visual signal stays visible); invariants are a clean delete.",
      "guideLayer4EditingPosition": "Drag a node body → reposition on the canvas (`flowPosition` saves to the node). Double-click → return to column. Reset layout button in the stats bar → clear all custom positions.",
      "guideLayer4DeepTitle": "Fingerprint, freshness, and the crystallization moment",
      "guideLayer4DeepIntro": "The fingerprint is cheap to compute and load-bearing. Understanding what it hashes, when to stamp it, and what freshness means turns governance from a static label into a living contract.",
      "guideLayer4DeepHashTitle": "What the fingerprint hashes",
      "guideLayer4DeepHashBody": "A sha256 of each section's id, convergenceType, and ordered card ids. Stable under prose edits within cards; unstable when sections are added or removed, renamed, or restructured. The choice is deliberate — governance maps to structure, not to content.",
      "guideLayer4DeepMomentTitle": "The crystallization moment",
      "guideLayer4DeepMomentBody": "Think of it as a git commit on the doc's meaning. Before the stamp, the doc is in shape-discovery mode and governance would calcify bad decompositions. After the stamp, governance pins to an exact structural state. Crystallize when the shape is stable enough that a week of small edits won't reshape it.",
      "guideLayer4DeepStatesTitle": "Three states, three postures",
      "guideLayer4DeepStatesBody": "Missing — no fingerprint, nothing to check; agents fall back to prose re-derivation. Fresh — stored matches current; agents deterministically target the right cards via coverage edges. Stale — stored differs from current; wires dim and agents must fall back to prose, because coverage may now point at cards whose meaning has shifted.",
      "guideLayer4DeepRitualsTitle": "Stamp vs refresh",
      "guideLayer4DeepRitualsBody": "Stamp (from the Flow banner) — recompute the sha256 and store it. Preserves existing facets, coverage, invariants, and rationale. Use when the structural edit is semantic-neutral (renamed a section you just added, reshuffled a card id). Refresh via `/crystallize <doc> --refresh` — rerun the skill. Proposes updated facets and coverage for the new structure; preserves author-edited fields. Use when the change is genuinely new shape.",
      "guideLayer4DeepBridgeTitle": "Why this bridges authoring and long-term coherence",
      "guideLayer4DeepBridgeBody": "Without a fingerprint, \"is this doc still coherent?\" requires an LLM re-read and human judgment on every pass. With a fingerprint, it's a hash comparison. That collapse — from judgment to verification — is what turns a living doc from an opinionated structure into a testable substrate. Over time it enables empirical evaluation of which doc shapes actually perform well for human and agent readers alike.",
      "guideLayer5Title": "Extending the Vocabulary",
      "guideLayer5Tagline": "Creating a new convergence type when nothing fits.",
      "guideLayer6Title": "Working with Living Docs",
      "guideLayer6Tagline": "Day-to-day usage: load, edit, render, share, skills."
    },

      "exportedTo": "gedownload. Verplaats het naar je docs/ map zodat de bibliotheek en renderer het kunnen vinden:",

      "noneYet": "Nog niet beschikbaar",
      "text": "tekst",
      "list": "lijst",
      "guideIntroTitle": "Wat is dit?",
      "guideIntro1": "Je werk leeft op veel plekken. Ontwerpen in Figma. Code in repo’s. Tickets in GitHub. Workflows in CI. Beslissingen in gesprekken. Om de echte status van iets te begrijpen, moet je ze allemaal bezoeken en zelf samenvoegen.",
      "guideIntro2": "Een living doc brengt die stukken samen in één gestructureerd JSON-document en één draagbare HTML-snapshot. Het is geen losse wikipagina: bron-id’s, links, statusvelden, lineage en registersturing blijven zichtbaar zodat mensen en agents weten waar ze moeten verversen.",
      "guideIntro3": "De compositor is het authoring-oppervlak voor die structuur. Gebruik templates, convergentietypes, de lokale bibliotheek en de prompt builder om te bepalen wat in het document hoort; render de JSON daarna naar een zelfstandige pagina wanneer die gedeeld moet worden.",
      "guideGrowTitle": "Living docs groeien mee",
      "guideGrow1": "Je ontwerpt de volledige structuur niet vooraf. Je begint met een of twee convergentietypes die passen bij waar je aan werkt. Terwijl je werkt, verschijnen nieuwe patronen.",
      "guideGrow2": "Misschien begon je met het bijhouden van capabilities en hun implementatiestatus. Toen realiseerde je dat je ook moet weten of de implementatie overeenkomt met het ontwerp — dus voeg je een alignment-sectie toe. Later voeg je een verificatie-surface toe. Elke toevoeging is één klik in de compositor of één regel in de JSON.",
      "guideGrow3": "De structuur evolueert met het werk, niet ervóór. Bestaande data blijft intact als je nieuwe secties toevoegt. Het living doc wordt completer over tijd, niet complexer — omdat elke sectie een op zichzelf staand convergentietype is met een bekende vorm.",
      "guideStartTitle": "Aan de slag",
      "guideStart1": "Open de compositor direct voor snel structuurwerk. Serveer de docs-map wanneer de browser het lokale bibliotheekmanifest of sibling JSON-bestanden moet ophalen.",
      "guideStartFile": "Maak of laad een document",
      "guideStartFileBody": "Start een nieuw document, laad bestaande JSON, of kies een starter- of volledig template uit de Templates-rail. Zet eerst identiteit, doel, sectievorm en convergentietypes; vul gedetailleerde brondata in de JSON.",
      "guideStartServe": "Gebruik de lokale bibliotheek",
      "guideStartServeBody": "Genereer een gesanitized bibliotheekmanifest uit je lokale catalogus en serveer daarna de docs-map zodat de browser het kan ophalen:",
      "guideStartServeCmd": "node scripts/export-living-doc-library.mjs\ncd docs && python3 -m http.server 8111",
      "guideStartServeThen": "Open http://localhost:8111/living-doc-compositor.html. Settings wijzen standaard naar ./living-doc-library.local.json en kunnen ook sibling JSON-discovery meenemen.",
      "guideStartPrompt": "Gebruik de prompt builder",
      "guideStartPromptBody": "Het promptpaneel kopieert één agent-klare prompt, gevormd door documentidentiteit, sectiemap, huidige payload, template-semantiek en registry promptGuidance.",
      "guideStartRender": "Render en deel",
      "guideStartRenderBody": "Na het exporteren of bijwerken van de canonieke JSON, genereer je de zelfstandige HTML-snapshot:",
      "guideStartRenderCmd": "node scripts/render-living-doc.mjs docs/my-doc.json",
      "guideStartRenderResult": "Produceert docs/my-doc.html met snapshotidentiteit, lineage, zijbalknavigatie en de complete compositor embedded.",
      "guideStartShare": "Deel veilig",
      "guideStartShareBody": "Een gedeeld HTML-bestand kan alleen het huidige document bevatten of een gefilterde bibliotheekindex. Gebruik --share-safe voor manifests die je machine mogen verlaten; gefilterde indexes bevatten gesanitized metadata, geen ruwe lokale paden.",
      "guideIntroTransition": "Hieronder staat hoe het onder de motorkap werkt.",
      "guideMakeTitle": "Maak je eigen",
      "guideMakeIntro": "Past geen van de bestaande convergentietypes bij jouw domein? Je kunt een nieuw type definiëren. Een convergentietype is het antwoord op één vraag: welke dingen blijven steeds samen opduiken?",
      "guideMakeStep1title": "Herken het patroon",
      "guideMakeStep1body": "Je controleert steeds dezelfde drie of vier dingen samen. Terraform-modules en AWS-resources. Testsuites en dekkingsrapporten. API-contracten en client-implementaties. Die herhaalde groepering is jouw convergentie.",
      "guideMakeStep2title": "Benoem de bronnen",
      "guideMakeStep2body": "Elk ding in die groepering is een entiteitstype. Lijst ze: \"Terraform-module + AWS-resource + deployment-workflow.\" Dit zijn de bronnen die jouw convergentie produceren.",
      "guideMakeStep3title": "Identificeer de geleende eigenschap",
      "guideMakeStep3body": "Welke status interesseert je als je naar deze groepering kijkt? Gedeployed vs gedrift? Gedekt vs niet-gedekt? Die status wordt niet opgeslagen — hij wordt afgeleid van de bronnen.",
      "guideMakeStep4title": "Vergelijk met bestaande types",
      "guideMakeStep4body": "Vergelijk voordat je een nieuw type maakt met wat er al bestaat. Is het echt een nieuwe combinatie van bronnen, of een instantie van een bestaand type met andere scopegrenzen?",
      "guideMakeStep5title": "Voeg toe aan het register",
      "guideMakeStep5body": "Eén JSON-vermelding in living-doc-registry.json. Definieer name, icon, projection, sources of edge sources, statusFields of edgeStatus, en promptGuidance. Voeg textFields of detailsFields toe wanneer de kaart rijkere tekst nodig heeft. Geen renderer-codewijzigingen.",
      "guideMakeOr": "Gebruik het registeroverzicht voordat je een type toevoegt. De advisor skill kan nog steeds helpen de vorm te ontdekken, overlap te controleren, en de registervermelding te schrijven.",
      "guideConcept": "Het Concept",
      "guideConceptBody": "Een living doc is een subgraaf-weergave — een navigeerbare projectie van entiteiten en hun relaties. De canonieke JSON bewaart de huidige projectie; de gerenderde HTML is een draagbare snapshot met de volledige tool embedded. Het register vertelt lezers en agents wat elke sectie betekent.",
      "guideFundamentals": "Drie Grondbeginselen",
      "entity": "Entiteit",
      "entityDesc": "Heeft identiteit, heeft eigen eigenschappen. Een Figma-pagina, een ticket, een codebestand, een API-endpoint.",
      "edge": "Relatie",
      "edgeDesc": "Een getypeerde verbinding tussen entiteiten. Implementeert, specificeert, test, deployt.",
      "scope": "Scope",
      "scopeDesc": "Een benoemde convergentie van entiteiten. De sectievorm, statusvelden en promptgedrag komen uit het register en de brondata.",
      "guideCtTitle": "Convergentietypes",
      "guideCtBody": "Elk type is een specifieke combinatie van bron-entiteiten plus een registercontract: projectie, bronnen, statusvelden, optionele tekst/detailvelden en promptGuidance. De compositor en renderer lezen dat contract in plaats van typegedrag hard te coderen.",
      "guideConstraints": "Kernbeperkingen",
      "constraint1title": "Het register bezit de typebetekenis.",
      "constraint1body": "Voeg convergentiegedrag toe of wijzig het in scripts/living-doc-registry.json, niet in renderer-shortcuts.",
      "constraint2title": "De JSON blijft canoniek.",
      "constraint2body": "Gerenderde HTML is een draagbare snapshot en kan driften; werk de bron-JSON bij en render opnieuw wanneer feiten veranderen.",
      "constraint3title": "Promptsturing is onderdeel van het schema.",
      "constraint3body": "Elk type moet via promptGuidance zeggen hoe je inspecteert, bijwerkt, onderscheid maakt en drift vermijdt.",
      "constraint4title": "Delen is expliciet.",
      "constraint4body": "Lokale cataloguspaden blijven privé tenzij je bewust gesanitized manifest- of gefilterde indexmetadata exporteert.",
      "guideWorkflow": "Werkwijze",
      "step1title": "Vormen",
      "step1body": "Maak of laad een document, kies eventueel een template, en selecteer convergentietypes uit de Structure-rail.",
      "step2title": "Vullen",
      "step2body": "Exporteer of bewerk de canonieke JSON en vul de data-arrays van elke sectie met echte bron-id’s, statusvelden, notities en referenties.",
      "step3title": "Sturen",
      "step3body": "Gebruik de prompt builder wanneer een agent de huidige sectiemap, payload, template-semantiek en registry slice nodig heeft.",
      "step4title": "Renderen",
      "step4body": "Genereer een zelfstandige HTML-snapshot uit de canonieke JSON; de export bevat identiteit, lineage en de volledige compositor.",
      "guideInference": "Waarom Dit Belangrijk Is voor Inferentie",
      "guideInferenceBody": "Hogere-orde abstracties comprimeren de zoekruimte. Wanneer een LLM een convergentietype ziet, weet het direct: welke entiteiten erin zitten, hoe ze zich verhouden, wat status betekent, en waar te kijken als iets mis is. Elke token wordt besteed aan redeneren over het domein, niet aan het begrijpen van het documentformaat.",
      "guideSkills": "Hoe Het Levend Blijft",
      "guideSkillsBody": "Een register, locale-bestand, renderer, prompt builder, lokaal bibliotheekmanifest en optionele skills houden het document bruikbaar. De HTML reist zelfstandig; de JSON blijft de bron om te verversen.",
      "skillBootstrap": "De bootstrap. Verbindt een sessie met de living docs voor de huidige repo. Toont wat er is, wat verouderd is, en laat de LLM secties bijwerken als natuurlijk onderdeel van het werk. Het document beschrijft zichzelf — de skill opent alleen de deur.",
      "skillAdvisor": "De denkpartner. Helpt ontdekken welke convergentietypes bij een domein passen via dialoog. Toont bestaande types als voorbeelden, identificeert nieuwe patronen, controleert op overlap, en schrijft de registervermelding.",
      "skillRenderer": "Eén commando, elk document. Synchroniseert embedded register, locales en templates, en produceert daarna HTML met snapshotidentiteit, zijbalk, iconen, scroll-tracking en de volledige compositor.",
      "skillCrystallize": "De verfijningsslag. Leidt objectiveFacets, coverage-edges, invariants en rationale per sectie af uit een document waarvan de vorm is gestabiliseerd, en stempelt daarna metaFingerprint. Draai deze skill wanneer de structuur klaar is om uit te kristalliseren; herhaal met --refresh wanneer secties wijzigen.",
      "guideLayerIndexLabel": "Lagen",
      "guideLayer1Title": "Begin Hier",
      "guideLayer1Tagline": "Clone de repo, plak een prompt in Claude Code, of lees eerst het concept op de landingspagina.",
      "guideLayer1LandingTitle": "Lees eerst het concept",
      "guideLayer1LandingBody": "Kwam je hier via een gedeelde HTML-snapshot? De landingspagina geeft de pitch van 30 seconden en screenshots. Een goede eerste halte voordat je iets cloont.",
      "guideLayer1LandingCta": "Open de landingspagina",
      "guideLayer1CloneTitle": "Clone de repo",
      "guideLayer1CloneBody": "Node 18+ en een browser. Geen installatie, geen runtime-deps naast de renderer. De compositor waar je nu naar kijkt, leeft op docs/living-doc-compositor.html in de repo.",
      "guideLayer1ClaudeTitle": "Plak dit in Claude Code",
      "guideLayer1ClaudeBody": "Open de repo in Claude Code na het clonen en plak de prompt hieronder. Die vertelt de agent om de README te lezen, een starter-template te kiezen dat past bij waar je aan werkt, en je eerste living doc op te zetten.",
      "guideLayer1ClaudePrompt": "Ik heb zojuist triadflow/living-doc-compositor gecloond en wil mijn eerste living doc maken. Lees de README en scripts/living-doc-registry.json, en: (1) beveel een starter-template uit docs/ aan dat past bij het werk dat ik zo beschrijf, (2) maak een nieuwe JSON-kopie met mijn titel en scope, (3) render deze met node scripts/render-living-doc.mjs. Als de /living-doc skill relevant is, roep die aan.",
      "guideLayer1RepoCta": "Open de GitHub-repo",
      "guideLayer1Copy": "Kopiëren",
      "guideLayer1Copied": "Gekopieerd",
      "guideLayer2Title": "Het Idee",
      "guideLayer2Tagline": "Wat een living doc is en waarom het bestaat.",
      "guideLayer3Title": "De Structuur",
      "guideLayer3Tagline": "Hoe een document is gevormd — entiteiten, edges, convergentietypes en het register dat ze beheert.",
      "guideLayer4Title": "De Governance-laag",
      "guideLayer4Tagline": "Een laag boven de structuur — maakt de intentie van het document expliciet zodat erover geredeneerd kan worden zonder herafleiding.",
      "guideLayer4Body1": "Elke agent die een living doc opent, leidt dezelfde dingen stilzwijgend opnieuw af: welke facetten van het doel elke sectie draagt, welke invarianten moeten gelden, of het document het werk nog steeds dekt. De governance-laag promoveert dat stille redeneren tot gestructureerde data in de documentroot.",
      "guideLayer4Body2": "Vier optionele velden staan naast `title` en `sections`: `objectiveFacets`, `coverage`, `invariants`, `metaFingerprint`. Een nieuw convergentietype — `coherence-map` — rendert er een projectie van. Een `rationale` per sectie legt vast waarom hier, in deze context, dit convergentietype is gekozen.",
      "guideLayer4FacetsTitle": "Doelfacetten",
      "guideLayer4FacetsBody": "Ontleed de vrije-vorm doelzin in getypeerde eenheden. Elk facet heeft een id, naam en beschrijving. \"UI-getrouwheid\", \"repo-verbinding\", \"push-runtime\" worden adresseerbaar in plaats van proza.",
      "guideLayer4CoverageTitle": "Coverage-edges",
      "guideLayer4CoverageBody": "Elke edge koppelt één facet aan één dragende sectie en optioneel één kaart daarin. Coverage is berekenbaar — \"wordt facet X nog gedragen?\" wordt een verzamelingsverschil, geen LLM-herleest.",
      "guideLayer4InvariantsTitle": "Invarianten",
      "guideLayer4InvariantsBody": "Document-lokale contracten die het document al volgt: \"beslissingen migreren uit verificatie\", \"elke capability heeft een code-pad\". Gescoped op sectie-ids of het hele document via appliesTo. Afgedwongen bij planning, niet bij review.",
      "guideLayer4FingerprintTitle": "Vingerafdruk en versheid",
      "guideLayer4FingerprintBody": "Een sha256 van de sectiestructuur op het moment van uitkristalliseren. Toont een banner wanneer secties zijn verschoven maar de meta niet — verouderde coverage is erger dan geen coverage, dus drift wordt luid.",
      "guideLayer4CrystallizeTitle": "Tweede-pass verfijning, geen authoring-gate",
      "guideLayer4CrystallizeBody": "Kristalliseer niet in vroege iteratie — facetten zijn nog niet uitgekristalliseerd. Draai `/crystallize <doc>` zodra de vorm stabiel is; de skill stelt facetten, coverage, invarianten en rationale voor vanuit wat het document al bevat. Herhaal met `--refresh` bij structurele wijziging. Open het Flow-tabblad om facetten en coverage te zien verschijnen terwijl de skill ze wegschrijft.",
      "guideLayer4FlowIntro": "Het Flow-tabblad in de compositor is het primaire oppervlak voor governance. Open een gekristalliseerd document, schakel over naar Flow, en de laag wordt een canvas: facetten links, secties in het midden, invarianten rechts, met getypeerde draden ertussen.",
      "guideLayer4FlowFacets": "In het Flow-canvas: de linkerkolom. Orphan-facetten verschijnen als roze kaarten met een Orphan-badge, zodat gaten in de coverage in één oogopslag zichtbaar zijn. Sleep de rechterpoort van een facet naar de linkerpoort van een sectie om een coverage-edge toe te voegen.",
      "guideLayer4FlowCoverage": "In het Flow-canvas: grijze bezier-draden van de rechterpoort van elk facet naar de linkerpoort van de sectie. Drift (de doelsectie is verwijderd) verschijnt als een gestreepte rode draad die richting de sectiekolom wegloopt. Klik op een draad om hem te verwijderen.",
      "guideLayer4FlowInvariants": "In het Flow-canvas: de rechterkolom, amberen pijlen met pijlpunten wijzen naar de secties die ze beheren. Klik op de Doc-wide-chip van een invariant om `appliesTo: [\"*\"]` om te schakelen; de pijlen klappen samen in één pijl die wijst naar een virtueel anker boven de sectiekolom. Sleep naar een specifieke sectie om opnieuw te scopen.",
      "guideLayer4FlowFingerprint": "In het Flow-canvas: een amberen banner blijft bovenaan hangen wanneer de vingerafdruk verouderd is. Coverage- en invariant-draden vervagen en desatureren zodat de verouderde staat onmiskenbaar is. De Stempel-knop in de banner herberekent en slaat een nieuwe vingerafdruk op; de Kristalliseer-knop kopieert `/crystallize <doc> --refresh` naar het klembord.",
      "guideLayer4ReadingTitle": "Het Flow-canvas lezen",
      "guideLayer4ReadingBody": "Drie kolommen, drie rollen. Twee draadkleuren, twee knooppunttoestanden. Eén cursieve voettekst per sectie.",
      "guideLayer4ReadingColumns": "Kolommen · Doelfacetten (links) → secties (midden) → invarianten (rechts). Elk is een governance-rol uitgedrukt als kolom.",
      "guideLayer4ReadingWires": "Draden · Grijze bezier = coverage (facet wordt gedragen door sectie). Amberen bezier met pijlpunt = invariant (regel beheert sectie). Gestreepte varianten signaleren drift of in-uitvoering-preview.",
      "guideLayer4ReadingStates": "Toestanden · Roze facetkaart + Orphan-badge = geen coverage-edges. Gestreepte rode draad = gedriftet (wijst naar een ontbrekende sectie). Vervaagde + gedesatureerde draden = metaFingerprint is verouderd.",
      "guideLayer4ReadingStats": "Statusbalk · Vastgeprikt bovenaan: facet / sectie / coverage / invariant-aantallen, aangegeven rationale versus totaal, en opvallende labels voor orphan- of drift-aantallen wanneer die niet nul zijn.",
      "guideLayer4ReadingRationale": "Rationale · Cursieve gestippelde kaart onderaan elk sectieknooppunt. Een gestippelde \"nog geen rationale verklaard\"-stub verschijnt wanneer het veld ontbreekt, zodat hiaten in authoring zichtbaar blijven.",
      "guideLayer4EditingTitle": "Bewerken via het Flow-canvas",
      "guideLayer4EditingBody": "Elke interactie schrijft naar dezelfde `docExtras` die `/crystallize` en de tabulaire editor gebruiken, zodat het canvas synchroon blijft met de andere weergaven.",
      "guideLayer4EditingDrag": "Sleep een poort → maak een draad. Facet-uitpoort naar sectie-inpoort voegt coverage toe (kiest een ongebruikte cardId uit de sectie). Invariant-uitpoort naar sectie-rechterpoort voegt die sectie toe aan `appliesTo`, waarbij een bestaande `\"*\"` wordt verwijderd.",
      "guideLayer4EditingClick": "Klik op een draad → verwijder hem. Klik op de Doc-wide-chip van een invariant → schakel doc-brede scope om. Klik op de rationale-kaart van een sectie → bewerk de zin inline via prompt.",
      "guideLayer4EditingRemove": "× bij hover → verwijder een knooppunt. Facetten cascaderen hun coverage; secties laten coverage-edges opzettelijk achter als drift (het visuele signaal blijft zichtbaar); invarianten zijn een schone verwijdering.",
      "guideLayer4EditingPosition": "Sleep een knooppunt-body → verplaatsen op het canvas (`flowPosition` wordt opgeslagen op het knooppunt). Dubbelklik → terug naar kolom. Layout-reset-knop in de statusbalk → wis alle aangepaste posities.",
      "guideLayer4DeepTitle": "Vingerafdruk, versheid en het kristallisatiemoment",
      "guideLayer4DeepIntro": "De vingerafdruk is goedkoop te berekenen en draagt veel gewicht. Begrijpen wat hij hasht, wanneer je hem stempelt en wat versheid betekent, verandert governance van een statisch etiket in een levend contract.",
      "guideLayer4DeepHashTitle": "Wat de vingerafdruk hasht",
      "guideLayer4DeepHashBody": "Een sha256 van elk sectie-id, convergenceType en de geordende kaart-id's. Stabiel onder proza-bewerkingen binnen kaarten; instabiel wanneer secties worden toegevoegd of verwijderd, hernoemd of geherstructureerd. De keuze is opzettelijk — governance volgt structuur, geen inhoud.",
      "guideLayer4DeepMomentTitle": "Het kristallisatiemoment",
      "guideLayer4DeepMomentBody": "Beschouw het als een git-commit op de betekenis van het document. Vóór de stempel is het document in vormontdekking en zou governance slechte decomposities uitkristalliseren. Na de stempel is governance vastgepind op een exacte structurele staat. Kristalliseer wanneer de vorm stabiel genoeg is dat een week van kleine bewerkingen hem niet opnieuw vormt.",
      "guideLayer4DeepStatesTitle": "Drie toestanden, drie houdingen",
      "guideLayer4DeepStatesBody": "Ontbrekend — geen vingerafdruk, niets om te controleren; agents vallen terug op proza-herafleiding. Vers — opgeslagen komt overeen met huidig; agents richten deterministisch op de juiste kaarten via coverage-edges. Verouderd — opgeslagen verschilt van huidig; draden vervagen en agents moeten terugvallen op proza omdat coverage naar kaarten kan wijzen waarvan de betekenis is verschoven.",
      "guideLayer4DeepRitualsTitle": "Stempelen vs verversen",
      "guideLayer4DeepRitualsBody": "Stempelen (vanuit de Flow-banner) — bereken de sha256 opnieuw en sla hem op. Behoudt bestaande facetten, coverage, invarianten en rationale. Gebruik wanneer de structurele bewerking semantisch-neutraal is (een sectie die je net toevoegde hernoemd, een kaart-id hergeschikt). Verversen via `/crystallize <doc> --refresh` — draai de skill opnieuw. Stelt bijgewerkte facetten en coverage voor voor de nieuwe structuur; behoudt door auteur bewerkte velden. Gebruik wanneer de wijziging werkelijk nieuwe vorm is.",
      "guideLayer4DeepBridgeTitle": "Waarom dit authoring en langdurige coherentie verbindt",
      "guideLayer4DeepBridgeBody": "Zonder vingerafdruk vereist \"is dit document nog coherent?\" bij elke iteratie een LLM-herleest en menselijk oordeel. Met een vingerafdruk is het een hash-vergelijking. Die ineenstorting — van oordeel naar verificatie — is wat een living doc verandert van een eigengereide structuur in een toetsbaar substraat. In de loop van de tijd maakt het empirische evaluatie mogelijk van welke documentvormen daadwerkelijk goed presteren voor zowel mens als agent.",
      "guideLayer5Title": "De Woordenschat Uitbreiden",
      "guideLayer5Tagline": "Een nieuw convergentietype maken wanneer niets past.",
      "guideLayer6Title": "Werken met Living Docs",
      "guideLayer6Tagline": "Dagelijks gebruik: laden, bewerken, renderen, delen, skills."
